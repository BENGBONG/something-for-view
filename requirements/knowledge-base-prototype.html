<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>知识库 AI 生产工作台原型</title>
  <style>
    :root {
      --bg: #f5f6f7;
      --panel: #ffffff;
      --panel-strong: #ffffff;
      --line: rgba(0,0,0,0.08);
      --line-strong: rgba(0,0,0,0.12);
      --text: rgba(0,0,0,0.88);
      --muted: #5f6368;
      --faint: #9198a1;
      --blue: #165dff;
      --blue-2: #4080ff;
      --violet: #6b4cff;
      --green: #00b42a;
      --amber: #ff7d00;
      --red: #e55757;
      --chip: #f4f5f7;
      --shadow: rgba(0,0,0,0.04) 0 4px 18px, rgba(0,0,0,0.027) 0 2px 7.85px, rgba(0,0,0,0.02) 0 0.8px 2.93px, rgba(0,0,0,0.01) 0 0.18px 1.04px;
      --soft-shadow: rgba(0,0,0,0.03) 0 2px 8px, rgba(0,0,0,0.015) 0 0.5px 2px;
      --radius: 12px;
      --radius-sm: 8px;
      --radius-xs: 4px;
      --nav: 280px;
      --sidebar: 250px;
      --assistant: 440px;
      --sp-1: 4px;
      --sp-2: 8px;
      --sp-3: 12px;
      --sp-4: 16px;
      --sp-5: 24px;
      --sp-6: 32px;
      --gradient-brand: linear-gradient(135deg, #165dff 0%, #6b4cff 100%);
      --gradient-brand-hover: linear-gradient(135deg, #2b6cff 0%, #7a5fff 100%);
      --gradient-subtle: linear-gradient(180deg, #fafbff 0%, #ffffff 100%);
      --gradient-bubble-user: linear-gradient(135deg, #165dff 0%, #6b4cff 100%);
      --glow-brand: 0 0 0 1px rgba(107, 76, 255, 0.18), 0 6px 18px rgba(107, 76, 255, 0.28);
      --shadow-elevated: rgba(0,0,0,0.05) 0 4px 24px, rgba(0,0,0,0.03) 0 1px 4px;
      --focus-ring: 0 0 0 3px rgba(22, 93, 255, 0.18);

      /* 按钮尺寸刻度 */
      --btn-xs: 28px;
      --btn-sm: 32px;
      --btn-md: 36px;
      --btn-lg: 40px;

      /* 图标尺寸刻度 */
      --icon-xs: 14px;
      --icon-sm: 16px;
      --icon-md: 18px;
      --icon-lg: 20px;
      --icon-xl: 24px;

      /* 字号语义层级 */
      --fs-h1: 28px;
      --fs-h2: 20px;
      --fs-h3: 16px;
      --fs-body: 14px;
      --fs-sm: 13px;
      --fs-label: 12px;
      --fs-meta: 11px;
      --lh-tight: 1.2;
      --lh-snug: 1.35;
      --lh-normal: 1.5;
      --tracking-tight: -0.2px;
      --tracking-h1: -0.3px;
      --tracking-label: 0.1px;

      /* 过渡时间 */
      --t-fast: 120ms;
      --t-base: 160ms;
      --t-slow: 220ms;
      --ease: cubic-bezier(0.2, 0.8, 0.2, 1);

      color-scheme: light;
    }

    * {
      box-sizing: border-box;
    }

    html {
      height: 100%;
      overflow: hidden;
    }

    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body.fit-preview {
      background: #f7f8fb;
    }

    body.fit-preview .fit-stage {
      position: relative;
      width: 100vw;
      height: 100vh;
      min-width: 0;
      min-height: 0;
      overflow: hidden;
    }

    body.fit-preview .fit-canvas {
      position: absolute;
      top: 50%;
      left: 50%;
      width: var(--fit-design-width, 1440px);
      height: var(--fit-design-height, 900px);
      transform: translate(-50%, -50%) scale(var(--fit-scale, 1));
      transform-origin: center center;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    svg {
      display: block;
      flex: 0 0 auto;
    }

    svg * {
      vector-effect: non-scaling-stroke;
    }

    /* ============================================================
       Icon System — Lucide-style inline SVG via sprite
       使用方式：<svg class="icon icon-md"><use href="#i-xxx"/></svg>
       ============================================================ */
    .icon {
      width: var(--icon-md);
      height: var(--icon-md);
      flex: 0 0 auto;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.75;
      stroke-linecap: round;
      stroke-linejoin: round;
      color: inherit;
    }
    .icon-xs { width: var(--icon-xs); height: var(--icon-xs); }
    .icon-sm { width: var(--icon-sm); height: var(--icon-sm); }
    .icon-md { width: var(--icon-md); height: var(--icon-md); }
    .icon-lg { width: var(--icon-lg); height: var(--icon-lg); }
    .icon-xl { width: var(--icon-xl); height: var(--icon-xl); }
    .icon-fill { fill: currentColor; stroke: none; }

    /* 隐藏的 sprite 容器 */
    .icon-sprite {
      position: absolute;
      width: 0;
      height: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .app {
      display: grid;
      grid-template-columns: var(--nav) 1fr;
      width: 100%;
      height: 100vh;
      min-height: 0;
      overflow: hidden;
      transition: grid-template-columns 180ms ease;
    }

    body.fit-preview .app {
      --nav: 280px;
      --sidebar: 250px;
      --assistant: 440px;
      width: var(--fit-design-width, 1440px);
      height: var(--fit-design-height, 900px);
      min-height: 0;
    }

    body.fit-preview .app.nav-collapsed {
      --nav: 72px;
    }

    .app.nav-collapsed {
      --nav: 72px;
    }

    .rail {
      position: relative;
      height: 100vh;
      min-height: 0;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 8px;
      padding: 0 12px;
      background: #ffffff;
      border-right: 1px solid var(--line);
      z-index: 5;
      overflow: hidden;
    }

    body.fit-preview .rail,
    body.fit-preview .shell {
      height: var(--fit-design-height, 900px);
    }

    .app-logo {
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 0 4px 0 8px;
    }

    .brand-lockup {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      color: rgba(0, 0, 0, 0.80);
      font-size: 20px;
      font-weight: 700;
      white-space: nowrap;
    }

    .brand-mark {
      width: 34px;
      height: 34px;
      display: block;
      flex: 0 0 auto;
      border-radius: 9px;
      background: linear-gradient(135deg, #1f5fff 0%, #5e44ff 55%, #8b5cff 100%);
      box-shadow:
        0 1px 0 rgba(255,255,255,0.18) inset,
        0 0 0 1px rgba(255,255,255,0.06) inset,
        0 8px 20px -6px rgba(22, 93, 255, 0.45),
        0 2px 6px rgba(107, 76, 255, 0.22);
      position: relative;
      overflow: hidden;
    }

    .brand-mark svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .brand-mark::after {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(120% 80% at 20% 0%, rgba(255,255,255,0.32), rgba(255,255,255,0) 60%);
      pointer-events: none;
    }

    .collapse-button {
      width: 36px;
      height: 36px;
      display: grid;
      place-items: center;
      color: var(--muted);
      background: transparent;
      border-radius: 8px;
      transition: background 160ms ease, color 160ms ease, transform 180ms ease;
    }

    .collapse-button:hover {
      color: var(--blue);
      background: var(--chip);
    }

    .collapse-button:focus-visible {
      outline: 2px solid #bedaff;
      outline-offset: 2px;
    }

    .app.nav-collapsed .collapse-button svg {
      transform: rotate(180deg);
    }

    .app.nav-collapsed .rail {
      padding: 0 8px;
      align-items: center;
    }

    .app.nav-collapsed .app-logo {
      width: 56px;
      justify-content: center;
      padding: 0;
    }

    .app.nav-collapsed .brand-lockup span,
    .app.nav-collapsed .new-button span:not(:first-child),
    .app.nav-collapsed .rail-button span,
    .app.nav-collapsed .task-tabs,
    .app.nav-collapsed .empty-task,
    .app.nav-collapsed .user-row span {
      display: none;
    }

    .app.nav-collapsed .brand-lockup {
      gap: 0;
    }

    .app.nav-collapsed .collapse-button {
      position: absolute;
      top: 17px;
      right: 6px;
      width: 28px;
      height: 28px;
      background: #ffffff;
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
    }

    .app.nav-collapsed .new-button,
    .app.nav-collapsed .rail-button {
      width: 48px;
      justify-content: center;
    }

    .app.nav-collapsed .user-row {
      width: 48px;
      justify-content: center;
      padding: 0;
    }

    .app.nav-collapsed .rail-button {
      grid-template-columns: 1fr;
      padding: 0;
      place-items: center;
    }

    .new-button {
      width: 100%;
      height: 40px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: var(--blue);
      font-size: 14px;
      font-weight: 700;
      line-height: 1;
      background: #eef3ff;
      transition: background 160ms ease, color 160ms ease;
    }

    .new-button:hover {
      color: #0e42d2;
      background: #e8f0ff;
    }

    .new-button:active {
      transform: scale(0.97);
    }

    .kbd {
      height: 20px;
      min-width: 20px;
      display: inline-grid;
      place-items: center;
      padding: 0 6px;
      border-radius: 8px;
      color: var(--muted);
      background: #dde7ff;
      font-size: 11px;
      font-weight: 700;
    }

    .rail-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: stretch;
      margin-top: 8px;
      min-height: 0;
      overflow: auto;
    }

    .rail-button {
      width: 100%;
      height: 40px;
      border-radius: 8px;
      display: grid;
      grid-template-columns: 22px 1fr auto;
      align-items: center;
      gap: 8px;
      padding: 0 16px;
      color: var(--text);
      background: transparent;
      text-align: left;
      font-size: 14px;
      transition: background 160ms ease, color 160ms ease;
    }

    .rail-button svg {
      width: 18px;
      height: 18px;
      stroke-width: 2;
    }

    .rail-button.active,
    .rail-button:hover {
      color: var(--blue);
      background: var(--chip);
    }

    .rail-button.active {
      font-weight: 700;
    }

    .rail-button:active {
      transform: scale(0.98);
    }

    .rail-button:active {
      transform: scale(0.98);
    }

    .nav-chevron {
      color: var(--muted);
      font-size: 15px;
    }

    .task-tabs {
      display: flex;
      gap: 4px;
      margin-top: 0;
      padding: 0 0 0 0;
    }

    .task-tab {
      width: 69px;
      height: 28px;
      border-radius: 8px;
      color: var(--faint);
      background: transparent;
      font-size: 13px;
    }

    .task-tab.active {
      color: var(--text);
      background: var(--chip);
    }

    .empty-task {
      height: 48px;
      display: grid;
      place-items: center;
      color: var(--faint);
      font-size: 13px;
    }

    .rail-bottom {
      margin-top: auto;
      border-top: 1px solid var(--line);
      padding: 8px 0;
    }

    .user-row {
      width: 100%;
      height: 40px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 12px;
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
    }

    .user-row:hover {
      background: var(--chip);
    }

    .avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: white;
      font-weight: 600;
      background: var(--blue);
      position: relative;
      font-size: 13px;
    }

    .avatar::after {
      content: "";
      width: 9px;
      height: 9px;
      position: absolute;
      right: -1px;
      bottom: 2px;
      border-radius: 50%;
      background: #23c36a;
      border: 2px solid white;
    }

    .shell {
      min-width: 0;
      height: 100vh;
      min-height: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      overflow: hidden;
      padding: 20px 24px;
    }

    .topbar {
      display: grid;
      grid-template-columns: 1fr 420px auto auto;
      gap: 18px;
      align-items: center;
      margin-bottom: 16px;
      min-width: 0;
    }

    .title h1 {
      margin: 0 0 6px;
      font-size: 28px;
      letter-spacing: -0.3px;
      line-height: 1.15;
    }

    .title p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    .search-box {
      height: 40px;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 16px;
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      background: #ffffff;
      box-shadow: none;
    }

    .search-box svg {
      flex: 0 0 auto;
      width: 19px;
      height: 19px;
      color: #8a95aa;
    }

    .search-box input {
      width: 100%;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--text);
    }

    .shortcut {
      color: #8994aa;
      font-size: 12px;
      white-space: nowrap;
    }

    .icon-button {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: #ffffff;
      color: var(--muted);
      border: 1px solid var(--line);
      transition: background 160ms ease, color 160ms ease, transform 160ms ease;
    }

    .icon-button svg {
      width: 19px;
      height: 19px;
    }

    .icon-button:hover,
    .icon-button.active {
      color: var(--blue);
      background: var(--chip);
    }

    .workspace {
      display: grid;
      grid-template-columns: var(--sidebar) minmax(0, 1fr) 12px var(--assistant);
      gap: 10px;
      align-items: stretch;
      height: 100%;
      min-height: 0;
      overflow: hidden;
    }

    .app.assistant-collapsed .workspace {
      grid-template-columns: var(--sidebar) minmax(0, 1fr);
    }

    .layout-resizer {
      width: 14px;
      min-width: 14px;
      height: 100%;
      position: relative;
      cursor: ew-resize;
      border-radius: 9999px;
      background: transparent;
      touch-action: none;
      z-index: 9;
    }

    .layout-resizer::before {
      content: "";
      position: absolute;
      top: 12px;
      bottom: 12px;
      left: 6px;
      width: 2px;
      border-radius: 9999px;
      background: #d8dee9;
      opacity: 0.38;
      transition: opacity 140ms ease, background 140ms ease;
    }

    .layout-resizer::after {
      content: "";
      position: absolute;
      top: 50%;
      left: 50%;
      width: 18px;
      height: 56px;
      border: 1px solid rgba(190, 205, 226, 0.72);
      border-radius: 999px;
      background:
        radial-gradient(circle, rgba(115, 128, 150, 0.56) 1.3px, transparent 1.8px) center / 5px 8px,
        rgba(255,255,255,0.78);
      box-shadow: 0 8px 24px rgba(35, 40, 56, 0.08);
      opacity: 0.42;
      transform: translate(-50%, -50%);
      transition: opacity 140ms ease, border-color 140ms ease, background 140ms ease;
      pointer-events: none;
    }

    .layout-resizer:hover::before,
    .app.is-resizing .layout-resizer::before {
      opacity: 1;
      background: #9db8ff;
    }

    .layout-resizer:hover::after,
    .app.is-resizing .layout-resizer::after {
      opacity: 1;
      border-color: rgba(143, 168, 255, 0.86);
      background:
        radial-gradient(circle, rgba(22, 93, 255, 0.72) 1.3px, transparent 1.8px) center / 5px 8px,
        rgba(255,255,255,0.9);
    }

    .app.is-resizing {
      cursor: col-resize;
      user-select: none;
    }

    .panel {
      min-height: 0;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      box-shadow: var(--soft-shadow);
    }

    .sidebar {
      padding: 18px 14px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      overflow: hidden;
    }

    .space-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 7px 10px;
      color: var(--text);
      font-size: 13px;
      font-weight: 700;
      border-radius: 8px;
      cursor: pointer;
      transition: color 140ms ease, background 140ms ease, box-shadow 140ms ease;
    }

    .space-row:hover,
    .space-row.active {
      color: var(--blue);
      background: rgba(22,93,255,0.06);
    }

    .space-row.active {
      box-shadow: inset 3px 0 0 var(--blue);
    }

    .space-name {
      display: flex;
      align-items: center;
      gap: 9px;
    }

    .space-name svg {
      width: 18px;
      height: 18px;
      color: var(--green);
    }

    .tree {
      overflow: auto;
      padding-right: 4px;
    }

    .tree-group {
      margin: 5px 0;
    }

    .tree-item {
      min-height: 34px;
      display: grid;
      grid-template-columns: 14px minmax(0, 1fr) auto auto;
      gap: 7px;
      align-items: center;
      width: 100%;
      padding: 6px 9px;
      border-radius: 8px;
      color: var(--muted);
      background: transparent;
      font-size: 13px;
      line-height: 1.25;
      text-align: left;
      cursor: pointer;
      transition: background 140ms ease, color 140ms ease;
    }

    .tree-item.depth-1 {
      padding-left: 25px;
    }

    .tree-item.depth-2 {
      padding-left: 42px;
    }

    .tree-item.depth-3 {
      padding-left: 58px;
    }

    .tree-item.depth-4 {
      padding-left: 72px;
    }

    .tree-item.depth-0 {
      color: var(--text);
      font-weight: 600;
    }

    .tree-chevron {
      color: var(--faint);
      font-size: 13px;
      line-height: 1;
    }

    .tree-expand-arrow {
      width: 18px;
      height: 18px;
      display: grid;
      place-items: center;
      border-radius: 4px;
      color: var(--faint);
      background: transparent;
      font-size: 11px;
      cursor: pointer;
      transition: transform 200ms ease, background 140ms ease;
      flex-shrink: 0;
    }

    .tree-expand-arrow:hover {
      background: var(--chip);
      color: var(--blue);
    }

    .tree-expand-arrow.expanded {
      transform: rotate(90deg);
    }

    .tree-item.collapsed-children {
      display: none;
    }

    .tree-item:hover,
    .tree-item.active {
      background: var(--chip);
      color: var(--blue);
    }

    .tree-icon {
      width: 15px;
      height: 15px;
      color: #21b66f;
    }

    .tree-item.file-node {
      grid-template-columns: 14px minmax(0, 1fr) auto;
      color: #596270;
    }

    .tree-item.file-node .space-name {
      gap: 8px;
      min-width: 0;
    }

    .tree-file-title {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .tree-file-type {
      color: var(--faint);
      font-size: 11px;
      font-weight: 600;
    }

    .tree-item.file-node .file-type-icon {
      width: 18px;
      height: 18px;
      border-radius: 6px;
    }

    .tree-item.file-node .file-type-icon svg {
      width: 12px;
      height: 12px;
    }

    .tree-actions {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      opacity: 0.42;
      transition: opacity 140ms ease;
    }

    .tree-item:hover .tree-actions,
    .tree-item:focus-within .tree-actions {
      opacity: 1;
    }

    .tree-action {
      width: 22px;
      height: 22px;
      display: grid;
      place-items: center;
      border: 1px solid transparent;
      border-radius: 7px;
      color: var(--faint);
      background: rgba(255,255,255,0.58);
      cursor: pointer;
      transition: color 140ms ease, background 140ms ease, border-color 140ms ease;
    }

    .tree-action:hover {
      color: var(--blue);
      border-color: rgba(22,93,255,0.16);
      background: #ffffff;
    }

    .tree-action svg {
      width: 13px;
      height: 13px;
    }

    .tree-menu {
      position: absolute;
      z-index: 80;
      right: 34px;
      top: 30px;
      min-width: 128px;
      padding: 6px;
      border: 1px solid rgba(216,224,238,0.78);
      border-radius: 12px;
      background: rgba(255,255,255,0.92);
      box-shadow: 0 18px 42px rgba(31,35,41,0.12);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .tree-menu button {
      width: 100%;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      padding: 0 10px;
      border: 0;
      border-radius: 8px;
      color: var(--text);
      background: transparent;
      font-size: 12px;
      font-weight: 650;
      text-align: left;
      cursor: pointer;
    }

    .tree-menu button:hover {
      background: rgba(22,93,255,0.07);
      color: var(--blue);
    }

    .tree-menu button.danger {
      color: var(--red);
    }

    .tree-menu button.danger:hover {

    .task-save-card.saved {
      border-color: #b7efc5;
      background: #f2fff5;
    }

    .task-save-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
    }

    .save-path-select {
      height: 34px;
      min-width: 0;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: #3c465c;
      background: #ffffff;
      font-size: 12px;
      outline: none;
    }

    .task-save-hint {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--faint);
      font-size: 11px;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.35; transform: scale(0.9); }
      50% { opacity: 1; transform: scale(1.2); }
    }

    @keyframes contextHighlight {
      0% { background: #fff7d9; }
      100% { background: #ffffff; }
    }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes checkboxBounce {
      0% { transform: scale(1); }
      40% { transform: scale(1.2); }
      70% { transform: scale(0.9); }
      100% { transform: scale(1); }
    }

    @keyframes listRowIn {
      from { opacity: 0; transform: translateX(-8px); }
      to { opacity: 1; transform: translateX(0); }
    }

    @keyframes toastSlideIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes breathe {
      0%, 100% { opacity: 0.6; box-shadow: 0 0 6px rgba(107, 76, 255, 0.3); }
      50% { opacity: 1; box-shadow: 0 0 12px rgba(107, 76, 255, 0.6), 0 0 24px rgba(107, 76, 255, 0.15); }
    }

    @keyframes floatGently {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    @keyframes pulseGlow {
      0%, 100% { opacity: 0.4; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.08); }
    }

    @keyframes chipFadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes dotWave {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-6px); opacity: 1; }
    }

    @keyframes shimmer {
      0% { left: -100%; }
      100% { left: 100%; }
    }

    @keyframes messageIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
      }
    }

    .row-check:checked {
      animation: checkboxBounce 250ms ease;
    }

    .content-list table tr {
      animation: listRowIn 200ms ease backwards;
    }

    .content-list table tr:nth-child(1) { animation-delay: 0ms; }
    .content-list table tr:nth-child(2) { animation-delay: 20ms; }
    .content-list table tr:nth-child(3) { animation-delay: 40ms; }
    .content-list table tr:nth-child(4) { animation-delay: 60ms; }
    .content-list table tr:nth-child(5) { animation-delay: 80ms; }

    .toast-container .toast {
      animation: toastSlideIn 250ms ease;
    }

    .context-file.highlight {
      animation: contextHighlight 0.6s ease-out;
    }

      color: var(--text);

      color: var(--faint);

    /* T003: mind 生成态 — Markdown 大纲流式预览 */
    .markmap-stream {
      min-height: 178px;
      padding: 12px 14px;
      border-radius: 12px;
      background: linear-gradient(180deg, #f7faff 0%, #ffffff 100%);
      border: 1px solid var(--line);
      font-family: "JetBrains Mono", "SF Mono", "Menlo", Consolas, "Source Han Mono SC", monospace;
      font-size: 12px;
      line-height: 1.7;
      color: var(--muted);
      overflow: hidden;
    }
    .markmap-stream-text {
      display: grid;
      gap: 2px;
      white-space: pre-wrap;
      animation: streamFadeIn 600ms ease-out;
    }
    @keyframes streamFadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .markmap-stream .ms-h1 { color: var(--blue);   font-weight: 700; }
    .markmap-stream .ms-h2 { color: var(--violet); font-weight: 600; }
    .markmap-stream .ms-li { color: var(--text); }
    .markmap-stream .ms-cursor { position: relative; }
    .markmap-stream .ms-blink {
      display: inline-block;
      width: 6px;
      height: 13px;
      margin-left: 4px;
      vertical-align: text-bottom;
      background: var(--blue);
      animation: msBlink 900ms steps(2, start) infinite;
    }
    @keyframes msBlink {
      to { opacity: 0; }
    }

    .mindmap-preview {
      min-height: 260px;
      position: relative;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 16px;
      background:
        linear-gradient(#eef3ff 1px, transparent 1px),
        linear-gradient(90deg, #eef3ff 1px, transparent 1px),
        radial-gradient(circle at 50% 50%, #ffffff 0 22%, #f7faff 23% 100%);
      background-size: 22px 22px, 22px 22px, auto;
    }

    .mindmap-preview svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      color: #9bbcff;
      pointer-events: none;
    }

    .mind-node {
      position: absolute;
      min-width: 86px;
      padding: 8px 10px;
      border: 1px solid var(--line-strong);
      border-radius: 9999px;
      color: var(--text);
      background: #ffffff;
      box-shadow: 0 8px 18px rgba(22, 93, 255, 0.08);
      font-size: 12px;
      font-weight: 600;
      text-align: center;
    }

    .mind-node.core {
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      color: #ffffff;
      background: var(--blue);
      border-color: transparent;
    }

    .mind-node.n1 { left: 28px; top: 44px; }
    .mind-node.n2 { right: 30px; top: 42px; }
    .mind-node.n3 { left: 38px; bottom: 42px; }
    .mind-node.n4 { right: 38px; bottom: 42px; }

    /* T003: 完成态 — Markmap 风格多层级节点 */
    .mindmap-preview.markmap-style {
      min-height: 280px;
    }
    .mind-node.mm-core {
      /* 覆盖默认 core 的颜色，让根节点更突出 */
      background: var(--gradient-brand);
      padding: 10px 14px;
      font-size: 13px;
    }
    .mind-node.mm-l1 {
      background: #ffffff;
      border-color: var(--line-strong);
      color: var(--text);
      font-size: 12px;
    }
    .mind-node.mm-l2 {
      background: #f7faff;
      border-color: var(--line);
      color: var(--muted);
      font-size: 11px;
      min-width: 70px;
      padding: 6px 8px;
    }
    /* 第 1 级 6 个节点位置（左 3 + 右 3，百分比） */
    .mind-node.mm-pos-l-top { left: 13%; top: 20%;  }
    .mind-node.mm-pos-l-mid { left: 13%; top: 50%; transform: translateY(-50%); }
    .mind-node.mm-pos-l-bot { left: 13%; top: 80%; transform: translateY(-100%); }
    .mind-node.mm-pos-r-top { right: 13%; top: 20%; }
    .mind-node.mm-pos-r-mid { right: 13%; top: 50%; transform: translateY(-50%); }
    .mind-node.mm-pos-r-bot { right: 13%; top: 80%; transform: translateY(-100%); }
    /* 第 2 级 4 个节点位置（贴左右边） */
    .mind-node.mm-pos-ll-top { left: 0;  top: 14%; }
    .mind-node.mm-pos-ll-bot { left: 0;  top: 36%; }
    .mind-node.mm-pos-rr-top { right: 0; top: 64%; }
    .mind-node.mm-pos-rr-bot { right: 0; top: 86%; transform: translateY(-100%); }

    .flashcard-preview {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .flashcard {
      min-height: 116px;
      display: grid;
      align-content: space-between;
      gap: 10px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: linear-gradient(180deg, #ffffff, #f8fbff);
      box-shadow: var(--soft-shadow);
    }

    .flashcard::before {
      content: "";
      width: 28px;
      height: 3px;
      border-radius: 9999px;
      background: var(--blue);
      opacity: 0.5;
    }

    .flashcard strong {
      color: var(--text);
      font-size: 13px;
      line-height: 1.35;
    }

    .flashcard span {
      color: var(--faint);
      font-size: 12px;
      line-height: 1.4;
    }

    /* ============================================================
       T005 — 闪卡牌组：单卡展示 + 3D 翻转 + 左右导航
       ============================================================ */
    .flashcard-deck {
      display: grid;
      grid-template-columns: 40px minmax(0, 1fr) 40px;
      align-items: center;
      gap: 12px;
    }

    .flashcard-nav {
      width: 40px;
      height: 40px;
      display: grid;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: 50%;
      background: #ffffff;
      color: var(--muted);
      cursor: pointer;
      box-shadow: var(--soft-shadow);
      transition: border-color var(--t-fast) var(--ease), background var(--t-fast) var(--ease), color var(--t-fast) var(--ease), transform var(--t-fast) var(--ease);
    }

    .flashcard-nav:hover {
      border-color: rgba(22,93,255,0.28);
      background: var(--chip);
      color: var(--text);
      transform: translateY(-1px);
    }

    .flashcard-nav:active {
      transform: scale(0.94);
    }

    .flashcard-nav svg {
      width: 18px;
      height: 18px;
    }

    .flashcard-stage {
      perspective: 1400px;
      min-height: 220px;
      display: grid;
      place-items: center;
    }

    .flashcard-3d {
      position: relative;
      width: 100%;
      min-height: 220px;
      cursor: pointer;
      transform-style: preserve-3d;
    }

    .flashcard-3d:focus-visible {
      outline: none;
    }

    .flashcard-3d:focus-visible .flashcard-3d-inner {
      box-shadow: 0 0 0 3px rgba(22, 93, 255, 0.18);
      border-radius: 14px;
    }

    .flashcard-3d-inner {
      position: relative;
      width: 100%;
      height: 100%;
      min-height: 220px;
      transform-style: preserve-3d;
      transition: transform 600ms cubic-bezier(0.2, 0.8, 0.2, 1);
      will-change: transform;
    }

    .flashcard-3d.is-flipped .flashcard-3d-inner {
      transform: rotateY(180deg);
    }

    .flashcard-face {
      position: absolute;
      inset: 0;
      display: grid;
      align-content: space-between;
      gap: 12px;
      padding: 22px 20px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: linear-gradient(180deg, #ffffff, #f8fbff);
      box-shadow: 0 8px 22px rgba(22,93,255,0.06), 0 1px 3px rgba(0,0,0,0.04);
      -webkit-backface-visibility: hidden;
      backface-visibility: hidden;
    }

    .flashcard-face-back {
      background: linear-gradient(180deg, #fdfaff, #f5efff);
      transform: rotateY(180deg);
    }

    .flashcard-tag {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      padding: 3px 10px;
      border-radius: 9999px;
      background: rgba(22,93,255,0.10);
      color: var(--blue);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1px;
    }

    .flashcard-tag-answer {
      background: rgba(107,76,255,0.12);
      color: var(--violet);
    }

    .flashcard-question {
      color: var(--text);
      font-size: 16px;
      font-weight: 600;
      line-height: 1.45;
      letter-spacing: 0;
    }

    .flashcard-answer {
      margin: 0;
      color: var(--text);
      font-size: 14px;
      line-height: 1.6;
    }

    .flashcard-hint {
      color: var(--faint);
      font-size: 11px;
    }

    .flashcard-3d:hover .flashcard-face {
      border-color: rgba(22,93,255,0.22);
      box-shadow: 0 12px 28px rgba(22,93,255,0.10), 0 2px 6px rgba(0,0,0,0.05);

    .flashcard-meta {

      justify-content: space-between;
      gap: 12px;
      margin-top: 14px;

      gap: 6px;

    .flashcard-dot {

      height: 7px;
      padding: 0;

      border-radius: 50%;

    .flashcard-dot:hover {
      background: var(--muted);

      border-color: transparent;
    }

    .template-current {
      display: grid;
      grid-template-columns: 52px 1fr;
      gap: 10px;
      min-width: 0;
      align-items: center;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #f8fbff;
    }

    .template-preview {
      height: 42px;
      border-radius: 8px;
      background: linear-gradient(135deg, #165dff, #8b6cff);
    }

    .template-current strong {
      display: block;
      color: var(--text);
      font-size: 13px;
      line-height: 1.25;
    }

    .template-current span {
      display: block;
      margin-top: 4px;
      color: var(--faint);
      font-size: 11px;
      line-height: 1.35;
    }

    .template-filter-group {
      display: grid;
      gap: 7px;
    }

    .template-filter-group > span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
    }

    .template-filter-row {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .template-list {
      display: grid;
      gap: 10px;
    }

    .template-card {
      display: grid;
      grid-template-columns: 68px 1fr;
      gap: 10px;
      align-items: center;
      min-width: 0;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #ffffff;
      text-align: left;
      transition: background 140ms ease, border-color 140ms ease;
    }

    .template-card:hover,
    .template-card.active {
      border-color: #bedaff;
      background: #f7faff;
    }

    .template-thumb {
      height: 48px;
      border-radius: 12px;
      background: var(--template-color, linear-gradient(135deg, #165dff, #8b6cff));
    }

    .template-card strong {
      display: block;
      color: var(--text);
      font-size: 13px;
      line-height: 1.25;
    }

    .template-card span {
      display: block;
      margin-top: 4px;
      color: var(--faint);
      font-size: 11px;
      line-height: 1.35;
    }

    .upload-placeholder {
      display: grid;
      gap: 6px;
      place-items: center;
      min-height: 86px;
      padding: 14px;
      border: 1px dashed #bedaff;
      border-radius: 12px;
      color: var(--muted);
      background: #f8fbff;
      text-align: center;
      font-size: 12px;
    }

    .upload-placeholder strong {
      color: var(--text);
      font-size: 13px;
    }

    .color-dots {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .color-dot {
      min-width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: 9999px;
      color: var(--muted);
      background: #ffffff;
      font-size: 11px;
      font-weight: 600;
    }

    .color-dot.active {
      color: #ffffff;
      border-color: transparent;
      background: var(--dot-color, var(--blue));
    }

    .ppt-modal {
      position: fixed;
      inset: 0;
      z-index: 120;
      display: grid;
      background: #ffffff;
    }

    .ppt-modal[hidden] {
      display: none;
    }

    .ppt-modal-shell {
      min-height: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      background: #ffffff;
    }

    .ppt-modal-head {
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 0 24px;
      border-bottom: 1px solid var(--line);
    }

    .ppt-modal-head h3 {
      margin: 0;
      color: var(--text);
      font-size: 18px;
    }

    .ppt-modal-close,
    .ppt-modal-back {
      min-width: 34px;
      height: 34px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      border-radius: 12px;
      color: var(--text);
      font-size: 14px;
      font-weight: 600;
    }

    .ppt-modal-back {
      padding: 0 8px;
    }

    .ppt-modal-close:hover,
    .ppt-modal-back:hover {
      background: var(--chip);
    }

    .ppt-modal-body {
      min-height: 0;
      overflow: auto;
      padding: 18px 20px;
    }

    .ppt-modal-filters {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 18px;
    }

    .ppt-filter-select {
      min-width: 144px;
      height: 32px;
      display: inline-flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--text);
      background: #ffffff;
      font-size: 13px;
    }

    .ppt-filter-select.active {
      color: var(--blue);
      border-color: #bedaff;
      background: #f4f7ff;
    }

    .ppt-filter-color {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 1px solid var(--line-strong);
      background: conic-gradient(#ff4d4f, #ff7d00, #fadb14, #00b42a, #14c9c9, #165dff, #722ed1, #ff4d4f);
    }

    .ppt-template-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
      padding-bottom: 76px;
    }

    .ppt-template-tile {
      min-width: 0;
      display: grid;
      gap: 9px;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #ffffff;
      text-align: left;
      transition: border-color 140ms ease, box-shadow 140ms ease;
    }

    .ppt-template-tile:hover,
    .ppt-template-tile.active {
      border-color: #9bbcff;
      box-shadow: var(--shadow);
    }

    .ppt-template-cover {
      height: 138px;
      border-radius: 12px;
      background: var(--cover, linear-gradient(135deg, #165dff, #8b6cff));
    }

    .ppt-template-tile strong {
      color: var(--text);
      font-size: 14px;
      line-height: 1.3;
    }

    .ppt-template-tile span {
      color: var(--faint);
      font-size: 12px;
      line-height: 1.35;
    }

    .ppt-add-template {
      min-height: 214px;
      display: grid;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #ffffff;
      color: var(--muted);
      text-align: center;
    }

    .ppt-add-template strong {
      display: grid;
      place-items: center;
      width: 30px;
      height: 30px;
      margin: 0 auto 12px;
      border-radius: 50%;
      color: #ffffff;
      background: var(--blue);
      font-size: 20px;
    }

    .ppt-modal-footer {
      min-height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 20px;
      border-top: 1px solid var(--line);
      background: #ffffff;
    }

    .ppt-modal-footer strong {
      color: var(--blue);
      font-size: 13px;
    }

    .ppt-modal-actions {
      display: flex;
      gap: 10px;
    }

    .ppt-custom-tabs {
      display: flex;
      gap: 28px;
      padding: 0 24px;
      border-bottom: 1px solid var(--line);
    }

    .ppt-custom-tab {
      height: 50px;
      border: 0;
      border-radius: 0;
      background: transparent;
      color: var(--text);
      border-bottom: 2px solid transparent;
      font-size: 15px;
      font-weight: 600;
    }

    .ppt-custom-tab.active {
      background: transparent;
      color: var(--blue);
      border-bottom-color: var(--blue);
    }

    .ppt-custom-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(360px, 0.95fr);
      gap: 42px;
      padding: 28px 36px;
    }

    .ppt-custom-form {
      display: grid;
      align-content: start;
      gap: 22px;
    }

    .ppt-upload-large {
      min-height: 144px;
      display: grid;
      place-items: center;
      padding: 18px;
      border: 1px dashed #d8dce6;
      border-radius: 12px;
      color: var(--faint);
      background: #ffffff;
      text-align: center;
      font-size: 13px;
      line-height: 1.6;
      cursor: pointer;
      transition: border-color var(--t-fast) var(--ease), background var(--t-fast) var(--ease), color var(--t-fast) var(--ease);
    }
    .ppt-upload-large:hover {
      border-color: var(--blue);
      background: #f8fafc;
      color: var(--text);
    }
    .ppt-upload-large.success {
      border-color: var(--green);
      background: rgba(0, 180, 42, 0.03);
      color: var(--green);
    }

    .ppt-upload-pair {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .ppt-guide-row,
    .ppt-palette-row {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .ppt-guide-card,
    .ppt-palette-card {
      min-height: 74px;
      border-radius: 12px;
      background: #eef4ff;
    }

    .ppt-palette-card {
      min-height: 62px;
      border: 1px solid transparent;
      background: var(--palette, linear-gradient(90deg, #165dff, #67a4ff));
    }

    .ppt-palette-card.active {
      border-color: var(--blue);
      box-shadow: 0 0 0 2px #e8f1ff;
    }

    .ppt-custom-preview {
      min-height: 354px;
      display: grid;
      place-items: center;
      border-radius: 16px;
      background: #f3f6ff;
      color: #4b73d9;
      text-align: center;
      box-shadow: var(--shadow-elevated);
    }

    .ppt-custom-preview h2 {
      margin: 0 0 18px;
      font-size: 42px;
      letter-spacing: 0;
    }

    .ppt-custom-preview span {
      display: block;
      color: var(--text);
      font-size: 24px;
      font-weight: 600;
    }

    @media (max-width: 1100px) {
      .ppt-template-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .ppt-custom-layout {
        grid-template-columns: 1fr;
      }
    }

    .assistant-empty {
      min-height: 100%;
      display: grid;
      place-items: center;
      padding: 34px 10px 44px;
      text-align: center;
      color: var(--faint);
    }

    .assistant-empty-content {
      display: grid;
      justify-items: center;
      gap: 14px;
      max-width: 310px;
    }

    .assistant-empty-logo {
      width: 66px;
      height: 66px;
      display: grid;
      place-items: center;
      border-radius: 16px;
      color: #ffffff;
      background: linear-gradient(135deg, #8b6cff 0%, #5c42ff 100%);
      box-shadow: 0 18px 36px rgba(92, 66, 255, 0.22), 0 0 40px rgba(92, 66, 255, 0.08);
      animation: floatGently 4s ease-in-out infinite;
      position: relative;
    }

    .assistant-empty-logo::after {
      content: "";
      position: absolute;
      inset: -12px;
      border-radius: 16px;
      background: radial-gradient(circle, rgba(107, 76, 255, 0.08) 0%, transparent 70%);
      animation: pulseGlow 3s ease-in-out infinite;
    }

    .assistant-empty-logo svg {
      width: 34px;
      height: 34px;
    }

    .assistant-empty h3 {
      margin: 6px 0 0;
      color: var(--text);
      font-size: 22px;
      line-height: 1.25;
      font-weight: 700;
      letter-spacing: 1px;
    }

    .assistant-empty p {
      margin: 0;
      color: var(--faint);
      font-size: 14px;
      line-height: 1.7;
    }

    .assistant-empty-simple {
      min-height: 100%;
      display: grid;
      place-items: center;
      padding: 36px 18px 44px;
      text-align: center;
      color: var(--faint);
    }

    .assistant-empty-simple .assistant-empty-content {
      max-width: 260px;
      gap: 12px;
    }

    .assistant-empty-simple .assistant-empty-logo {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      animation: none;
    }

    .assistant-empty-simple .assistant-empty-logo::after {
      display: none;
    }

    .assistant-empty-simple h3 {
      margin-top: 2px;
      font-size: 17px;
      letter-spacing: 0;
    }

    .assistant-empty-simple p {
      max-width: 220px;
      font-size: 13px;
      line-height: 1.65;
    }

    .assistant-ideas {
      width: min(310px, 100%);
      display: grid;
      gap: 8px;
      margin-top: 6px;
    }

    .assistant-ideas-label {
      color: var(--faint);
      font-size: 12px;
      font-weight: 600;
    }

    .idea-chip {
      min-height: 34px;
      display: inline-flex;
      align-items: center;
      justify-content: flex-start;
      gap: 8px;
      padding: 7px 10px;
      border: 1px solid var(--line);
      border-radius: 9999px;
      color: var(--blue);
      background: #f7faff;
      font-size: 12px;
      font-weight: 600;
      text-align: left;
      transition: background 140ms ease, border-color 140ms ease, transform 140ms ease;
      animation: chipFadeIn 400ms ease-out backwards;
    }

    .idea-chip:nth-child(1) { animation-delay: 0.1s; }
    .idea-chip:nth-child(2) { animation-delay: 0.2s; }
    .idea-chip:nth-child(3) { animation-delay: 0.3s; }
    .idea-chip:nth-child(4) { animation-delay: 0.4s; }

    .idea-chip:hover {
      border-color: #bedaff;
      background: #eef4ff;
      transform: translateY(-1px);
    }

    .idea-chip span:first-child {
      width: 18px;
      height: 18px;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      border-radius: 8px;
      color: #ffffff;
      background: var(--blue);
      font-size: 10px;
      font-weight: 700;
    }

    /* T001-C: 空态能力卡片网格 */
    .assistant-ideas.idea-grid {
      width: min(360px, 100%);
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 8px;
    }
    .assistant-ideas.idea-grid .assistant-ideas-label {
      grid-column: 1 / -1;
      margin-bottom: 2px;
    }
    .idea-card {
      display: grid;
      grid-template-columns: 36px 1fr;
      grid-template-rows: auto auto;
      column-gap: 10px;
      row-gap: 2px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #ffffff;
      text-align: left;
      cursor: pointer;
      box-shadow: var(--soft-shadow);
      transition: border-color var(--t-fast) var(--ease), background var(--t-fast) var(--ease), transform var(--t-fast) var(--ease), box-shadow var(--t-fast) var(--ease);
      animation: chipFadeIn 400ms ease-out backwards;
    }
    .idea-card:nth-child(2) { animation-delay: 0.10s; }
    .idea-card:nth-child(3) { animation-delay: 0.18s; }
    .idea-card:nth-child(4) { animation-delay: 0.26s; }
    .idea-card:nth-child(5) { animation-delay: 0.34s; }
    .idea-card:hover {
      border-color: rgba(22,93,255,0.22);
      background: linear-gradient(180deg, #fafbff, #ffffff);
      transform: translateY(-2px);
      box-shadow: var(--shadow);
    }
    .idea-card:active { transform: scale(0.98); }
    .idea-card-icon {
      grid-row: 1 / span 2;
      width: 36px;
      height: 36px;
      display: grid;
      place-items: center;
      border-radius: 10px;
      background: linear-gradient(135deg, rgba(22,93,255,0.10), rgba(107,76,255,0.10));
      color: var(--blue);
    }
    .idea-card-icon svg { width: 18px; height: 18px; }
    .idea-card[data-tone="violet"] .idea-card-icon { background: linear-gradient(135deg, rgba(107,76,255,0.14), rgba(107,76,255,0.06)); color: var(--violet); }
    .idea-card[data-tone="blue"]   .idea-card-icon { background: linear-gradient(135deg, rgba(22,93,255,0.14), rgba(22,93,255,0.06));  color: var(--blue); }
    .idea-card[data-tone="amber"]  .idea-card-icon { background: linear-gradient(135deg, rgba(255,125,0,0.14), rgba(255,125,0,0.06)); color: #d96a00; }
    .idea-card[data-tone="green"]  .idea-card-icon { background: linear-gradient(135deg, rgba(0,180,42,0.14), rgba(0,180,42,0.06));   color: #00872a; }
    .idea-card-title {
      color: var(--text);
      font-size: var(--fs-sm);
      font-weight: 600;
      line-height: 1.3;
    }
    .idea-card-sub {
      color: var(--faint);
      font-size: var(--fs-meta);
      line-height: 1.4;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .message {
      display: grid;
      grid-template-columns: 34px minmax(0, 1fr);
      gap: 10px;
      margin-bottom: 15px;
      align-items: flex-start;
      min-width: 0;
    }

    .message.user {
      grid-template-columns: minmax(0, 1fr) 34px;
    }

    .bot-mark,
    .user-mark {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-weight: 700;
      font-size: 12px;
      flex: 0 0 auto;
    }

    .bot-mark {
      color: #ffffff;
      background: linear-gradient(135deg, #165dff 0%, #6b4cff 100%);
      box-shadow: 0 4px 10px rgba(107, 76, 255, 0.2);
    }

    .user-mark {
      color: white;
      background: linear-gradient(135deg, #6b4cff, #8b5cff);
      box-shadow: 0 4px 10px rgba(107, 76, 255, 0.18);
    }

    .message {
      animation: messageIn 300ms ease-out;
    }

    .bubble {
      padding: 14px 15px;
      border-radius: 12px;
      color: #3d465c;
      background: #ffffff;
      line-height: 1.7;
      font-size: 13.5px;
      letter-spacing: 0.15px;
      box-shadow: var(--shadow);
      overflow-wrap: anywhere;
      min-width: 0;
      max-width: 100%;
    }

    .message.user .bubble {
      justify-self: end;
      color: #2e3c64;
      background: linear-gradient(135deg, #eef3ff 0%, #f0f0ff 100%);
      box-shadow: 0 1px 2px rgba(107, 76, 255, 0.06), 0 4px 12px rgba(107, 76, 255, 0.05);
    }

    .bubble ol,
    .bubble ul {
      margin: 8px 0 0 18px;
      padding: 0;
    }

    .bubble li {
      margin: 5px 0;
    }

    .result-card {
      margin-top: 10px;
      padding: 12px;
      border-radius: 12px;
      background: #f7f9ff;
      border: 1px solid var(--line);
    }

    .result-card h4 {
      margin: 0 0 8px;
      color: #293553;
      font-size: 13px;
    }

    .outline-list {
      display: grid;
      gap: 7px;
    }

    .outline-row {
      display: grid;
      grid-template-columns: 22px 1fr auto;
      gap: 8px;
      align-items: center;
      color: #4c5870;
      font-size: 12px;
    }

    .outline-num {
      width: 22px;
      height: 22px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      color: var(--blue);
      background: #edf3ff;
      font-weight: 700;
      font-size: 11px;
    }

    .chat-production {
      display: grid;
      gap: 10px;
      margin-top: 12px;
      padding: 12px;
      border: 1px solid rgba(255,255,255,0.68);
      border-radius: 16px;
      background: rgba(255,255,255,0.58);
      box-shadow: 0 10px 26px rgba(35, 40, 56, 0.06);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    .chat-production-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      color: #5f6878;
      font-size: 12px;
      font-weight: 650;
    }

    .chat-production-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .chat-production-button {
      min-height: 38px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      padding: 0 10px;
      border: 1px solid rgba(216, 224, 238, 0.72);
      border-radius: 12px;
      color: #313946;
      background: rgba(255,255,255,0.68);
      font-size: 12px;
      font-weight: 700;
      transition: transform 160ms ease, border-color 160ms ease, background 160ms ease, color 160ms ease;
    }

    .chat-production-button:hover {
      transform: translateY(-1px);
      color: #5b2df5;
      border-color: rgba(91,45,245,0.24);
      background: rgba(255,255,255,0.9);
    }

    .chat-production-button svg {
      width: 16px;
      height: 16px;
      color: #5b2df5;
    }

    .loading {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--blue);
      font-weight: 600;
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid #cbd8ff;
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin 850ms linear infinite;
    }

    .thinking-dots {
      display: inline-flex;
      gap: 4px;
      align-items: center;
      height: 20px;
    }

    .thinking-dots span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--blue);
      animation: dotWave 1.2s ease-in-out infinite;
    }

    .thinking-dots span:nth-child(2) { animation-delay: 0.15s; }
    .thinking-dots span:nth-child(3) { animation-delay: 0.3s; }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .composer {
      padding: 0 22px 18px;
      background: #ffffff;
      border-top: 1px solid transparent;
      background-image: linear-gradient(#ffffff, #ffffff), linear-gradient(90deg, transparent, rgba(107, 76, 255, 0.1), transparent);
      background-origin: border-box;
      background-clip: padding-box, border-box;
    }

    .composer-inner {
      display: grid;
      grid-template-rows: minmax(74px, auto) auto;
      gap: 10px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: #ffffff;
      box-shadow: var(--shadow);
    }

    .composer-inner:focus-within {
      border-color: rgba(107, 76, 255, 0.3);
      box-shadow: 0 0 0 3px rgba(107, 76, 255, 0.08), var(--shadow);
    }

    .composer textarea {
      min-height: 74px;
      max-height: 140px;
      resize: vertical;
      border: 0;
      outline: 0;
      padding: 0;
      color: var(--text);
      background: transparent;
      line-height: 1.5;
      font-size: 15px;
    }

    .composer textarea::placeholder {
      color: #9aa3b2;
    }

    .composer-tools {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .composer-tool-group {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .composer-tool,
    .speed-select {
      height: 36px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: 12px;
      color: var(--text);
      background: #ffffff;
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      transition: background 140ms ease, color 140ms ease, border-color 140ms ease;
    }

    .composer-tool {
      width: 36px;
      padding: 0;
    }

    .composer-tool:hover,
    .composer-tool.active,
    .speed-select:hover,
    .speed-select.active {
      color: var(--blue);
      border-color: rgba(107, 76, 255, 0.25);
      background: #f7f8ff;
      transform: translateY(-1px);
    }

    .composer-tool svg,
    .speed-select svg {
      width: 18px;
      height: 18px;
      stroke-width: 2.1;
    }

    .send-button {
      width: 44px;
      height: 44px;
      display: grid;
      place-items: center;
      border-radius: 12px;
      color: white;
      background: linear-gradient(135deg, #165dff 0%, #6b4cff 100%);
      box-shadow: 0 4px 12px rgba(107, 76, 255, 0.25);
      transition: all 180ms ease;
    }

    .send-button:hover {
      box-shadow: 0 6px 20px rgba(107, 76, 255, 0.35);
      transform: translateY(-1px);
    }

    .send-button:active {
      transform: scale(0.95);
      box-shadow: 0 2px 8px rgba(107, 76, 255, 0.2);
    }

    .send-button svg {
      width: 19px;
      height: 19px;
    }

    .composer-footer {
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
      padding: 10px 2px 0;
      color: var(--faint);
      font-size: 11px;
      line-height: 1.4;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 26px;
      z-index: 2000;
      transform: translate(-50%, 20px);
      min-width: 220px;
      padding: 12px 16px;
      border-radius: 12px;
      color: var(--text);
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      opacity: 0;
      pointer-events: none;
      transition: opacity 180ms ease, transform 180ms ease;
      text-align: center;
      font-size: 13px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .toast.show {
      opacity: 1;
      transform: translate(-50%, 0);
      pointer-events: auto;
    }

    .toast-undo {
      height: 28px;
      padding: 0 10px;
      border-radius: 8px;
      background: var(--blue);
      color: #ffffff;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }

    .toast-undo:hover {
      background: #0e42d2;
    }

    .delete-confirm {
      position: fixed;
      z-index: 120;
      display: grid;
      gap: 12px;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #ffffff;
      box-shadow: var(--shadow);
      min-width: 280px;
      animation: confirmFadeIn 200ms ease-out;
    }

    .delete-confirm strong {
      color: var(--text);
      font-size: 14px;
      line-height: 1.35;
    }

    .delete-confirm span {
      color: var(--faint);
      font-size: 12px;
      line-height: 1.4;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .delete-confirm-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    .delete-confirm-cancel {
      height: 32px;
      padding: 0 12px;
      border-radius: 8px;
      background: var(--chip);
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .delete-confirm-cancel:hover {
      background: #e8e8e8;
    }

    .delete-confirm-danger {
      height: 32px;
      padding: 0 12px;
      border-radius: 8px;
      background: var(--red);
      color: #ffffff;
      font-size: 13px;
      font-weight: 700;
    }

    .delete-confirm-danger:hover {
      background: #c74343;
    }

    @keyframes confirmFadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 1380px) {
      :root {
        --nav: 72px;
        --sidebar: 230px;
        --assistant: 390px;
      }

      .topbar {

      .workspace {

      .brand-lockup {

      }

      .rail {
        padding: 0 8px;

      }

      .brand-lockup {

      }

      }

      .new-button,
      .rail-button,

      }

      .rail-button {

        padding: 0;

      }

      }

      .filter-box {
        margin-left: 18px;

      }

      }

      .assistant-head,

      }
    }

    @media (max-width: 1220px) {
      :root {
        --nav: 72px;
        --sidebar: 210px;
        --assistant: 330px;
      }

      .shell {
        padding: 18px;
      }

      .workspace {
        grid-template-columns: var(--sidebar) minmax(0, 1fr) 12px var(--assistant);
        gap: 12px;
      }

      .app.assistant-collapsed .workspace {
        grid-template-columns: var(--sidebar) minmax(0, 1fr);
      }

      .topbar {
        grid-template-columns: minmax(220px, 1fr) 300px auto auto;
        gap: 12px;
      }

      .title h1 {
        font-size: 25px;
      }

      .title p {
        max-width: 560px;
      }

      .section,
      .content-list {
        padding-left: 18px;
        padding-right: 18px;
      }

      .filter-box {
        margin-left: 18px;
        margin-right: 18px;
      }

      .ingest-cards {
        flex-wrap: wrap;
      }

      .ingest-card {
        min-height: 40px;
        padding: 0 13px;
      }

      .assistant-head,
      .chat,
      .composer {
        padding-left: 16px;
        padding-right: 16px;
      }
    }

    body.fit-preview .rail {
      padding: 0 12px;
      align-items: stretch;
    }

    body.fit-preview .app-logo {
      width: auto;
      justify-content: space-between;

    body.fit-preview .brand-lockup {

      font-size: 20px;
    }

    body.fit-preview .brand-lockup span,
    body.fit-preview .new-button span:not(:first-child),
    body.fit-preview .rail-button span,
    body.fit-preview .user-row span {
      display: inline;
    }

    body.fit-preview .task-tabs {
      display: flex;
    }

    body.fit-preview .empty-task {
      display: grid;
    }

    body.fit-preview .collapse-button {
      display: grid;
    }

    body.fit-preview .new-button,
    body.fit-preview .rail-button,

    body.fit-preview .rail-button {
      grid-template-columns: 22px 1fr auto;
      align-items: center;

      padding: 0 16px;
