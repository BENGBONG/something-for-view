              <div class="move-folder-item" style="--picker-depth:${folder.pickerDepth || 0}">

                  <button class="move-folder-toggle ${state.moveFolderExpanded.has(folder.id) ? "expanded" : ""}" data-move-folder-toggle="${folder.id}" type="button" aria-label="${state.moveFolderExpanded.has(folder.id) ? "收起" : "展开"} ${escapeHtml(folder.name)}">▸</button>
                ` : `<span class="move-folder-toggle-placeholder" aria-hidden="true"></span>`}

                  <span>${escapeHtml(folder.name)}</span>
                  <em>${folderCount(folder.id)}</em>
                </button>
              </div>
            `).join("")}
          </div>
          <div class="knowledge-picker-foot">
            <button class="small-button" data-move-close type="button">取消</button>
            <button class="small-button primary" data-move-apply type="button">移动到此目录</button>
          </div>
        </div>
      `;

      els.moveFolderModal.querySelectorAll("[data-move-close]").forEach(button => {
        button.addEventListener("click", closeMoveFolderModal);
      });
      els.moveFolderModal.onclick = event => {
        if (event.target === els.moveFolderModal) closeMoveFolderModal();
      };
      els.moveFolderModal.querySelectorAll("[data-move-folder-toggle]").forEach(button => {
        button.addEventListener("click", event => {
          event.preventDefault();
          event.stopPropagation();
          const folderId = button.dataset.moveFolderToggle;
          if (state.moveFolderExpanded.has(folderId)) {
            state.moveFolderExpanded.delete(folderId);
          } else {
            state.moveFolderExpanded.add(folderId);
          }
          renderMoveFolderModal();
        });
      });
      els.moveFolderModal.querySelectorAll("[data-move-folder]").forEach(button => {
        button.addEventListener("click", () => {
          state.moveTargetFolder = button.dataset.moveFolder;
          renderMoveFolderModal();
        });
      });
      els.moveFolderModal.querySelector("[data-move-apply]").addEventListener("click", applyMoveSelectedFiles);

    function renderWorkspaceShell() {
      const config = workspaceConfig();
      const previewFile = state.activeWorkspace === "files" ? currentPreviewFile() : null;
      const selectedFolder = folders.find(folder => folder.id === state.selectedFolder);
      const childFolderCount = state.activeWorkspace === "files" && !previewFile ? directChildFolders(state.selectedFolder || workspaceRootId()).length : 0;
      const directFiles = state.activeWorkspace === "files" && !previewFile ? directFileCount(state.selectedFolder || workspaceRootId()) : 0;
      els.pageTitle.textContent = config.navTitle;
      els.pageSubtitle.textContent = config.navSubtitle;
      if (previewFile) {
        els.mainTitle.textContent = "文件预览";
        els.mainSubtitle.textContent = `${folderPathLabel(previewFile.folder)} · ${previewFile.updated}`;
      } else if (state.activeWorkspace === "files" && selectedFolder) {
        els.mainTitle.textContent = selectedFolder.name;
        els.mainSubtitle.textContent = `当前目录包含 ${childFolderCount} 个下级目录、${directFiles} 个文件。`;
      } else {
        els.mainTitle.textContent = config.mainTitle;
        els.mainSubtitle.textContent = config.mainSubtitle;
      }
      els.fileSearch.placeholder = config.searchPlaceholder;
      if (els.toolbar) els.toolbar.style.display = state.activeWorkspace === "voice" || !!previewFile ? "none" : "";
      els.ingestCards.innerHTML = config.ingest.map(item => `
        <button class="ingest-card ${item.className || ""}" ${item.action ? `data-ingest-action="${escapeHtml(item.action)}"` : `data-toast="${escapeHtml(item.toast)}"`} type="button">

    function renderPager(count, unit = "个文件") {

          <span>共 ${count} ${unit}</span>

          <button class="small-button">20 条/页</button>
        </div>
      `;
    }

    function renderSelection() {
      const count = state.selectedFiles.size;
      const summary = els.selectionText.closest(".selected-summary");
      if (summary) summary.style.display = count > 0 ? "" : "none";
      els.selectionText.textContent = count > 0
        ? `已选 ${count} 个文件，可移动到其他目录`
        : "";
      if (els.moveButton) {
        els.moveButton.disabled = count === 0 || state.activeWorkspace !== "files";
        els.moveButton.setAttribute("aria-disabled", String(els.moveButton.disabled));
      }
    }

    function renderTaskMenu() {
      if (!els.assistantRail) return;
      const queueBadge = state.tasks.filter(task => task.status !== "done").length || state.tasks.length;
      els.assistantWake?.classList.toggle("has-tasks", queueBadge > 0);
      if (els.assistantWakeBadge) els.assistantWakeBadge.textContent = String(queueBadge);
      if (!state.tasks.length) {
        els.appShell?.classList.add("assistant-no-rail");
        els.assistantPanel?.classList.add("no-rail");
        els.assistantRail.hidden = true;
        els.assistantRail.innerHTML = "";
        updatePromptPlaceholder();
        return;
      }
      els.appShell?.classList.remove("assistant-no-rail");
      els.assistantPanel?.classList.remove("no-rail");
      els.assistantRail.hidden = false;
      els.assistantRail.innerHTML = `
        <div class="assistant-rail-top">
          <button class="assistant-rail-button assistant-rail-queue ${state.assistantView === "queue" ? "active" : ""}" data-rail-queue type="button" title="任务队列" aria-label="任务队列">
            <svg class="icon icon-md"><use href="#i-list"/></svg>
            <span class="assistant-rail-copy"><strong>任务队列</strong></span>
            <span class="assistant-rail-badge">${queueBadge}</span>
          </button>
        </div>
      `;
      els.assistantRail.querySelector("[data-rail-queue]")?.addEventListener("click", event => {
        event.preventDefault();
        event.stopPropagation();
        switchToQueue();
      });
      if (state.assistantCollapsed) {
        els.assistantRail.addEventListener("click", event => {
          event.preventDefault();
          event.stopPropagation();
          setAssistantCollapsed(false);
        }, { once: true });
      }
      updatePromptPlaceholder();
    }

    function handleTaskMenuSelection(event) {
      const button = event.target.closest?.("[data-task]");
      if (!button) return;
      event.preventDefault();
      event.stopPropagation();
      startTask(button.dataset.task);
    }

    function persistChatMarkup() {
      if (state.assistantView === "chat") {
        state.chatMarkup = els.chat.innerHTML;
      }
    }

    function bindEmptyTaskButtons() {
      els.chat.querySelectorAll("[data-empty-task]").forEach(button => {
        button.onclick = event => {
          event.preventDefault();
          event.stopPropagation();
          startTask(button.dataset.emptyTask);
        };
      });
    }

    function switchToChat() {
      state.assistantView = "chat";
      state.activeTaskType = null;
      state.activeTaskId = null;
      state.taskGenerationState = "idle";
      state.pptTemplateView = "setup";
      state.taskMenuOpen = false;
      els.assistantPanel.classList.remove("task-mode");
      els.chat.innerHTML = state.chatMarkup || "";
      if (!els.chat.innerHTML.trim()) {
        renderChatInitial();
      } else {
        mountChatTaskQueue();
        bindEmptyTaskButtons();
        updatePromptPlaceholder();
      }
      renderTaskMenu();
    }

    function switchToQueue() {
      state.assistantView = "queue";
      state.activeTaskType = null;
      state.activeTaskId = null;
      state.taskGenerationState = "idle";
      state.taskMenuOpen = false;
      state.taskQueueCollapsed = false;
      els.assistantPanel.classList.add("task-mode");
      renderTaskQueuePage();
      renderTaskMenu();
    }

    function createTask(taskId, source = "menu") {
      if (selectedReferenceIds().length === 0) {
        showToast("请先通过引用知识库添加文件");
        return null;
      }
      const existing = unfinishedTaskOfType(taskId);
      if (existing && source !== "duplicate-new" && source !== "shot") {
        state.pendingTaskType = taskId;
        if (state.assistantView === "chat") {
          persistChatMarkup();
        }
        els.assistantPanel.classList.remove("task-mode");
        state.assistantView = "chat";
        state.taskMenuOpen = false;
        renderTaskMenu();
        els.chat.innerHTML = renderDuplicateTaskPrompt(existing, taskId);
        bindDuplicateTaskPrompt();
        return existing;
      }
      if (state.assistantView === "chat") {
        persistChatMarkup();
      }
      const meta = taskMeta(taskId);
      const task = {
        id: `task-${++state.taskSerial}`,
        type: taskId,
        title: taskInstanceTitle(taskId),
        status: "configuring",
        progress: 0,
        config: cloneTaskConfig(taskId),
        result: null,
        references: selectedReferenceIds(),
        createdAt: new Date().toISOString(),
        source
      };
      state.tasks.unshift(task);
      if (taskId === "ppt") {
        state.pptTemplateView = "setup";
        state.pptStage = "idle";
        state.pptOutlineTitle = defaultPptOutlineTitle;
        state.pptOutlineAddMenu = null;
        state.pptOutlineExpanded = true;
        state.pptOutlineAdjusted = false;
        state.pptOutlineItems = createDefaultPptOutline();
        state.taskResults.ppt = false;
      }
      activateTask(task.id);
      return task;
    }

    function enqueueTaskFromChat(taskId, prompt) {
      const task = {
        id: `task-${++state.taskSerial}`,
        type: taskId,
        title: taskInstanceTitle(taskId),
        status: "configuring",
        progress: 0,
        config: cloneTaskConfig(taskId),
        result: null,
        references: selectedReferenceIds(),
        createdAt: new Date().toISOString(),
        source: "chat"
      };
      task.config.prompt = prompt;
      state.tasks.unshift(task);
      state.activeTaskId = task.id;
      state.activeTaskType = task.type;
      state.taskQueueCollapsed = true;
      renderTaskMenu();
      return task;
    }

    function detectTaskIntent(text) {
      const value = text.toLowerCase();
      if (/(ppt|幻灯片|演示文稿|汇报)/i.test(text)) return "ppt";
      if (/(思维导图|脑图|mind\s*map)/i.test(text)) return "mind";
      if (/(闪卡|学习卡|复习卡|卡片)/i.test(text)) return "cards";
      if (/(表格|数据表|结构化|清单|excel|xlsx)/i.test(text)) return "table";
      if (value.includes("ppt")) return "ppt";
      return null;
    }

    function activateTask(taskId) {
      const task = state.tasks.find(item => item.id === taskId);
      if (!task) return;
      state.assistantView = "task";
      state.activeTaskId = task.id;
      state.activeTaskType = task.type;
      state.taskMenuOpen = false;
      els.assistantPanel.classList.add("task-mode");
      if (task.type === "ppt") {
        const currentWidth = parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--assistant")) || 440;
        if (currentWidth < 500) setAssistantWidth(520, false);
      }
      state.taskGenerationState = taskStatusToGeneration(task.status);
      renderTaskMenu();
      renderTaskView();
    }

    function startTask(taskId, forceRegenerate = false) {
      if (!forceRegenerate) {
        createTask(taskId);
        return;
      }
      const task = currentTaskRecord();
      if (!task) {
        createTask(taskId);
        return;
      }
      task.status = "running";
      task.progress = 62;
      state.activeTaskType = task.type;
      state.taskGenerationState = "generating";
      if (task.type === "ppt") {
        state.pptStage = "analyzing";
        state.pptOutlineTitle = defaultPptOutlineTitle;
        state.pptOutlineAddMenu = null;
        state.pptOutlineExpanded = true;
        state.pptOutlineAdjusted = false;
        state.pptOutlineItems = createDefaultPptOutline();
      }
      renderTaskView();
      if (state.taskGenerationState === "generating") {
        window.setTimeout(() => {
          task.status = task.type === "ppt" ? "reviewing" : "done";
          task.progress = task.type === "ppt" ? 78 : 100;
          if (task.type === "ppt") {
            state.pptStage = "outline";
          }
          if (state.activeTaskId === task.id) {
            state.taskGenerationState = taskStatusToGeneration(task.status);
          }
          if (state.assistantView === "task") {
            renderTaskView();
          } else if (state.assistantView === "queue") {
            renderTaskQueuePage();
            renderTaskMenu();
          } else {
            mountChatTaskQueue();
            renderTaskMenu();
          }
        }, 900);
      }
    }

    function renderDuplicateTaskPrompt(existing, type) {
      const meta = taskMeta(type);
      return `
        <div class="assistant-empty">
          <div class="assistant-empty-content" style="max-width: 360px;">
            <div class="task-duplicate-card">
              <strong>已有一个 ${meta.name} 任务未完成</strong>
              <p>你可以继续编辑当前任务，也可以基于当前引用文件新建一个 ${meta.name} 任务。</p>
              <div class="task-actions">
                <button class="small-button primary" id="continueExistingTask" type="button">继续当前任务</button>
                <button class="small-button" id="createDuplicateTask" type="button">新建一个</button>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function bindDuplicateTaskPrompt() {
      bindTaskQueueButtons();
      document.getElementById("continueExistingTask")?.addEventListener("click", () => {
        const existing = unfinishedTaskOfType(state.pendingTaskType);
        state.pendingTaskType = null;
        if (existing) activateTask(existing.id);
      });
      document.getElementById("createDuplicateTask")?.addEventListener("click", () => {
        const type = state.pendingTaskType;
        state.pendingTaskType = null;
        createTask(type, "duplicate-new");
      });
    }

    function taskFriendlyStatus(status) {
      return {
        configuring: "待配置",
        running: "生成中",
        reviewing: "待确认",
        done: "已完成",
        failed: "生成失败"
      }[status] || "待配置";
    }

    function pickCurrentTask() {
      const order = ["running", "configuring", "reviewing", "done", "failed"];
      for (const status of order) {
        const found = state.tasks.find(t => t.status === status);
        if (found) return found;
      }
      return state.tasks[0] || null;
    }

    function renderTaskQueue() {
      if (state.tasks.length === 0) return "";
      const collapsed = state.taskQueueCollapsed;
      const chevron = collapsed
        ? `<svg class="icon icon-sm"><use href="#i-chevron-down"/></svg>`
        : `<svg class="icon icon-sm" style="transform:rotate(180deg)"><use href="#i-chevron-down"/></svg>`;

      const current = pickCurrentTask();
      const currentMeta = current ? taskMeta(current.type) : null;
      const currentStatus = current ? taskFriendlyStatus(current.status) : "";
      const currentProgress = current ? (current.status === "done" ? 100 : current.progress || 0) : 0;
      const otherCount = Math.max(0, state.tasks.length - 1);
      const collapsedBody = current ? (() => {
        return `
          <div class="task-queue-mini-wrap">
            <button class="task-queue-mini status-${current.status}" data-task-queue="${current.id}" type="button" title="${current.title || currentMeta.name}">
              <span class="task-queue-mini-icon">${currentMeta.icon}</span>
              <span class="task-queue-mini-body">
                <span class="task-queue-mini-row">
                  <strong>${current.title || currentMeta.name}</strong>
                  <span class="task-queue-mini-status ${current.status}">${currentStatus}</span>
                </span>
                <span class="task-queue-mini-progress"><span class="task-queue-mini-progress-fill" style="width:${currentProgress}%"></span></span>
              </span>
              ${otherCount > 0 ? `<span class="task-queue-mini-more">+${otherCount}</span>` : ""}
            </button>
            <button class="task-queue-mini-expand" type="button" data-task-queue-expand aria-label="展开任务队列">
              <svg class="icon icon-sm"><use href="#i-chevron-down"/></svg>
            </button>
          </div>
        `;
      })() : "";

      return `
        <div class="task-queue ${collapsed ? "collapsed" : ""}" aria-label="小智任务队列">
          <div class="task-queue-head" data-task-queue-toggle>
            <span class="task-queue-current">${currentMeta ? `${currentMeta.icon}<strong>${current.title || currentMeta.name}</strong>` : "任务队列"}</span>
            <span class="task-queue-meta">${current ? `${currentStatus}${current.status === "running" ? ` · ${currentProgress}%` : ""}` : `${state.tasks.length} 个任务`}</span>
            <button class="task-queue-toggle" type="button" aria-label="${collapsed ? "展开" : "收起"}任务队列">${chevron}</button>
          </div>
          ${collapsedBody}
          <div class="task-queue-list">
            ${state.tasks.map(task => {
              const meta = taskMeta(task.type);
              const status = taskFriendlyStatus(task.status);
              const progressPct = task.status === "done" ? 100 : task.status === "failed" ? task.progress || 0 : task.progress || 0;
              return `
                <button class="task-queue-item status-${task.status} ${task.id === state.activeTaskId ? "active" : ""}" data-task-queue="${task.id}" type="button" title="${task.title}">
                  <span class="task-queue-icon">${meta.icon}</span>
                  <span class="task-queue-copy">
                    <strong>${task.title || meta.name}</strong>
                    <span class="task-queue-status ${task.status}">${status}</span>
                    <div class="task-queue-progress"><div class="task-queue-progress-fill" style="width:${progressPct}%"></div></div>
                  </span>
                </button>
              `;
            }).join("")}
          </div>
        </div>
      `;
    }

    function renderTaskQueuePage() {
      els.chat.innerHTML = `
        <div class="task-queue-page">
          <div class="task-queue-page-head">
            <button class="task-back" id="backToChat" type="button">
              <svg class="icon icon-sm"><use href="#i-chevron-left"/></svg>
              返回对话
            </button>
            <div class="task-queue-page-title">
              <h3>任务队列</h3>
              <p>${state.tasks.length ? `${state.tasks.length} 个知识生产任务` : "还没有任务"}</p>
            </div>
          </div>
          ${state.tasks.length ? renderTaskQueue() : `
            <div class="assistant-empty-simple">
              <div class="assistant-empty-content">
                <div class="assistant-empty-logo" aria-hidden="true">
                  <svg viewBox="0 0 40 40" fill="none">
                    <path d="M10 8.5 20 5l10 3.5v8.2L20 13l-10 3.7V8.5Z" fill="rgba(255,255,255,.92)"/>
                    <path d="M10 18.7 20 15l10 3.7v8.2L20 23l-10 3.9v-8.2Z" fill="rgba(255,255,255,.76)"/>
                    <path d="M10 28.9 20 25l10 3.9-10 6.1-10-6.1Z" fill="#fff"/>
                  </svg>
                </div>
                <h3>暂无任务</h3>

    function bindTaskQueueButtons() {
      els.chat.querySelectorAll("[data-task-queue]").forEach(button => {
        button.addEventListener("click", () => activateTask(button.dataset.taskQueue));
      });
      els.chat.querySelectorAll("[data-task-queue-toggle]").forEach(head => {
        head.addEventListener("click", (e) => {
          if (e.target.closest(".task-queue-item")) return;
          if (state.assistantView === "queue") return;
          switchToQueue();
        });
      });
      els.chat.querySelectorAll("[data-task-queue-expand]").forEach(btn => {
        btn.addEventListener("click", (e) => {
          e.stopPropagation();
          switchToQueue();
        });
      });
    }

    function mountChatTaskQueue() {
      els.chat.querySelectorAll(".task-queue").forEach(node => node.remove());
    }

    function generatedFileName(task) {
      const meta = taskMeta(task.type);
      const ext =
        task.type === "ppt" ? "pptx" :
        task.type === "table" ? "xlsx" :
        task.type === "mind" || task.type === "cards" ? "html" : "";
      const base = task.title || meta.action;
      return ext ? `${base}.${ext}` : base;
    }

    function renderSaveResultCard(task = currentTaskRecord()) {
      if (!task || task.status !== "done") return "";
      if (task.savedFileId) {
        const savedFile = files.find(file => file.id === task.savedFileId);
        return `
          <div class="task-save-card saved">
            <strong>已保存到知识目录</strong>
            <p>${savedFile?.name || generatedFileName(task)} 已加入中间文件列表，可继续作为知识引用。</p>
          </div>
        `;
      }
      return `
        <div class="task-save-card">
          <div>
            <strong>保存生成结果</strong>
            <p>生成完成后，可以把文件保存到个人文件下的目录，来源会标记为小智生成。</p>
          </div>
          <div class="task-save-row">
            <select class="save-path-select" id="savePathSelect">${saveFolderOptions(task)}</select>
            <button class="small-button primary" id="saveTaskResult" type="button">保存到目录</button>
          </div>
          <div class="task-save-hint">
            <span>目标文件：</span>
            <strong>${generatedFileName(task)}</strong>
          </div>
        </div>
      `;
    }

    function saveTaskResult(task = currentTaskRecord()) {
      if (!task) return;
      const folderId = state.savePath;
      const meta = taskMeta(task.type);
      const fileName = generatedFileName(task);
      const file = {
        id: `generated-${Date.now()}`,
        name: fileName,
        size: task.type === "ppt" ? "4.86 MB" : task.type === "table" ? "128.40 KB" : "18.20 KB",
        type:
          task.type === "ppt"   ? "PPT"     :
          task.type === "mind" || task.type === "cards" ? "HTML" :
          task.type === "table" ? "Excel"    : "Markdown",
        ragStatus: "入库中",
        systemTags: ["小智生成"],
        folder: folderId,
        updated: "2026-05-17 12:00",
        summary: `由小智任务「${meta.name}」生成并保存。`
      };
      files = [file, ...files];
      task.savedFileId = file.id;
      renderFolders();
      renderSelection();
      renderList();
      showToast(`已保存到 ${folders.find(folder => folder.id === folderId)?.name || "我的文件"}`);
      window.setTimeout(() => {
        state.tasks = state.tasks.filter(t => t.id !== task.id);
        state.assistantView = "chat";
        state.activeTaskType = null;
        state.activeTaskId = null;
        state.taskGenerationState = "idle";
        els.assistantPanel.classList.remove("task-mode");
        renderChatInitial();
      }, 800);
    }

    function renderAssistantContext() {
      const selected = taskReferenceFiles(null);
      const hasReferences = selected.length > 0;
      els.contextBox.style.display = hasReferences ? "" : "none";
      els.contextTitle.textContent = hasReferences ? `引用 ${selected.length} · ${selected[0].name}` : "";
      els.contextBox.classList.toggle("has-selection", hasReferences);
      els.contextBox.classList.toggle("expanded", state.referenceExpanded && hasReferences);
      document.getElementById("manageFiles").textContent = state.referenceExpanded ? "收起" : "展开";
      if (!hasReferences) {
        els.contextFiles.innerHTML = "";
        return;
      }
      const visible = state.referenceExpanded ? selected : selected.slice(0, 2);
      const hiddenCount = selected.length - visible.length;
      els.contextFiles.innerHTML = visible.map(file => `
        <div class="context-file">
          <span class="file-icon">${fileIcon(file)}</span>
          <span>${file.name}</span>
          <button class="context-remove" data-reference-remove="${file.id}" type="button" aria-label="取消引用 ${escapeHtml(file.name)}">
            <svg class="icon icon-xs"><use href="#i-x"/></svg>
          </button>
        </div>
      `).join("") + (hiddenCount > 0 ? `<div class="context-more">还有 ${hiddenCount} 个引用文件，点击展开查看</div>` : "");
      els.contextFiles.querySelectorAll("[data-reference-remove]").forEach(button => {
        button.addEventListener("click", event => {
          event.preventDefault();
          event.stopPropagation();
          removeReference(button.dataset.referenceRemove);
        });
      });
    }

    function renderChatInitial() {
      state.assistantView = "chat";
      state.activeTaskType = null;
      state.activeTaskId = null;
      state.taskGenerationState = "idle";
      state.pptTemplateView = "setup";
      els.assistantPanel.classList.remove("task-mode");
      els.chat.innerHTML = `
        <div class="assistant-empty assistant-empty-simple">
          <div class="assistant-empty-content">
            <div class="assistant-empty-logo" aria-hidden="true">
              <svg viewBox="0 0 40 40" fill="none">

      const rows = {
        ppt: [
          ["封面与背景", "用 1 页说明资料来源、目标受众和业务背景", "大纲"],

          ["证据节点", "保留引用文件，方便回溯原文", "证据"]
        ],
        cards: [

    function selectedPptTemplate() {
      if (state.selectedPptTemplate === "custom-full") {
        return { id: "custom-full", name: "我的完整模板", style: "自定义", scene: "自定义场景", color: "自定义", desc: "已上传完整模板，使用解析后的母版和版式规则", bg: "linear-gradient(135deg, #1d2129, #86909c)" };
      }
      if (state.selectedPptTemplate === "custom-simple") {
        const color = pptColors.find(item => item.id === state.customTemplateColor)?.color || "#165dff";
        return { id: "custom-simple", name: "我的简易模板", style: "自定义", scene: "自定义场景", color: state.customTemplateColor, desc: "基于背景图、Logo 和主题色生成的简易模板", bg: `linear-gradient(135deg, ${color}, #ffffff)` };
      }
      if (!state.selectedPptTemplate) {
        return { id: null, name: "未选择", style: "模板", scene: "默认", color: "全部", pages: "", desc: "可从系统模板或自定义模板中选择", bg: "linear-gradient(135deg, #edf3ff, #f7faff)" };
      }
      return pptTemplates.find(template => template.id === state.selectedPptTemplate) || pptTemplates[0];
    }

    function filteredPptTemplates() {
      return pptTemplates.filter(template => {
        const styleMatch = state.pptTemplateStyle === "所有风格" || template.style === state.pptTemplateStyle;
        const sceneMatch = state.pptTemplateScene === "所有场景" || template.scene === state.pptTemplateScene;
        const colorMatch = state.pptTemplateColor === "全部" || template.color === state.pptTemplateColor;
        return styleMatch && sceneMatch && colorMatch;
      });
    }

    function renderChoiceChips(options, activeValue, dataName) {
      return options.map(option => `
        <button class="choice-chip ${activeValue === option ? "active" : ""}" data-${dataName}="${option}" type="button">${option}</button>
      `).join("");
    }

    function renderColorDots(activeValue, dataName) {
      return pptColors.map(item => `
        <button class="color-dot ${activeValue === item.id ? "active" : ""}" style="--dot-color: ${item.color}" data-${dataName}="${item.id}" type="button">${item.name}</button>
      `).join("");
    }

    function startPptGeneration() {
      const taskRecord = currentTaskRecord();
      if (taskRecord) {
        taskRecord.status = "running";
        taskRecord.progress = 64;
      }
      state.pptTemplateView = "setup";
      state.pptStage = "analyzing";
      state.pptOutlineTitle = defaultPptOutlineTitle;
      state.pptOutlineAddMenu = null;
      state.pptOutlineExpanded = true;
      state.pptOutlineAdjusted = false;
      state.pptOutlineItems = createDefaultPptOutline();
      state.taskGenerationState = "generating";
      renderTaskView();
      window.setTimeout(() => {
        if (taskRecord) {
          taskRecord.status = "reviewing";
          taskRecord.progress = 78;
        }
        if (state.activeTaskId === taskRecord?.id) {
          state.pptStage = "outline";
          state.taskGenerationState = "outline";
        }
        if (state.assistantView === "task") {
          renderTaskView();
        } else if (state.assistantView === "queue") {
          renderTaskQueuePage();
          renderTaskMenu();
        } else {
          mountChatTaskQueue();
          renderTaskMenu();
        }
      }, 1200);
    }

      return `

      state.pptOutlineTitle = els.chat.querySelector("[data-ppt-outline-title]")?.textContent.trim() || defaultPptOutlineTitle;
      const nodes = [...els.chat.querySelectorAll(".ppt-outline-item")];
      if (!nodes.length) return;
      state.pptOutlineItems = nodes.map(node => ({
        id: node.dataset.outlineId,
        title: node.querySelector("[data-outline-title]")?.textContent.trim() || "未命名章节",
        children: [...node.querySelectorAll("[data-outline-child]")].map(child => child.textContent.trim()),
        detail: node.querySelector("[data-outline-child]")?.textContent.trim() || "补充二级目录。"
      }));
    }

    function renderPptViewKeepingItem(anchorId) {
      const anchor = anchorId ? els.chat.querySelector(`[data-outline-id="${anchorId}"]`) : null;
      const beforeTop = anchor?.getBoundingClientRect().top ?? null;
      renderTaskView();
      if (beforeTop === null) return;
      const nextAnchor = els.chat.querySelector(`[data-outline-id="${anchorId}"]`);
      if (!nextAnchor) return;
      const afterTop = nextAnchor.getBoundingClientRect().top;
      els.chat.scrollTop += afterTop - beforeTop;
    }

    function bindPptTaskEvents() {
      els.chat.querySelectorAll("[data-ppt-outline-title], [data-outline-title], [data-outline-child]").forEach(node => {
        node.addEventListener("input", syncPptOutlineFromDom);
        node.addEventListener("blur", syncPptOutlineFromDom);
      });
      document.getElementById("backToPptSetup")?.addEventListener("click", () => {
        syncPptOutlineFromDom();
        state.pptOutlineAddMenu = null;
        state.pptTemplateView = "setup";
        renderTaskView();
      });
      document.getElementById("togglePptOutline")?.addEventListener("click", () => {
        syncPptOutlineFromDom();
        state.pptOutlineAddMenu = null;
        state.pptOutlineExpanded = !state.pptOutlineExpanded;
        renderTaskView();
      });
      document.getElementById("confirmPptOutline")?.addEventListener("click", () => {
        const taskRecord = currentTaskRecord();
        syncPptOutlineFromDom();
        state.pptOutlineAddMenu = null;
        state.pptOutlineAdjusted = true;
        state.pptStage = "finalGenerating";
        state.taskGenerationState = "generating";
        if (taskRecord) {
          taskRecord.status = "running";
          taskRecord.progress = 90;
        }
        renderTaskView();
        window.setTimeout(() => {
          if (taskRecord) {
            taskRecord.status = "done";
            taskRecord.progress = 100;
            taskRecord.result = true;
          }
          if (state.activeTaskId === taskRecord?.id) {
            state.pptStage = "finalDone";
            state.taskResults.ppt = true;
            state.taskGenerationState = "done";
          }
          if (state.assistantView === "task") {
            renderTaskView();
          } else if (state.assistantView === "queue") {
            renderTaskQueuePage();
            renderTaskMenu();
          } else {
            mountChatTaskQueue();
            renderTaskMenu();
          }
        }, 1000);
      });
      els.chat.querySelectorAll("[data-outline-delete]").forEach(button => {
        button.addEventListener("click", () => {
          if (state.pptOutlineAdjusted) return;
          if (state.pptOutlineItems.length <= 1) {
            showToast("至少保留一个大纲章节");
            return;
          }
          syncPptOutlineFromDom();
          state.pptOutlineAddMenu = null;
          state.pptOutlineItems = state.pptOutlineItems.filter(item => item.id !== button.dataset.outlineDelete);
          renderTaskView();
        });
      });
      els.chat.querySelectorAll("[data-outline-delete-child]").forEach(button => {
        button.addEventListener("click", () => {
          if (state.pptOutlineAdjusted) return;
          syncPptOutlineFromDom();
          const id = button.getAttribute("data-outline-delete-child");
          const childIndex = Number(button.dataset.childIndex);
          state.pptOutlineItems = state.pptOutlineItems.map(item => {
            if (item.id !== id) return item;
            const children = pptOutlineChildren(item).filter((_, index) => index !== childIndex);
            return { ...item, children, detail: children[0] || "补充二级目录。" };
          });
          state.pptOutlineAddMenu = null;
          renderPptViewKeepingItem(id);
        });
      });
      els.chat.querySelectorAll("[data-outline-add-menu]").forEach(button => {
        button.addEventListener("click", () => {
          if (state.pptOutlineAdjusted) return;
          syncPptOutlineFromDom();
          const id = button.getAttribute("data-outline-add-menu");
          state.pptOutlineAddMenu = state.pptOutlineAddMenu === id ? null : id;
          renderPptViewKeepingItem(id);
        });
      });
      els.chat.querySelectorAll("[data-outline-insert]").forEach(button => {
        button.addEventListener("click", () => {
          if (state.pptOutlineAdjusted) return;
          syncPptOutlineFromDom();
          const id = button.dataset.outlineId;
          const index = state.pptOutlineItems.findIndex(item => item.id === id);
          if (index < 0) return;
          const nextItems = [...state.pptOutlineItems];
          const insertIndex = button.dataset.outlineInsert === "before" ? index : index + 1;
          nextItems.splice(insertIndex, 0, createPptOutlineItem());
          state.pptOutlineItems = nextItems;
          state.pptOutlineAddMenu = null;
          renderPptViewKeepingItem(id);
        });
      });
      els.chat.querySelectorAll("[data-outline-add-child]").forEach(button => {
        button.addEventListener("click", () => {
          if (state.pptOutlineAdjusted) return;
          syncPptOutlineFromDom();
          const id = button.getAttribute("data-outline-add-child");
          state.pptOutlineItems = state.pptOutlineItems.map(item => item.id === id
            ? { ...item, children: [...pptOutlineChildren(item), "新增二级目录"], detail: pptOutlineChildren(item)[0] || "新增二级目录" }
            : item);
          state.pptOutlineAddMenu = null;
          renderPptViewKeepingItem(id);
        });
      });
      els.chat.querySelectorAll("[data-ppt-pages]").forEach(button => {
        button.addEventListener("click", () => {
          state.pptPageRange = button.getAttribute("data-ppt-pages");
          state.pptPageMenuOpen = false;
          state.pptOutlineAddMenu = null;
          state.taskGenerationState = "idle";
          state.pptStage = "idle";
          state.taskResults.ppt = false;
          renderTaskView();
        });
      });
      document.getElementById("pptPageButton")?.addEventListener("click", () => {
        state.pptPageMenuOpen = !state.pptPageMenuOpen;
        renderTaskView();
      });
      document.getElementById("choosePptTemplate")?.addEventListener("click", () => {
        state.pptPageMenuOpen = false;
        state.pptOutlineAddMenu = null;
        state.pptStage = "idle";
        state.pptTemplateView = state.pptTemplateView === "library" ? "setup" : "library";
        state.pptTemplateSource = "系统模板";
        renderTaskView();
      });
      document.getElementById("generatePptButton")?.addEventListener("click", startPptGeneration);
      bindPptModalEvents();
    }

      document.getElementById("closeInlineTemplate")?.addEventListener("click", () => {
        state.pptTemplateView = "setup";

      });

        state.pptTemplateView = "library";
        state.pptTemplateSource = "系统模板";
        renderTaskView();
      });
      document.getElementById("cycleTemplateStyle")?.addEventListener("click", () => {

        state.pptTemplateStyle = pptStyles[(index + 1) % pptStyles.length];
        renderTaskView();
      });
      document.getElementById("cycleTemplateScene")?.addEventListener("click", () => {

        state.pptTemplateScene = pptScenes[(index + 1) % pptScenes.length];
        renderTaskView();
      });
      document.getElementById("cycleTemplateColor")?.addEventListener("click", () => {
        const ids = pptColors.map(item => item.id);

        renderTaskView();

          state.pptStage = "idle";
          state.taskResults.ppt = false;
          renderTaskView();

      scope.querySelectorAll("[data-custom-mode]").forEach(button => {

          state.customTemplateMode = button.getAttribute("data-custom-mode");
          renderTaskView();
        });

      scope.querySelectorAll("[data-custom-color]").forEach(button => {

      document.getElementById("useCustomTemplate")?.addEventListener("click", () => {

        state.pptStage = "idle";
        state.taskResults.ppt = false;
        renderTaskView();
        showToast("已使用自定义模板");
      });
      scope.querySelectorAll(".ppt-upload-large").forEach(div => {
        div.addEventListener("click", () => {
          const type = div.dataset.uploadType;
          if (!type) return;
          if (type === "bg") {
            showToast("正在上传背景图...");
            window.setTimeout(() => {
              state.customBackgroundUploaded = true;
              state.customBackgroundName = "ppt_background_concept.png";
              renderTaskView();
              showToast("背景图上传成功");
            }, 600);
          } else if (type === "logo") {
            showToast("正在上传 LOGO...");
            window.setTimeout(() => {
              state.customLogoUploaded = true;
              state.customLogoName = "company_brand_logo.png";
              renderTaskView();
              showToast("LOGO 上传成功");
            }, 600);

            showToast("正在上传并解析 PPTX 母版...");
            window.setTimeout(() => {
              state.customPptxUploaded = true;
              state.customPptxName = "marketing_quarterly_layout.pptx";
              renderTaskView();
              showToast("PPTX 模板解析完成，已提取母版版式");
            }, 800);
          }
        });
      });

      return `

    function bindSimpleTaskEvents(task) {
      const taskRecord = currentTaskRecord();
      const input = document.getElementById("taskRequirementInput");
      if (input) {
        input.addEventListener("input", event => {
          if (taskRecord) taskRecord.config.prompt = event.target.value;
          state.taskConfigs[task.id].prompt = event.target.value;
        });
      }
      els.chat.querySelectorAll("[data-task-config-key]").forEach(button => {
        button.addEventListener("click", () => {
          const key = button.dataset.taskConfigKey;
          if (taskRecord) taskRecord.config[key] = button.dataset.taskConfigValue;
          state.taskConfigs[task.id][key] = button.dataset.taskConfigValue;
          renderTaskView();
        });
      });
      document.getElementById("toggleAdvancedOptions")?.addEventListener("click", () => {
        state.showAdvancedOptions = !state.showAdvancedOptions;
        renderTaskView();
      });
      document.getElementById("startSimpleTask")?.addEventListener("click", () => {
        const activeRecord = currentTaskRecord();
        if (!activeRecord || activeRecord.references.length === 0) {
          showToast("请先通过引用知识库添加文件");
          return;
        }
        if (!activeRecord.config.prompt?.trim()) {
          activeRecord.config.prompt = taskDefaultPrompt(task.id);
          state.taskConfigs[task.id].prompt = activeRecord.config.prompt;
        }
        activeRecord.status = "running";
        activeRecord.progress = 72;
        state.taskGenerationState = "generating";
        renderTaskView();
        window.setTimeout(() => {
          activeRecord.status = "done";
          activeRecord.progress = 100;
          activeRecord.result = true;
          state.taskResults[task.id] = true;
          if (state.activeTaskId === activeRecord.id) {
            state.taskGenerationState = "done";
          }
          if (state.assistantView === "task") {
            renderTaskView();
          } else if (state.assistantView === "queue") {
            renderTaskQueuePage();
            renderTaskMenu();
          } else {
            mountChatTaskQueue();
            renderTaskMenu();
          }
        }, 900);
      });
      if (task.id === "cards") {
        const total = flashcardMock.length;
        const flipEl = document.querySelector("[data-flashcard-flip]");
        flipEl?.addEventListener("click", () => {
          state.flashcardFlipped = !state.flashcardFlipped;
          const card = document.querySelector(".flashcard-3d");
          if (card) card.classList.toggle("is-flipped", state.flashcardFlipped);
          flipEl.setAttribute("aria-label", state.flashcardFlipped ? "返回问题" : "查看答案");
        });
        flipEl?.addEventListener("keydown", (e) => {
          if (e.key !== "Enter" && e.key !== " ") return;
          e.preventDefault();
          state.flashcardFlipped = !state.flashcardFlipped;
          const card = document.querySelector(".flashcard-3d");
          if (card) card.classList.toggle("is-flipped", state.flashcardFlipped);
          flipEl.setAttribute("aria-label", state.flashcardFlipped ? "返回问题" : "查看答案");
        });
        document.querySelector("[data-flashcard-prev]")?.addEventListener("click", () => {
          state.flashcardIndex = (state.flashcardIndex - 1 + total) % total;
          state.flashcardFlipped = false;
          renderTaskView();
        });
        document.querySelector("[data-flashcard-next]")?.addEventListener("click", () => {
          state.flashcardIndex = (state.flashcardIndex + 1) % total;
          state.flashcardFlipped = false;
          renderTaskView();
        });
        document.querySelectorAll("[data-flashcard-jump]").forEach(dot => {
          dot.addEventListener("click", () => {
            const i = Number(dot.dataset.flashcardJump);
            if (Number.isNaN(i) || i === state.flashcardIndex) return;
            state.flashcardIndex = i;
            state.flashcardFlipped = false;
            renderTaskView();
          });
        });
      }
    }

    function renderTaskResult(task) {
      const taskRecord = currentTaskRecord();
      const taskState = taskRecord ? taskStatusToGeneration(taskRecord.status) : state.taskGenerationState;
      if (task.id === "ppt") {
        return renderPptTask();
      }
      if (taskState === "generating") {
        return renderSimpleTaskGenerating(task);
      }
      if (taskState === "idle") {
        return renderSimpleTaskSetup(task);
      }
      const followups = state.taskFollowups[task.id] || [];
      return `
        <div class="task-result">
          ${renderSimpleTaskDone(task)}
          ${renderSaveResultCard()}
          ${followups.length ? `
            <div class="task-followups">
              ${followups.map(item => `
                <div class="task-followup">
                  <strong>修改要求：${item.prompt}</strong>
                  <span>${item.response}</span>
                </div>
              `).join("")}
            </div>
          ` : ""}
        </div>
      `;
    }

    function renderTaskView() {
      const activeEl = document.activeElement;
      let focusSelector = null;
      if (activeEl && activeEl.id) {
        focusSelector = `#${activeEl.id}`;
      } else if (activeEl && activeEl.hasAttribute("data-ppt-outline-title")) {
        focusSelector = "[data-ppt-outline-title]";
      } else if (activeEl && activeEl.dataset.outlineId) {
        const id = activeEl.dataset.outlineId;
        if (activeEl.hasAttribute("data-outline-title")) {
          focusSelector = `[data-outline-id="${id}"] [data-outline-title]`;
        } else if (activeEl.hasAttribute("data-outline-child")) {
          focusSelector = `[data-outline-id="${id}"] [data-child-index="${activeEl.dataset.childIndex}"]`;
        }
      } else if (activeEl && activeEl.closest(".ppt-outline-item")) {
        const itemNode = activeEl.closest(".ppt-outline-item");
        const id = itemNode.dataset.outlineId;
        if (activeEl.hasAttribute("data-outline-child")) {
          focusSelector = `[data-outline-id="${id}"] [data-child-index="${activeEl.dataset.childIndex}"]`;
        } else if (activeEl.dataset.outlineDelete) {
          focusSelector = `[data-outline-id="${id}"] [data-outline-delete]`;
        } else if (activeEl.hasAttribute("data-outline-add-menu")) {
          focusSelector = `[data-outline-id="${id}"] [data-outline-add-menu]`;
        } else if (activeEl.hasAttribute("data-outline-add-child")) {
          focusSelector = `[data-outline-id="${id}"] [data-outline-add-child]`;
        }
      }

      const task = currentTask();
      const taskRecord = currentTaskRecord();
      if (!task) {
        switchToChat();
        return;
      }
      els.assistantPanel.classList.add("task-mode");
      const canPreviewMind = task.id === "mind" && taskRecord?.status === "done";
      const canPreviewTable = task.id === "table" && taskRecord?.status === "done";
      const referenceCount = taskReferenceFiles(taskRecord).length;
      const taskSubtitle = task.id === "ppt"
        ? "设置页数、模板和生成要求后开始创建。"
        : `引用 ${referenceCount} 个文件，${task.sub}`;
      els.chat.innerHTML = `
        <div class="task-view">
          <div class="task-view-head">
            <div>
              <button class="task-back" id="backToChat" type="button">
                <svg class="icon icon-sm"><use href="#i-chevron-left"/></svg>
                返回对话
              </button>
              <div class="task-title">
                <span class="task-title-icon">${task.icon}</span>
                <div>
                  <h3>${task.action}</h3>
                  <p>${taskSubtitle}</p>
                </div>
              </div>
              ${renderTaskReferences()}
            </div>
            ${canPreviewMind || canPreviewTable ? `<div class="task-actions">
              ${canPreviewMind ? `<button class="small-button" id="openMarkmap" type="button">打开思维导图</button>` : ""}
              ${canPreviewTable ? `<button class="small-button" id="openTablePreview" type="button">预览表格</button>` : ""}
            </div>` : ""}
          </div>
          ${renderTaskResult(task)}
        </div>
      `;
      document.getElementById("backToChat").addEventListener("click", switchToChat);
      bindTaskQueueButtons();
      document.getElementById("taskReferenceToggle")?.addEventListener("click", () => {
        if (taskReferenceFiles().length === 0) {
          showToast("请先通过引用知识库添加文件");
          return;
        }
        state.referenceExpanded = !state.referenceExpanded;
        renderTaskView();
      });
      document.querySelectorAll("[data-task-reference-remove]").forEach(button => {
        button.addEventListener("click", event => {
          event.preventDefault();
          event.stopPropagation();
          removeReference(button.dataset.taskReferenceRemove);
        });
      });
      document.getElementById("openMarkmap")?.addEventListener("click", () => {
        openMarkmapModal();
      });
      document.getElementById("openTablePreview")?.addEventListener("click", () => {
        openTablePreview();
      });
      document.getElementById("savePathSelect")?.addEventListener("change", event => {
        state.savePath = event.target.value;
      });
      document.getElementById("saveTaskResult")?.addEventListener("click", () => saveTaskResult());
      if (task.id === "ppt") {
        bindPptTaskEvents();
      } else {
        bindSimpleTaskEvents(task);
      }
      updatePromptPlaceholder();
      renderTaskMenu();
      
      if (focusSelector) {
        const elToFocus = els.chat.querySelector(focusSelector) || document.querySelector(focusSelector);
        if (elToFocus) {
          elToFocus.focus();
          if (elToFocus.hasAttribute("contenteditable")) {
            const range = document.createRange();
            const sel = window.getSelection();
            range.selectNodeContents(elToFocus);
            range.collapse(false);
            sel.removeAllRanges();
            sel.addRange(range);
          }
        }
      } else {
        els.chat.scrollTop = 0;
      }
    }

    function sendTaskPrompt(text) {
      const task = currentTask();
      if (!task) return;
      if (!state.taskFollowups[task.id]) {
        state.taskFollowups[task.id] = [];
      }
      state.taskFollowups[task.id].push({
        prompt: escapeHtml(text),
        response: `小智已把「${escapeHtml(text)}」作为 ${task.name} 的修改要求，并更新到当前结果草案中。`
      });
      els.promptInput.value = "";
      state.taskGenerationState = "done";
      renderTaskView();
      els.chat.scrollTop = els.chat.scrollHeight;
    }

    function renderChatProductionSuggestions() {
      return "";
    }

    function startChatProductionTask(type) {
      const referenceCount = selectedReferenceIds().length;
      if (referenceCount === 0) {
        showToast("请先通过引用知识库添加文件");
        return;
      }
      const task = enqueueTaskFromChat(type, "基于刚才的聊天分析生成多模态文件");
      activateTask(task.id);
      showToast(`已基于聊天内容创建 ${taskMeta(type).name} 任务`);
    }

    function sendPrompt() {
      const text = els.promptInput.value.trim();
      if (!text) {
        showToast("请输入问题");
        return;
      }
      const referenceCount = selectedReferenceIds().length;
      if (referenceCount === 0) {
        showToast("请先通过引用知识库添加文件");
        return;
      }
      if (state.assistantView === "task") {
        sendTaskPrompt(text);
        return;
      }

      clearAssistantEmpty();
      const taskIntent = detectTaskIntent(text);
      if (taskIntent) {
        const task = enqueueTaskFromChat(taskIntent, text);
        const meta = taskMeta(taskIntent);
        els.chat.insertAdjacentHTML("beforeend", `
          <div class="message user">
            <div class="bubble">${escapeHtml(text)}</div>
            <div class="user-mark">A</div>
          </div>
          <div class="message">
            <div class="bot-mark">智</div>
            <div class="bubble">
              已识别为「${meta.name}」生产任务，并加入右侧任务队列。
              <div class="result-card">
                <h4>${escapeHtml(task.title)}</h4>
                <p>点击右侧队列任务可进入配置页，补充参数后开始生成。</p>
              </div>
            </div>
          </div>
        `);
        els.promptInput.value = "";
        mountChatTaskQueue();
        els.chat.scrollTop = els.chat.scrollHeight;
        persistChatMarkup();
        return;

        "'": "&#039;"

    function bindMarkmapModalEvents() {
      const modal = document.getElementById("markmapModal");
      if (!modal) return;
      modal.querySelectorAll("[data-markmap-close]").forEach(el => {
        el.addEventListener("click", closeMarkmapModal);
      });
      modal.querySelectorAll("[data-markmap-direction]").forEach(btn => {
        btn.addEventListener("click", () => {
          const dir = btn.dataset.markmapDirection;
          if (dir === state.markmapDirection) return;
          state.markmapDirection = dir;
          renderMarkmapModal();
        });
      });
      document.getElementById("markmapZoomIn")?.addEventListener("click", () => markmapZoomBy(0.1));
      document.getElementById("markmapZoomOut")?.addEventListener("click", () => markmapZoomBy(-0.1));
      document.getElementById("markmapZoomReset")?.addEventListener("click", () => markmapZoomTo(1));
      document.getElementById("markmapModalCopy")?.addEventListener("click", () => {
        showToast("Markdown 大纲已复制（演示模式）");
      });
    }

    function markmapZoomBy(delta) {
      markmapZoomTo(state.markmapZoom + delta);
    }

    function markmapZoomTo(value) {
      const next = Math.min(2, Math.max(0.5, Math.round(value * 10) / 10));
      if (next === state.markmapZoom) return;
      state.markmapZoom = next;
      const canvas = document.getElementById("markmapCanvas");
      if (canvas) canvas.style.transform = `scale(${next})`;
      const valueEl = document.querySelector(".markmap-zoom-value");
      if (valueEl) valueEl.textContent = `${Math.round(next * 100)}%`;
    }

    function markmapModalKey(event) {
      if (!state.markmapModalOpen) return;
      if (event.key === "Escape") { event.preventDefault(); closeMarkmapModal(); return; }
      if (!(event.ctrlKey || event.metaKey)) return;
      if (event.key === "=" || event.key === "+") { event.preventDefault(); markmapZoomBy(0.1); return; }
      if (event.key === "-")                       { event.preventDefault(); markmapZoomBy(-0.1); return; }
      if (event.key === "0")                       { event.preventDefault(); markmapZoomTo(1);    return; }
    }

    function bindFlashcardPreviewEvents() {
      const modal = document.getElementById("flashcardPreviewModal");
      if (!modal) return;
      modal.querySelectorAll("[data-flashcard-preview-close]").forEach(el => {
        el.addEventListener("click", closeFlashcardPreview);
      });
      const flipEl = modal.querySelector("[data-flashcard-preview-flip]");
      flipEl?.addEventListener("click", () => {
        state.flashcardPreviewFlipped = !state.flashcardPreviewFlipped;
        const card = modal.querySelector(".flashcard-3d");
        if (card) card.classList.toggle("is-flipped", state.flashcardPreviewFlipped);
        flipEl.setAttribute("aria-label", state.flashcardPreviewFlipped ? "返回问题" : "查看答案");
      });
      modal.querySelector("[data-flashcard-preview-prev]")?.addEventListener("click", () => {
        flashcardPreviewGo(-1);
      });
      modal.querySelector("[data-flashcard-preview-next]")?.addEventListener("click", () => {
        flashcardPreviewGo(1);
      });
      modal.querySelectorAll("[data-flashcard-preview-jump]").forEach(dot => {
        dot.addEventListener("click", () => {
          const i = Number(dot.dataset.flashcardPreviewJump);
          if (Number.isNaN(i) || i === state.flashcardPreviewIndex) return;
          state.flashcardPreviewIndex = i;
          state.flashcardPreviewFlipped = false;
          renderFlashcardPreviewModal();
        });
      });
    }

    function flashcardPreviewGo(delta) {
      const total = flashcardMock.length;
      state.flashcardPreviewIndex = (state.flashcardPreviewIndex + delta + total) % total;
      state.flashcardPreviewFlipped = false;
      renderFlashcardPreviewModal();
    }

    function flashcardPreviewKey(event) {
      if (!state.flashcardPreviewOpen) return;
      if (event.key === "Escape") { event.preventDefault(); closeFlashcardPreview(); return; }
      if (event.key === "ArrowLeft")  { event.preventDefault(); flashcardPreviewGo(-1); return; }
      if (event.key === "ArrowRight") { event.preventDefault(); flashcardPreviewGo(1);  return; }
      if (event.key === " " || event.key === "Enter") {
        event.preventDefault();
        state.flashcardPreviewFlipped = !state.flashcardPreviewFlipped;
        const modal = document.getElementById("flashcardPreviewModal");
        const card = modal?.querySelector(".flashcard-3d");
        if (card) card.classList.toggle("is-flipped", state.flashcardPreviewFlipped);
        const flipEl = modal?.querySelector("[data-flashcard-preview-flip]");
        flipEl?.setAttribute("aria-label", state.flashcardPreviewFlipped ? "返回问题" : "查看答案");
      }
    }

    function showToast(message, undoCallback) {
      els.toast.innerHTML = "";
      const textNode = document.createElement("span");
      textNode.textContent = message;
      els.toast.appendChild(textNode);
      if (undoCallback) {
        const undoBtn = document.createElement("button");
        undoBtn.className = "toast-undo";
        undoBtn.textContent = "撤销";
        undoBtn.addEventListener("click", () => {
          els.toast.classList.remove("show");
          undoCallback();
        });
        els.toast.appendChild(undoBtn);
      }
      els.toast.classList.add("show");
      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(() => els.toast.classList.remove("show"), undoCallback ? 8000 : 1800);
    }

    function showDeleteConfirm(fileId) {
      const file = files.find(item => item.id === fileId);
      if (!file) return;
      if (deleteConfirmEl) deleteConfirmEl.remove();
      const rect = document.querySelector(`[data-file-delete="${fileId}"]`)?.getBoundingClientRect();
      const el = document.createElement("div");
      el.className = "delete-confirm";
      el.innerHTML = `
        <strong>确定删除此文件？</strong>
        <span>${file.name}</span>
        <div class="delete-confirm-actions">
          <button class="delete-confirm-cancel" type="button">取消</button>
          <button class="delete-confirm-danger" type="button">删除</button>
        </div>
      `;
      if (rect) {
        el.style.position = "fixed";
        el.style.left = Math.max(12, Math.min(rect.left, window.innerWidth - 310)) + "px";
        el.style.top = Math.max(12, rect.bottom + 6) + "px";
      } else {
        el.style.position = "fixed";
        el.style.left = "50%";
        el.style.top = "50%";
        el.style.transform = "translate(-50%, -50%)";
      }
      document.body.appendChild(el);
      deleteConfirmEl = el;
      const close = () => { el.remove(); deleteConfirmEl = null; };
      el.querySelector(".delete-confirm-cancel").addEventListener("click", close);
      el.querySelector(".delete-confirm-danger").addEventListener("click", () => {
        close();
        confirmDeleteFile(fileId);
      });
      const outsideClick = (e) => {
        if (!el.contains(e.target)) { close(); document.removeEventListener("click", outsideClick); }
      };
      setTimeout(() => document.addEventListener("click", outsideClick), 10);
    }

    let lastDeletedFiles = [];
    let lastDeletedIndex = -1;

    /* ============================================================
       v3 — 历史抽屉（会话 / 任务 双 Tab）
       ============================================================ */
    function renderHistoryDrawer() {
      const drawer = document.getElementById("historyDrawer");
      const btn = document.getElementById("historyButton");
      if (!drawer) return;
      btn?.classList.toggle("is-open", state.historyOpen);
      btn?.setAttribute("aria-expanded", String(state.historyOpen));
      if (!state.historyOpen) { drawer.hidden = true; drawer.innerHTML = ""; return; }
      drawer.hidden = false;

      const tab = state.historyTab;
      const items = tab === "sessions" ? state.chatSessions : state.historyTasks;
      const statusLabel = { done: "已完成", failed: "失败" };

      drawer.innerHTML = `
        <div class="history-head">
          <h4>历史记录</h4>
          <button class="history-close" type="button" aria-label="关闭" data-history-close>
            <svg class="icon icon-xs"><use href="#i-x"/></svg>
          </button>
        </div>
        <div class="history-tabs" role="tablist">
          <button class="history-tab ${tab === "sessions" ? "active" : ""}" type="button" data-history-tab="sessions" role="tab" aria-selected="${tab === "sessions"}">会话</button>
          <button class="history-tab ${tab === "tasks" ? "active" : ""}" type="button" data-history-tab="tasks" role="tab" aria-selected="${tab === "tasks"}">任务</button>
        </div>
        <div class="history-list" role="tabpanel">
          ${items.length === 0 ? `
            <div class="history-empty">暂无${tab === "sessions" ? "会话" : "任务"}记录</div>
          ` : items.map(item => {
            if (tab === "sessions") {
              return `
                <div class="history-item sessions" data-history-item="${item.id}" data-history-kind="sessions">
                  <span></span>
                  <span class="history-item-copy">
                    <span class="history-item-title">${escapeHtml(item.title)}</span>
                    <span class="history-item-meta">${item.date}</span>
                  </span>
                  <button class="history-item-delete" type="button" data-history-delete="${item.id}" data-history-kind="sessions" aria-label="删除会话">
                    <svg class="icon icon-xs"><use href="#i-trash"/></svg>
                  </button>
                </div>
              `;
            }
            const meta = taskMeta(item.type);
            return `
              <div class="history-item tasks" data-history-item="${item.id}" data-history-kind="tasks">
                <span class="history-item-icon" data-tone="${meta.tone || "blue"}">${meta.icon}</span>
                <span class="history-item-copy">
                  <span class="history-item-title">${escapeHtml(item.title)}</span>
                  <span class="history-item-meta">
                    <span class="status-mini ${item.status}">${statusLabel[item.status] || item.status}</span>
                    <span>${item.date}</span>
                  </span>
                </span>
                <button class="history-item-delete" type="button" data-history-delete="${item.id}" data-history-kind="tasks" aria-label="删除任务">
                  <svg class="icon icon-xs"><use href="#i-trash"/></svg>
                </button>
              </div>
            `;
          }).join("")}
        </div>
      `;

      drawer.querySelector("[data-history-close]")?.addEventListener("click", () => {
        state.historyOpen = false; renderHistoryDrawer();
      });
      drawer.querySelectorAll("[data-history-tab]").forEach(t => {
        t.addEventListener("click", (e) => {
          e.stopPropagation();
          state.historyTab = t.dataset.historyTab;
          renderHistoryDrawer();
        });
      });
      drawer.querySelectorAll("[data-history-item]").forEach(row => {
        row.addEventListener("click", (e) => {
          if (e.target.closest("[data-history-delete]")) return;
          const id = row.dataset.historyItem;
          const kind = row.dataset.historyKind;
          const list = kind === "sessions" ? state.chatSessions : state.historyTasks;
          const item = list.find(i => i.id === id);
          if (!item) return;
          state.historyOpen = false;
          renderHistoryDrawer();
          
          if (kind === "sessions") {
            restoreSession(item);
            showToast(`已恢复会话：${item.title}`);
          } else {
            restoreTaskFromHistory(item);
            showToast(`已恢复任务：${item.title}`);
          }
        });
      });
      drawer.querySelectorAll("[data-history-delete]").forEach(btn => {
        btn.addEventListener("click", (e) => {
          e.stopPropagation();
          const id = btn.dataset.historyDelete;
          const kind = btn.dataset.historyKind;
          if (kind === "sessions") state.chatSessions = state.chatSessions.filter(i => i.id !== id);
          else state.historyTasks = state.historyTasks.filter(i => i.id !== id);
          renderHistoryDrawer();
        });
      });
    }

    function toggleHistoryDrawer() {
      state.historyOpen = !state.historyOpen;
      renderHistoryDrawer();
      if (state.historyOpen) {
        setTimeout(() => {
          document.addEventListener("click", historyOutsideClick);
          document.addEventListener("keydown", historyEscKey);
        }, 0);
      } else {
        document.removeEventListener("click", historyOutsideClick);
        document.removeEventListener("keydown", historyEscKey);
      }
    }
    function historyOutsideClick(e) {
      const drawer = document.getElementById("historyDrawer");
      const btn = document.getElementById("historyButton");
      if (!drawer) return;
      if (drawer.contains(e.target) || btn?.contains(e.target)) return;
      state.historyOpen = false; renderHistoryDrawer();
      document.removeEventListener("click", historyOutsideClick);
      document.removeEventListener("keydown", historyEscKey);
    }
    function historyEscKey(e) {
      if (e.key !== "Escape") return;
      state.historyOpen = false; renderHistoryDrawer();
      document.removeEventListener("click", historyOutsideClick);
      document.removeEventListener("keydown", historyEscKey);
    }

    function confirmDeleteFile(fileId) {
      const file = files.find(item => item.id === fileId);
      if (!file) return;
      const idx = files.indexOf(file);
      lastDeletedFiles = [{ file: { ...file }, index: idx }];
      lastDeletedIndex = idx;
      state.deletedFiles.add(file.id);
      state.selectedFiles.delete(file.id);
      state.referencedFiles.delete(file.id);
      if (state.selectedFile === file.id) {
        state.selectedFile = null;
      }
      renderFolders();
      renderSelection();
      renderList();
      renderAssistantContext();
      if (state.assistantView === "task") renderTaskView();
      showToast(`已删除 ${file.name}`, () => {
        undoDelete();
      });
    }

    function undoDelete() {
      if (!lastDeletedFiles.length) return;
      lastDeletedFiles.forEach(({ file, index }) => {
        state.deletedFiles.delete(file.id);
        files.splice(Math.min(index, files.length), 0, file);
        state.selectedFiles.add(file.id);
      });
      lastDeletedFiles = [];
      renderFolders();
      renderSelection();
      renderList();
      renderAssistantContext();
      if (state.assistantView === "task") renderTaskView();
      showToast("已撤销删除");
    }

    function toggleSelectAll() {
      const visible = visibleFiles();
      if (!visible.length) return;
      const allSelected = visible.every(file => state.selectedFiles.has(file.id));
      if (allSelected) {
        visible.forEach(file => state.selectedFiles.delete(file.id));
      } else {
        visible.forEach(file => state.selectedFiles.add(file.id));
      }
      renderSelection();
      renderList();
      renderAssistantContext();
      if (state.assistantView === "task") renderTaskView();
    }

    function restoreSession(session) {
      state.assistantView = "chat";
      state.activeTaskId = null;
      state.activeTaskType = null;
      els.assistantPanel.classList.remove("task-mode");
      
      els.chat.innerHTML = `
        <div class="chat-viewport">
          <div class="message user">
            <div class="avatar user-mark">我</div>
            <div class="bubble">${escapeHtml(session.title)}</div>
          </div>
          <div class="message bot">
            <div class="avatar bot-mark">智</div>
            <div class="bubble">
              已为你恢复历史会话。<br>
              针对你关于“<strong>${escapeHtml(session.title)}</strong>”的提问，我已从引用知识中匹配了相关上下文。
              <ul>
                <li>已载入相关的数据索引与知识结构。</li>
                <li>会话上下文及推荐关联标签已同步。</li>
              </ul>
              你可以在下方输入框继续追问，或者在工作台右上方发起新的知识生产任务。
            </div>
          </div>
        </div>
      `;
      mountChatTaskQueue();
    }

    function restoreTaskFromHistory(item) {
      const existing = state.tasks.find(t => t.id === `task-hist-${item.id}`);
      if (existing) {
        activateTask(existing.id);
      } else {
        const task = {
          id: `task-hist-${item.id}`,
          type: item.type,
          title: item.title,
          status: item.status,
          progress: item.status === "done" ? 100 : 0,
          config: {
            prompt: `从历史恢复的任务：${item.title}`,
            style: "自动布局",
            depth: "3 层结构",
            count: "20 张",
            mode: "问答卡",
            tableType: "AI 决策",
            density: "完整字段"
          },
          result: item.status === "done",
          references: [files[0]?.id || "f1"],
          createdAt: new Date(item.date).toISOString(),
          source: "history"
        };
        if (item.type === "ppt") {
          state.pptTemplateView = "setup";
          state.pptStage = item.status === "done" ? "finalDone" : "idle";
          state.pptOutlineTitle = defaultPptOutlineTitle;
          state.pptOutlineAddMenu = null;
          state.pptOutlineExpanded = false;
          state.pptOutlineAdjusted = false;
          state.pptOutlineItems = createDefaultPptOutline();
          state.taskResults.ppt = item.status === "done";
        } else {
          state.taskResults[item.type] = item.status === "done";
        }
        state.tasks.unshift(task);
        activateTask(task.id);
      }
    }

    function setNavCollapsed(collapsed, persist = true) {
      els.appShell.classList.toggle("nav-collapsed", collapsed);
      els.collapseNav.setAttribute("aria-pressed", String(collapsed));
      els.collapseNav.setAttribute("aria-label", collapsed ? "展开侧栏" : "收起侧栏");
      els.collapseNav.setAttribute("title", collapsed ? "展开侧栏" : "收起侧栏");
      if (persist && !fitPreviewConfig.enabled) {
        localStorage.setItem("knowledgeBaseNavCollapsed", collapsed ? "1" : "0");
      }
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function getAssistantWidth() {
      return parseFloat(getComputedStyle(els.appShell).getPropertyValue("--assistant")) ||
        parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--assistant")) ||
        440;
    }

    function getFitPreviewScale() {
      if (!fitPreviewConfig.enabled || !els.appShell) return 1;
      const scale = els.appShell.getBoundingClientRect().width / fitPreviewConfig.width;
      return Number.isFinite(scale) && scale > 0 ? scale : 1;
    }

    function setAssistantWidth(width, persist = true) {
      const hasRail = state.tasks.length > 0;
      const minWidth = state.assistantCollapsed ? 46 : (hasRail ? 420 : 320);
      const nextWidth = clamp(Math.round(width), minWidth, 760);
      document.documentElement.style.setProperty("--assistant", `${nextWidth}px`);
      els.appShell.style.setProperty("--assistant", `${nextWidth}px`);
      els.layoutResizer.setAttribute("aria-valuenow", String(nextWidth));
      els.layoutResizer.setAttribute("aria-valuemin", String(minWidth));
      els.layoutResizer.setAttribute("aria-valuemax", "760");
      if (persist && !state.assistantCollapsed && !fitPreviewConfig.enabled) {
        localStorage.setItem("knowledgeBaseAssistantWidth", String(nextWidth));
      }
    }

    function setAssistantCollapsed(collapsed) {
      state.assistantCollapsed = collapsed;
      els.assistantPanel.classList.toggle("collapsed", collapsed);
      els.appShell.classList.toggle("assistant-collapsed", collapsed);
      els.layoutResizer.style.display = collapsed ? "none" : "";
      if (collapsed) {
        state.assistantExpandedWidth = getAssistantWidth() || state.assistantExpandedWidth || 440;
        document.documentElement.style.setProperty("--assistant", "0px");
        els.appShell.style.setProperty("--assistant", "0px");
        state.historyOpen = false;
        renderHistoryDrawer();
        showToast("小智已收起，点击右上角入口可展开");
      } else {
        const width = state.assistantExpandedWidth || Number(localStorage.getItem("knowledgeBaseAssistantWidth")) || 440;
        setAssistantWidth(width, false);
        showToast("小智已展开");
      }
      renderTaskMenu();
    }

    function bindLayoutResize() {
      let startX = 0;
      let startWidth = 0;

      const stopResize = event => {
        if (!els.appShell.classList.contains("is-resizing")) return;
        els.appShell.classList.remove("is-resizing");
        els.layoutResizer.releasePointerCapture?.(event.pointerId);
        state.assistantExpandedWidth = getAssistantWidth() || state.assistantExpandedWidth;
        if (!fitPreviewConfig.enabled) {
          localStorage.setItem("knowledgeBaseAssistantWidth", String(Math.round(state.assistantExpandedWidth)));
        }
      };

      els.layoutResizer.addEventListener("pointerdown", event => {
        if (state.assistantCollapsed) return;
        event.preventDefault();
        startX = event.clientX;
        startWidth = getAssistantWidth();
        els.appShell.classList.add("is-resizing");
        els.layoutResizer.setPointerCapture?.(event.pointerId);
      });

      els.layoutResizer.addEventListener("pointermove", event => {
        if (!els.appShell.classList.contains("is-resizing")) return;
        event.preventDefault();
        const deltaX = (event.clientX - startX) / getFitPreviewScale();
        setAssistantWidth(startWidth - deltaX, false);
      });

      els.layoutResizer.addEventListener("pointerup", stopResize);
      els.layoutResizer.addEventListener("pointercancel", stopResize);
      els.layoutResizer.addEventListener("keydown", event => {
        const current = getAssistantWidth();
        if (event.key === "ArrowLeft") {
          event.preventDefault();
          setAssistantWidth(current + 20);
        }
        if (event.key === "ArrowRight") {
          event.preventDefault();
          setAssistantWidth(current - 20);
        }
      });
    }

    function bindStaticEvents() {
      document.querySelectorAll("[data-toast]").forEach(button => {
        button.addEventListener("click", () => showToast(button.dataset.toast));
      });
      document.querySelectorAll("[data-nav-workspace]").forEach(button => {
        button.addEventListener("click", () => switchWorkspace(button.dataset.navWorkspace));
      });
      els.collapseNav.addEventListener("click", () => {
        const collapsed = !els.appShell.classList.contains("nav-collapsed");
        setNavCollapsed(collapsed);
        showToast(collapsed ? "侧栏已收起" : "侧栏已展开");
      });
      document.getElementById("quickCreate").addEventListener("click", () => showToast("新建知识入口已打开"));
      els.folderRoot.addEventListener("click", selectFolderRoot);
      els.folderRoot.addEventListener("keydown", event => {
        if (event.key !== "Enter" && event.key !== " ") return;
        event.preventDefault();
        selectFolderRoot();
      });
      els.chat.addEventListener("click", event => {
        const button = event.target.closest("[data-chat-produce]");
        if (!button) return;
        event.preventDefault();
        event.stopPropagation();
        startChatProductionTask(button.dataset.chatProduce);
      });
      document.getElementById("moveButton")?.addEventListener("click", openMoveFolderModal);
      document.getElementById("manageFiles").addEventListener("click", () => {
        if (selectedReferenceIds().length === 0) {
          showToast("请先通过引用知识库添加文件");
          return;
        }
        state.referenceExpanded = !state.referenceExpanded;
        renderAssistantContext();
      });
      document.getElementById("closeAssistant").addEventListener("click", () => setAssistantCollapsed(true));
      document.getElementById("historyButton").addEventListener("click", event => {
        event.preventDefault();
        event.stopPropagation();
        toggleHistoryDrawer();
      });
      els.assistantWake?.addEventListener("click", event => {
        event.preventDefault();
        event.stopPropagation();
        setAssistantCollapsed(false);
      });
      document.getElementById("newChatButton").addEventListener("click", () => {
        els.promptInput.value = "";
        state.taskMenuOpen = false;
        state.taskFollowups = {};
        renderChatInitial();
        renderTaskMenu();
        showToast("已新建会话");
      });
      document.addEventListener("click", () => {
        if (!state.taskMenuOpen) return;
        state.taskMenuOpen = false;
        renderTaskMenu();
      });
      document.addEventListener("click", event => {
        if (!state.folderMenuOpen || event.target.closest(".tree-actions")) return;
        state.folderMenuOpen = null;
        renderFolders();
      });
      document.getElementById("knowledgeTool").addEventListener("click", event => {
        event.preventDefault();
        openKnowledgePicker();
      });
      document.getElementById("webTool").addEventListener("click", event => {
        event.currentTarget.classList.toggle("active");
        showToast(event.currentTarget.classList.contains("active") ? "小智已开启联网查询" : "小智已关闭联网查询");
      });
      document.getElementById("speedTool").addEventListener("click", event => {
        event.currentTarget.classList.toggle("active");
        showToast(event.currentTarget.classList.contains("active") ? "小智快速模式已启用" : "小智快速模式已关闭");
      });
      document.getElementById("sendButton").addEventListener("click", sendPrompt);
      els.promptInput.addEventListener("keydown", event => {
        if (event.key === "Enter" && !event.shiftKey) {
          event.preventDefault();
          sendPrompt();
        }
      });
      els.globalSearch.addEventListener("input", event => {
        state.query = event.target.value;
        els.fileSearch.value = state.query;
        updateFilterSummary();
        renderList();
      });
      els.fileSearch.addEventListener("input", event => {
        state.query = event.target.value;
        els.globalSearch.value = state.query;
        updateFilterSummary();
        renderList();
      });
      els.listViewButton.addEventListener("click", () => {
        state.view = "list";
        els.listViewButton.classList.add("active");
        els.gridViewButton.classList.remove("active");
        renderList();
      });
      els.gridViewButton.addEventListener("click", () => {
        state.view = "grid";
        els.gridViewButton.classList.add("active");
        els.listViewButton.classList.remove("active");
        renderList();
      });
      const selectAllBtn = document.querySelector(".select-all");
      if (selectAllBtn) {
        selectAllBtn.addEventListener("click", toggleSelectAll);
      }
      window.addEventListener("keydown", event => {
        if (event.key === "Escape" && state.knowledgePickerOpen) {
          closeKnowledgePicker();
          return;
        }
        if ((event.metaKey || event.ctrlKey) && event.key.toLowerCase() === "k") {
          event.preventDefault();
          els.fileSearch.focus();
          els.fileSearch.select();
          showToast("已聚焦文件搜索");
        }
        if ((event.metaKey || event.ctrlKey) && event.key.toLowerCase() === "i") {
          event.preventDefault();
          const quickBtn = document.getElementById("quickCreate");
          if (quickBtn) quickBtn.click();
        }
      });
    }

    function render() {
      renderWorkspaceShell();
      renderFolders();
      renderFilters();
      renderSelection();
      renderList();
      renderAssistantContext();
      renderTaskMenu();
      renderKnowledgePicker();
      renderMoveFolderModal();
      if (state.assistantView === "task") {
        renderTaskView();
      } else if (state.assistantView === "queue") {
        renderTaskQueuePage();
      } else {
        updatePromptPlaceholder();
      }
    }

    setupFitPreview();
    setNavCollapsed(fitPreviewConfig.enabled ? false : localStorage.getItem("knowledgeBaseNavCollapsed") === "1", false);
    state.assistantExpandedWidth = Math.max(320, Number(localStorage.getItem("knowledgeBaseAssistantWidth")) || 360);
    setAssistantWidth(state.assistantExpandedWidth, false);
    renderChatInitial();
    renderTaskMenu();
    bindStaticEvents();
    bindLayoutResize();
    render();
  </script>
</body>
</html>
