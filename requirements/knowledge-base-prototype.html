    /* ============================================================
       v2 Overrides — 视觉精修 / Lucide 系统对齐 / 交互精度
       (出现在最后，享受 CSS 级联最高优先级)
       ============================================================ */

    /* —— Avatar：移除非规范绿色在线圆点 —— */
    .avatar { font-size: 12px; font-weight: 600; box-shadow: inset 0 0 0 1px rgba(255,255,255,0.18); }
    .avatar::after { content: none; }

    /* —— Topbar：节奏 + 搜索框 + 通知红点 —— */
    .topbar { gap: 20px; margin-bottom: 18px; }
    .title h1 { font-size: var(--fs-h1); font-weight: 700; letter-spacing: var(--tracking-h1); line-height: var(--lh-tight); color: var(--text); }
    .title p { font-size: var(--fs-sm); color: var(--muted); line-height: var(--lh-snug); margin-top: 6px; }

    .search-box { height: 38px; border: 1px solid var(--line); background: #fff; border-radius: 10px; padding: 0 12px; gap: 10px; transition: border-color var(--t-base) var(--ease), box-shadow var(--t-base) var(--ease); }
    .search-box:focus-within { border-color: var(--blue); box-shadow: var(--focus-ring); }
    .search-box svg { width: var(--icon-md); height: var(--icon-md); color: var(--faint); }
    .search-box:focus-within svg { color: var(--blue); }
    .search-box input { font-size: var(--fs-body); }
    .shortcut { color: var(--faint); font-size: var(--fs-meta); font-weight: 600; padding: 2px 6px; border-radius: 6px; background: var(--chip); white-space: nowrap; }

    /* —— Icon Button：统一 36px 中尺寸 + token 化 —— */
    .icon-button {
      position: relative;
      width: var(--btn-md);
      height: var(--btn-md);
      border-radius: 10px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--muted);
      transition: color var(--t-fast) var(--ease), background var(--t-fast) var(--ease), border-color var(--t-fast) var(--ease), transform var(--t-fast) var(--ease);
    }
    .icon-button:hover { color: var(--blue); background: var(--chip); border-color: rgba(22,93,255,0.18); transform: translateY(-1px); }
    .icon-button:active { transform: scale(0.96); }
    .icon-button.active { color: var(--blue); border-color: rgba(22,93,255,0.25); background: rgba(22,93,255,0.06); }
    .icon-button svg { width: var(--icon-md); height: var(--icon-md); stroke-width: 1.75; }

    /* —— 通知未读小红点 —— */
    @keyframes dotPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.18); } }

    /* —— Small Button：32px sm + 14/13 字号 —— */
    .small-button {
      height: var(--btn-sm);
      gap: 6px;
      padding: 0 12px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--muted);
      font-size: var(--fs-sm);
      font-weight: 500;
      transition: color var(--t-fast) var(--ease), background var(--t-fast) var(--ease), border-color var(--t-fast) var(--ease), transform var(--t-fast) var(--ease);
    }
    .small-button:hover { color: var(--text); background: var(--chip); border-color: rgba(0,0,0,0.14); transform: translateY(-1px); }
    .small-button:active { transform: scale(0.97); }
    .small-button:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }
    .small-button:disabled:hover { color: var(--muted); background: #fff; border-color: var(--line); transform: none; }
    .small-button.primary { color: #fff; background: var(--gradient-brand); border-color: transparent; box-shadow: 0 4px 12px rgba(22,93,255,0.22); }
    .small-button.primary:hover { background: var(--gradient-brand-hover); }
    .small-button svg { width: var(--icon-sm); height: var(--icon-sm); }

    /* —— Toolbar divider —— */
    .toolbar { padding: 12px 24px; gap: 12px; }
    .toolbar-divider { width: 1px; height: 18px; background: var(--line-strong); margin: 0 2px; flex: 0 0 auto; }
    .selected-summary { color: var(--muted); font-size: var(--fs-sm); font-weight: 500; gap: 8px; }
    .select-all { width: 18px; height: 18px; border-radius: 5px; background: var(--blue); color: #fff; box-shadow: 0 2px 6px rgba(22,93,255,0.28); cursor: pointer; transition: transform var(--t-fast) var(--ease), background var(--t-fast) var(--ease); }
    .select-all:hover { background: #0e42d2; transform: translateY(-0.5px); }
    .select-all:active { transform: scale(0.95); }
    .select-all svg { width: 12px; height: 12px; stroke-width: 2.5; }

    /* —— Ingest Cards v3：4 个等高小 pill，仅 icon + label —— */
    .ingest-cards {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    .ingest-card {
      height: var(--btn-sm);
      min-height: 0;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 0 12px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      font-size: var(--fs-sm);
      font-weight: 500;
      white-space: nowrap;
      transition: color var(--t-fast) var(--ease), background var(--t-fast) var(--ease), border-color var(--t-fast) var(--ease), transform var(--t-fast) var(--ease);
    }
    .ingest-card:hover {
      color: var(--blue);
      background: var(--chip);
      border-color: rgba(22,93,255,0.22);
      transform: translateY(-1px);
    }
    .ingest-card:active { transform: scale(0.97); }
    .ingest-icon {
      width: 16px; height: 16px;
      display: grid; place-items: center;
      background: transparent;
      color: var(--muted);
      flex: 0 0 auto;
      transition: color var(--t-fast) var(--ease);
    }
    .ingest-card:hover .ingest-icon { color: var(--blue); }
    .ingest-icon svg { width: 16px; height: 16px; stroke-width: 1.75; }

    /* 开始录音：用红色微染突出可触发录音的语义 */
    .ingest-card.ingest-record .ingest-icon { color: var(--red); }
    .ingest-card.ingest-record:hover { border-color: rgba(229,87,87,0.28); color: var(--text); }
    .ingest-card.ingest-record:hover .ingest-icon { color: var(--red); }

    .ingest-label { letter-spacing: 0; line-height: 1; }

    /* —— Sidebar 文件夹树：行级 accent + Lucide 化 —— */
    .tree-item { transition: background var(--t-fast) var(--ease), color var(--t-fast) var(--ease); position: relative; }
    .tree-item.active { color: var(--blue); background: rgba(22,93,255,0.06); }
    .tree-item.active::before {
      content: ""; position: absolute; left: 0; top: 4px; bottom: 4px; width: 2px;
      border-radius: 0 2px 2px 0; background: var(--blue);
    }
    .tree-icon { color: inherit; opacity: 0.85; }
    .tree-item.active .tree-icon { opacity: 1; color: var(--blue); }

    /* 存储条品牌渐变 */
    .storage-bar { height: 4px; border-radius: 999px; background: rgba(0,0,0,0.05); overflow: hidden; }
    .storage-fill { height: 100%; background: linear-gradient(90deg, var(--blue), var(--violet)); border-radius: 999px; transition: width var(--t-slow) var(--ease); }

    /* —— 文件类型 icon 容器（5 套色调） —— */
    /* 关键 override：解除老 .file-icon 24×24 蓝实色方块，把容器交给 .file-type-icon */
    .file-cell .file-icon,
    .file-card-top .file-icon,
    .context-file .file-icon,
    span.file-icon {
      width: auto; height: auto;
      background: transparent !important;
      color: inherit;
      border-radius: 0;
      padding: 0;
      display: inline-flex;
      align-items: center;
      box-shadow: none;
      font-size: 0;
    }
    .file-type-icon {
      width: 32px; height: 32px;
      display: grid; place-items: center;
      border-radius: 8px;
      flex: 0 0 auto;
      transition: transform var(--t-base) var(--ease);
    }
    .file-type-icon svg { width: 18px; height: 18px; }
    .file-type-blue   { background: rgba(22,93,255,0.08);  color: var(--blue); }
    .file-type-violet { background: rgba(107,76,255,0.10); color: var(--violet); }
    .file-type-amber  { background: rgba(255,125,0,0.10);  color: #d96a00; }
    .file-type-green  { background: rgba(0,180,42,0.10);   color: #00872a; }
    .file-type-warm   { background: var(--chip);           color: var(--muted); }
    tr:hover .file-type-icon { transform: scale(1.05); }

    /* —— 文件行：选中态精度（左侧 accent + 微染） —— */
    tbody tr { transition: background var(--t-fast) var(--ease); position: relative; }
    tbody tr:hover { background: var(--chip); }
    tbody tr.selected { background: rgba(22,93,255,0.05); }
    tbody tr.selected td:first-child { position: relative; }
    tbody tr.selected td:first-child::before {
      content: ""; position: absolute; left: 0; top: 6px; bottom: 6px; width: 3px;
      border-radius: 0 3px 3px 0; background: var(--gradient-brand);
    }

    /* file-action hover-only 显形 */
    tbody tr .file-actions { opacity: 0.55; transition: opacity var(--t-base) var(--ease); }
    tbody tr:hover .file-actions,
    tbody tr.selected .file-actions { opacity: 1; }

    /* —— 状态 pill：dot + label —— */
    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      height: 22px;
      padding: 0 9px;
      border-radius: 999px;
      font-size: var(--fs-label);
      font-weight: 600;
      letter-spacing: var(--tracking-label);
      border: 0;
    }
    .status-pill .status-dot { width: 6px; height: 6px; border-radius: 50%; flex: 0 0 auto; }
    .status-ready    { background: #e8f7ed; color: #00872a; }
    .status-ready    .status-dot { background: var(--green); }
    .status-indexing { background: #fff7e6; color: #b85c00; }
    .status-indexing .status-dot { background: var(--amber); animation: dotPulse 1.4s ease infinite; }
    .status-parsing  { background: #ecf2ff; color: #1949c6; }
    .status-parsing  .status-dot { background: var(--blue); animation: dotPulse 1.4s ease infinite; }

    /* —— 聊天气泡：用户=品牌渐变白字、机器人=暖灰 —— */
    .message { gap: 12px; margin-bottom: 18px; }
    .bubble {
      padding: 12px 14px;
      border-radius: 4px 14px 14px 14px;
      background: #f7f8fa;
      color: var(--text);
      box-shadow: none;
      border: 1px solid rgba(0,0,0,0.04);
      font-size: var(--fs-body);
      line-height: var(--lh-normal);
      letter-spacing: 0;
    }
    .message.user .bubble {
      background: var(--gradient-bubble-user);
      color: #fff;
      border: 0;
      border-radius: 14px 14px 4px 14px;
      box-shadow: 0 8px 24px -6px rgba(22,93,255,0.32), 0 2px 6px rgba(107,76,255,0.18);
    }
    .message.user .bubble a { color: #fff; text-decoration: underline; }
    .bot-mark { box-shadow: var(--glow-brand); }
    .user-mark { background: var(--gradient-brand); box-shadow: 0 4px 10px rgba(107, 76, 255, 0.22); }

    /* —— Composer 重构 —— */
    .composer { padding: 0 20px 20px; }
    .composer-inner { padding: 12px 12px 10px; border-radius: 14px; border: 1px solid var(--line); box-shadow: var(--soft-shadow); transition: border-color var(--t-base) var(--ease), box-shadow var(--t-base) var(--ease); }
    .composer-inner:focus-within { border-color: var(--blue); box-shadow: var(--focus-ring); }
    .composer textarea { font-size: var(--fs-body); min-height: 64px; line-height: var(--lh-normal); }
    .composer textarea::placeholder { color: var(--faint); }

    .composer-tools { gap: 8px; }
    .composer-tool-group { gap: 6px; padding: 2px; border-radius: 999px; background: transparent; }
    .composer-tool { width: var(--btn-md); height: var(--btn-md); border-radius: 10px; padding: 0; color: var(--muted); border: 1px solid transparent; background: transparent; transition: color var(--t-fast) var(--ease), background var(--t-fast) var(--ease), border-color var(--t-fast) var(--ease), transform var(--t-fast) var(--ease); }
    .composer-tool:hover { color: var(--blue); background: var(--chip); border-color: var(--line); transform: translateY(-1px); }
    .composer-tool.active { color: var(--blue); background: rgba(22,93,255,0.08); border-color: rgba(22,93,255,0.2); }
    .composer-tool svg { width: var(--icon-md); height: var(--icon-md); }

    .speed-select {
      height: var(--btn-md);
      gap: 6px;
      padding: 0 12px 0 10px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--chip);
      color: var(--text);
      font-size: var(--fs-sm);
      font-weight: 500;
      transition: color var(--t-fast) var(--ease), background var(--t-fast) var(--ease), border-color var(--t-fast) var(--ease), transform var(--t-fast) var(--ease);
    }
    .speed-select:hover { background: #ebedf0; transform: translateY(-1px); }
    .speed-select svg { width: var(--icon-sm); height: var(--icon-sm); }
    .speed-select svg:first-child { color: var(--amber); }

    .send-button {
      width: var(--btn-md); height: var(--btn-md);
      border-radius: 10px;
      background: var(--gradient-brand);
      color: #fff;
      box-shadow: 0 6px 16px -4px rgba(22,93,255,0.4), 0 2px 4px rgba(107,76,255,0.15);
      transition: transform var(--t-base) var(--ease), box-shadow var(--t-base) var(--ease), filter var(--t-base) var(--ease);
    }
    .send-button:hover { filter: brightness(1.06); transform: translateY(-1px); box-shadow: 0 8px 22px -4px rgba(22,93,255,0.5), 0 3px 6px rgba(107,76,255,0.2); }
    .send-button:active { transform: scale(0.95); }
    .send-button svg { width: var(--icon-md); height: var(--icon-md); }
    .composer-footer { padding-top: 8px; font-size: var(--fs-meta); color: var(--faint); }

    /* —— Assistant 头部按钮系统 —— */
    .assistant-action { width: var(--btn-sm); height: var(--btn-sm); border-radius: 8px; color: var(--muted); background: transparent; transition: color var(--t-fast) var(--ease), background var(--t-fast) var(--ease), transform var(--t-fast) var(--ease); }
    .assistant-action:hover { color: var(--blue); background: var(--chip); transform: translateY(-1px); }
    .assistant-action:active { transform: scale(0.95); }
    .assistant-action svg { width: var(--icon-md); height: var(--icon-md); }

    .create-task-button {
      height: var(--btn-sm);
      gap: 6px;
      padding: 0 12px;
      border-radius: 999px;
      border: 1px solid rgba(22,93,255,0.25);
      background: linear-gradient(135deg, rgba(22,93,255,0.06), rgba(107,76,255,0.06));
      color: var(--blue);
      font-size: var(--fs-sm);
      font-weight: 600;
      transition: background var(--t-fast) var(--ease), border-color var(--t-fast) var(--ease), transform var(--t-fast) var(--ease), box-shadow var(--t-fast) var(--ease);
    }
    .create-task-button:hover,
    .create-task-button.active {
      background: var(--gradient-brand);
      border-color: transparent;
      color: #fff;
      box-shadow: 0 4px 12px rgba(22,93,255,0.25);
      transform: translateY(-1px);
    }
    .create-task-button svg { width: var(--icon-sm); height: var(--icon-sm); }

    /* —— Task Menu 项 + tone 染色 —— */
    .task-menu-item { gap: 12px; padding: 10px 12px; border-radius: 10px; transition: background var(--t-fast) var(--ease); }
    .task-menu-item:hover { background: var(--chip); }
    .task-menu-icon { width: 36px; height: 36px; border-radius: 10px; font-weight: 600; transition: transform var(--t-base) var(--ease); }
    .task-menu-item:hover .task-menu-icon { transform: scale(1.06) rotate(-3deg); }
    .task-menu-item[data-tone="violet"] .task-menu-icon { color: var(--violet); background: linear-gradient(135deg, rgba(107,76,255,0.10), rgba(107,76,255,0.18)); }
    .task-menu-item[data-tone="blue"]   .task-menu-icon { color: var(--blue);   background: linear-gradient(135deg, rgba(22,93,255,0.10), rgba(22,93,255,0.18)); }
    .task-menu-item[data-tone="amber"]  .task-menu-icon { color: #d96a00;       background: linear-gradient(135deg, rgba(255,125,0,0.10), rgba(255,125,0,0.18)); }
    .task-menu-item[data-tone="green"]  .task-menu-icon { color: #00872a;       background: linear-gradient(135deg, rgba(0,180,42,0.10), rgba(0,180,42,0.18)); }
    .task-menu-icon svg { width: var(--icon-md); height: var(--icon-md); }
    .task-menu-copy strong { font-size: var(--fs-sm); font-weight: 600; }

    /* —— Idea Chip（chat 空态）—— */
    .idea-chip { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px 6px 6px; border-radius: 999px; border: 1px solid var(--line); background: #fff; color: var(--text); font-size: var(--fs-sm); transition: border-color var(--t-fast) var(--ease), background var(--t-fast) var(--ease), transform var(--t-fast) var(--ease); }
    .idea-chip:hover { border-color: rgba(22,93,255,0.3); background: var(--chip); transform: translateY(-1px); }
    .idea-chip span { display: grid; place-items: center; width: 24px; height: 24px; border-radius: 8px; background: linear-gradient(135deg, rgba(22,93,255,0.1), rgba(107,76,255,0.1)); }
    .idea-chip svg { width: 14px; height: 14px; color: var(--blue); }

    /* —— Layout Resizer：可见性提升 —— */
    .layout-resizer::before { background: rgba(0,0,0,0.10); }
    .layout-resizer:hover::before,
    .app.is-resizing .layout-resizer::before { background: var(--blue); width: 3px; left: 4.5px; }

    /* —— Toast：左侧 brand accent —— */
    .toast { border-radius: 12px; border-left: 3px solid var(--blue); box-shadow: 0 12px 32px -8px rgba(0,0,0,0.18), 0 2px 8px rgba(0,0,0,0.06); }

    /* —— New Button (新任务) 精修 —— */
    .new-button {
      height: 40px;
      gap: 8px;
      color: var(--blue);
      background: linear-gradient(135deg, rgba(22,93,255,0.08), rgba(107,76,255,0.08));
      border: 1px solid rgba(22,93,255,0.18);
      font-weight: 600;
      font-size: var(--fs-body);
      transition: background var(--t-fast) var(--ease), border-color var(--t-fast) var(--ease), transform var(--t-fast) var(--ease);
    }
    .new-button:hover { background: linear-gradient(135deg, rgba(22,93,255,0.14), rgba(107,76,255,0.14)); border-color: rgba(22,93,255,0.32); color: #0e42d2; }
    .new-button svg { width: var(--icon-sm); height: var(--icon-sm); }
    .kbd {
      height: 18px; min-width: 18px;
      padding: 0 5px;
      border-radius: 5px;
      background: rgba(22,93,255,0.10);
      color: var(--blue);
      font-size: 10px;
      font-weight: 700;
      border: 1px solid rgba(22,93,255,0.15);
      box-shadow: inset 0 -1px 0 rgba(22,93,255,0.12);
    }

    /* —— Rail Button 精修 —— */
    .rail-button { height: 38px; border-radius: 8px; transition: background var(--t-fast) var(--ease), color var(--t-fast) var(--ease); }
    .rail-button:hover { background: var(--chip); color: var(--text); }
    .rail-button.active { background: rgba(22,93,255,0.08); color: var(--blue); font-weight: 600; }
    .rail-button.active svg { color: var(--blue); }
    .nav-chevron { display: inline-flex; color: var(--faint); transition: transform var(--t-base) var(--ease); }

    /* —— 焦点环全局：可访问性 + 一致性 —— */
    .icon-button:focus-visible,
    .small-button:focus-visible,
    .send-button:focus-visible,
    .composer-tool:focus-visible,
    .speed-select:focus-visible,
    .assistant-action:focus-visible,
    .create-task-button:focus-visible,
    .new-button:focus-visible,
    .rail-button:focus-visible,
    .collapse-button:focus-visible,
    .ingest-card:focus-visible,
    .idea-chip:focus-visible {
      outline: 0;
      box-shadow: var(--focus-ring);
    }

    /* —— 折叠按钮统一 —— */
    .collapse-button { transition: color var(--t-fast) var(--ease), background var(--t-fast) var(--ease), transform var(--t-base) var(--ease); }
    .collapse-button:hover { color: var(--blue); background: var(--chip); }
    .collapse-button svg { width: var(--icon-md); height: var(--icon-md); transition: transform var(--t-base) var(--ease); }

    /* —— PPT modal 工具按钮和谐化 —— */
    .ppt-tool-button { height: var(--btn-sm); gap: 6px; padding: 0 12px; border-radius: 8px; border: 1px solid var(--line); background: #fff; color: var(--muted); font-size: var(--fs-sm); font-weight: 500; transition: color var(--t-fast) var(--ease), background var(--t-fast) var(--ease), border-color var(--t-fast) var(--ease); }
    .ppt-tool-button:hover { color: var(--text); background: var(--chip); border-color: rgba(0,0,0,0.14); }
    .ppt-tool-button svg { width: var(--icon-sm); height: var(--icon-sm); }
    .ppt-tool-button span { color: var(--text); font-weight: 600; padding: 1px 6px; border-radius: 5px; background: var(--chip); font-size: var(--fs-label); }

    /* —— 空状态：icon + 双行文案 —— */
    .empty-task { color: var(--faint); font-size: var(--fs-sm); }

    /* —— Sidebar storage label 节奏 —— */
    .storage-top { font-size: var(--fs-meta); color: var(--muted); }
    .storage-top strong { color: var(--text); font-weight: 600; }

    /* ============================================================
       v3 — 历史抽屉（会话 / 任务 双 Tab）
       ============================================================ */
    .history-wrap { position: relative; display: inline-flex; }
    .history-drawer {
      position: absolute;
      top: calc(100% + 10px);
      right: -8px;
      width: 320px;
      max-height: 60vh;
      display: flex;
      flex-direction: column;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 12px;
      box-shadow:
        rgba(0,0,0,0.06) 0 12px 32px,
        rgba(0,0,0,0.04) 0 4px 12px,
        rgba(0,0,0,0.02) 0 1px 3px;
      z-index: 80;
      overflow: hidden;
      transform-origin: top right;
      animation: historyIn 180ms var(--ease);
    }
    .history-drawer[hidden] { display: none; }
    @keyframes historyIn {
      from { opacity: 0; transform: translateY(-6px) scale(0.98); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .history-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px 8px;
    }
    .history-head h4 { margin: 0; font-size: var(--fs-h3); font-weight: 600; letter-spacing: -0.1px; color: var(--text); }
    .history-close {
      width: 26px; height: 26px;
      display: grid; place-items: center;
      border-radius: 6px;
      color: var(--muted);
      background: transparent;
      border: 0;
      transition: color var(--t-fast) var(--ease), background var(--t-fast) var(--ease);
    }
    .history-close:hover { color: var(--text); background: var(--chip); }
    .history-close svg { width: 14px; height: 14px; }

    .history-tabs {
      display: flex;
      gap: 4px;
      padding: 0 10px 8px;
      border-bottom: 1px solid var(--line);
    }
    .history-tab {
      flex: 0 0 auto;
      height: 28px;
      padding: 0 12px;
      border-radius: 7px;
      border: 0;
      background: transparent;
      color: var(--muted);
      font-size: var(--fs-sm);
      font-weight: 500;
      cursor: pointer;
      transition: color var(--t-fast) var(--ease), background var(--t-fast) var(--ease);
    }
    .history-tab:hover { color: var(--text); background: var(--chip); }
    .history-tab.active { color: var(--blue); background: rgba(22,93,255,0.08); font-weight: 600; }

    .history-list {
      flex: 1 1 auto;
      overflow-y: auto;
      padding: 6px;
      overscroll-behavior: contain;
    }
    .history-list::-webkit-scrollbar { width: 6px; }
    .history-list::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.08); border-radius: 999px; }
    .history-list::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.16); }

    .history-item {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 10px;
      padding: 10px 10px;
      border-radius: 8px;
      cursor: pointer;
      transition: background var(--t-fast) var(--ease);
      position: relative;
    }
    .history-item:hover { background: var(--chip); }
    .history-item.tasks { grid-template-columns: 28px 1fr auto; }

    .history-item-icon {
      width: 28px; height: 28px;
      display: grid; place-items: center;
      border-radius: 7px;
      flex: 0 0 auto;
    }
    .history-item-icon svg { width: 16px; height: 16px; }
    .history-item-icon[data-tone="violet"] { color: var(--violet); background: rgba(107,76,255,0.10); }
    .history-item-icon[data-tone="blue"]   { color: var(--blue);   background: rgba(22,93,255,0.10); }
    .history-item-icon[data-tone="amber"]  { color: #d96a00;       background: rgba(255,125,0,0.10); }
    .history-item-icon[data-tone="green"]  { color: #00872a;       background: rgba(0,180,42,0.10); }

    .history-item-copy { min-width: 0; }
    .history-item-title {
      display: block;
      color: var(--text);
      font-size: var(--fs-sm);
      font-weight: 500;
      line-height: var(--lh-snug);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .history-item-meta {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 4px;
      color: var(--faint);
      font-size: var(--fs-meta);
      line-height: 1;
    }
    .history-item-meta .status-mini {
      padding: 1px 6px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1px;
    }
    .history-item-meta .status-mini.done   { color: #00872a; background: #e8f7ed; }
    .history-item-meta .status-mini.failed { color: var(--red); background: #fce8e8; }

    .history-item-delete {
      width: 26px; height: 26px;
      display: grid; place-items: center;
      border-radius: 6px;
      border: 0;
      color: var(--faint);
      background: transparent;
      cursor: pointer;
      opacity: 0;
      transition: opacity var(--t-fast) var(--ease), color var(--t-fast) var(--ease), background var(--t-fast) var(--ease);
    }
    .history-item:hover .history-item-delete { opacity: 1; }
    .history-item-delete:hover { color: var(--red); background: rgba(229,87,87,0.10); }
    .history-item-delete svg { width: 14px; height: 14px; }

    .history-empty {
      padding: 32px 16px;
      text-align: center;
      color: var(--faint);
      font-size: var(--fs-sm);
    }

    /* historyButton 打开态样式 */
    .assistant-action.is-open { color: var(--blue); background: rgba(22,93,255,0.08); }

    /* ============================================================
       v3 — 任务队列折叠态 mini bar
       ============================================================ */
    .task-queue-mini { display: none; }
    .task-queue.collapsed .task-queue-list { display: none; }
    .task-queue.collapsed .task-queue-mini {
      display: grid;
      grid-template-columns: 28px 1fr auto;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 10px 12px;
      margin-top: 6px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      box-shadow: var(--soft-shadow);
      text-align: left;
      cursor: pointer;
      transition: border-color var(--t-fast) var(--ease), background var(--t-fast) var(--ease), transform var(--t-fast) var(--ease);
    }
    .task-queue.collapsed .task-queue-mini:hover {
      border-color: rgba(22,93,255,0.22);
      background: var(--chip);
      transform: translateY(-1px);
    }
    .task-queue-mini-icon {
      width: 28px; height: 28px;
      display: grid; place-items: center;
      border-radius: 7px;
      background: linear-gradient(135deg, rgba(22,93,255,0.10), rgba(107,76,255,0.10));
      color: var(--blue);
      flex: 0 0 auto;
    }
    .task-queue-mini-icon svg { width: 16px; height: 16px; }
    .task-queue-mini-body { display: flex; flex-direction: column; gap: 6px; min-width: 0; }
    .task-queue-mini-row { display: flex; align-items: center; gap: 8px; min-width: 0; }
    .task-queue-mini-row strong {
      flex: 1 1 auto; min-width: 0;
      color: var(--text);
      font-size: var(--fs-sm);
      font-weight: 600;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .task-queue-mini-status {
      flex: 0 0 auto;
      display: inline-flex; align-items: center; gap: 4px;
      color: var(--muted);
      font-size: var(--fs-meta);
      font-weight: 500;
    }
    .task-queue-mini-status::before {
      content: ""; width: 5px; height: 5px; border-radius: 50%;
      background: var(--faint);
    }
    .task-queue-mini-status.running { color: var(--blue); }
    .task-queue-mini-status.running::before { background: var(--blue); animation: dotPulse 1.4s ease infinite; }
    .task-queue-mini-status.configuring { color: var(--muted); }
    .task-queue-mini-status.reviewing { color: var(--amber); }
    .task-queue-mini-status.reviewing::before { background: var(--amber); }
    .task-queue-mini-status.done { color: var(--green); }
    .task-queue-mini-status.done::before { background: var(--green); }
    .task-queue-mini-status.failed { color: var(--red); }
    .task-queue-mini-status.failed::before { background: var(--red); }

    .task-queue-mini-progress {
      width: 100%; height: 3px;
      border-radius: 999px;
      background: rgba(0,0,0,0.05);
      overflow: hidden;
    }
    .task-queue-mini-progress-fill {
      display: block; height: 100%;
      border-radius: 999px;
      background: var(--gradient-brand);
      transition: width var(--t-slow) var(--ease);
    }
    .task-queue.collapsed .task-queue-mini.status-done .task-queue-mini-progress-fill { background: var(--green); }
    .task-queue.collapsed .task-queue-mini.status-failed .task-queue-mini-progress-fill { background: var(--red); }

    .task-queue-mini-more {
      flex: 0 0 auto;
      padding: 2px 7px;
      border-radius: 999px;
      background: var(--chip);
      color: var(--muted);
      font-size: var(--fs-meta);
      font-weight: 600;
    }

    /* T001-A: 收起态：让外壳消失，head 让位，mini 卡独立呈现 */
    .task-queue.collapsed {
      padding: 0;
      border: none;
      background: transparent;
      border-radius: 0;
      gap: 0;
    }
    .task-queue.collapsed .task-queue-head {
      display: none;
    }
    .task-queue.collapsed .task-queue-mini {
      margin-top: 0;
    }
    .task-queue-mini-wrap {
      display: none;
    }

    /* T002: 收起态 — wrap 变成单一卡片外观，chevron 收纳进卡片右侧 */
    .task-queue.collapsed .task-queue-mini-wrap {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: stretch;
      gap: 0;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      box-shadow: var(--soft-shadow);
      overflow: hidden;
      transition: border-color var(--t-fast) var(--ease), box-shadow var(--t-fast) var(--ease), transform var(--t-fast) var(--ease);
    }
    .task-queue.collapsed .task-queue-mini-wrap:hover {
      border-color: rgba(22,93,255,0.22);
      box-shadow: var(--shadow);
      transform: translateY(-1px);
    }

    /* wrap 内的 mini：退化为"无外壳的内容子区" */
    .task-queue.collapsed .task-queue-mini-wrap .task-queue-mini {
      margin-top: 0;
      border: none;
      border-radius: 0;
      background: transparent;
      box-shadow: none;
    }
    .task-queue.collapsed .task-queue-mini-wrap .task-queue-mini:hover {
      border-color: transparent;
      background: var(--chip);
      transform: none;
    }
    .task-queue.collapsed .task-queue-mini-wrap .task-queue-mini:active {
      transform: none;
    }

    /* chevron 区：32px、左侧细分割线，无独立外壳 */
    .task-queue-mini-expand {
      width: 32px;
      display: grid;
      place-items: center;
      border: none;
      border-left: 1px solid var(--line);
      border-radius: 0;
      background: transparent;
      box-shadow: none;
      color: var(--muted);
      cursor: pointer;
      transition: background var(--t-fast) var(--ease), color var(--t-fast) var(--ease);
    }
    .task-queue-mini-expand:hover {
      background: var(--chip);
      color: var(--text);
    }
    .task-queue-mini-expand:active {
      background: rgba(0,0,0,0.04);
    }
    .task-queue-mini-expand svg {
      width: 14px;
      height: 14px;
    }

    /* ============================================================
       T004 — Markmap 思维导图全屏 Modal
       ============================================================ */
    .markmap-modal {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: grid;
      place-items: center;
      padding: 32px;
    }
    .markmap-modal[hidden] { display: none; }
    .markmap-modal-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(15, 23, 42, 0.42);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      animation: markmapFadeIn 180ms ease-out;
    }
    .markmap-modal-shell {
      position: relative;
      z-index: 1;
      width: min(1200px, 96vw);
      height: min(820px, 92vh);
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 0;
      border-radius: 16px;
      background: #ffffff;
      box-shadow: 0 24px 60px rgba(0,0,0,0.18), 0 8px 24px rgba(0,0,0,0.10);
      overflow: hidden;
      animation: markmapPop 220ms cubic-bezier(0.2, 0.8, 0.2, 1);
    }
    @keyframes markmapFadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes markmapPop {
      from { opacity: 0; transform: translateY(10px) scale(0.985); }
      to   { opacity: 1; transform: translateY(0)   scale(1); }
    }

    .markmap-modal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 16px 20px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, #fafbff, #ffffff);
    }
    .markmap-modal-title {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;

    function setupFitPreview() {
      if (!fitPreviewConfig.enabled || !els.appShell) return;

      document.body.classList.add("fit-preview");
      if (els.appShell.parentElement && els.appShell.parentElement.classList.contains("fit-canvas")) return;

      const stage = document.createElement("div");
      stage.className = "fit-stage";
      const canvas = document.createElement("div");
      canvas.className = "fit-canvas";
      canvas.style.setProperty("--fit-design-width", `${fitPreviewConfig.width}px`);
      canvas.style.setProperty("--fit-design-height", `${fitPreviewConfig.height}px`);

      els.appShell.parentNode.insertBefore(stage, els.appShell);
      stage.appendChild(canvas);
      canvas.appendChild(els.appShell);

      const updateScale = () => {
        const viewport = window.visualViewport || window;
        const viewportWidth = Math.max(1, viewport.width || window.innerWidth);
        const viewportHeight = Math.max(1, viewport.height || window.innerHeight);
        const scale = Math.min(
          viewportWidth / fitPreviewConfig.width,
          viewportHeight / fitPreviewConfig.height,
          1
        );
        canvas.style.setProperty("--fit-scale", scale.toFixed(4));
      };

      updateScale();
      window.addEventListener("resize", updateScale, { passive: true });
      if (window.visualViewport) {
        window.visualViewport.addEventListener("resize", updateScale, { passive: true });
      }
      if (window.ResizeObserver) {
        new ResizeObserver(updateScale).observe(stage);
      }
    }

        "Recording": { id: "i-mic", tone: "violet" },
        "思维导图": { id: "i-task-mind", tone: "blue" },
        "闪卡": { id: "i-task-cards", tone: "amber" },
        "表格": { id: "i-task-table", tone: "green" }
      };
      const name = (file.name || "").toLowerCase();
      let entry = map[file.type];
      if (!entry) {
        if (name.endsWith(".xlsx") || name.endsWith(".xls") || name.endsWith(".csv")) entry = { id: "i-file-spreadsheet", tone: "green" };
        else if (name.endsWith(".png") || name.endsWith(".jpg") || name.endsWith(".jpeg") || name.endsWith(".gif")) entry = { id: "i-file-image", tone: "violet" };
        else entry = { id: "i-file-text", tone: "blue" };
      }
      return `<span class="file-type-icon file-type-${entry.tone}"><svg class="icon icon-md"><use href="#${entry.id}"/></svg></span>`;
    }

    function parseDate(value) {
      if (!value) return null;
      const date = new Date(String(value).replace(/-/g, "/"));
      return Number.isNaN(date.getTime()) ? null : date;
    }

    function sourceFilterMatch(file, source) {
      if (!source || source === "全部") return true;
      if (source === "PPT 文件") return file.type === "PPT";
      if (source === "录音文件") return file.type === "Recording" || file.systemTags.includes("录音文件");
      return file.systemTags.includes(source);
    }

    function dateFilterMatch(file, dateValue = state.activeDateFilter) {
      if (!dateValue) return true;
      const updated = parseDate(file.updated);
      if (!updated) return false;
      const target = parseDate(dateValue);
      if (!target) return true;
      return updated.getFullYear() === target.getFullYear()
        && updated.getMonth() === target.getMonth()
        && updated.getDate() === target.getDate();
    }

    function currentPreviewFile() {
      if (!state.selectedFile) return null;
      return files.find(file => file.id === state.selectedFile && !state.deletedFiles.has(file.id)) || null;
    }

    function selectFolder(folderId) {
      state.selectedFolder = folderId || workspaceRootId();
      state.selectedFile = null;
      state.folderMenuOpen = null;
      render();
    }

    function selectFilePreview(fileId) {
      const file = files.find(item => item.id === fileId && !state.deletedFiles.has(item.id));
      if (!file) return;
      state.selectedFolder = file.folder;
      state.selectedFile = file.id;
      state.folderMenuOpen = null;
      expandFolderAncestors(file.folder);
      render();
    }

    function directChildFolders(folderId) {
      const rootId = workspaceRootId();
      return folders.filter(folder => {
        if (folder.parent !== folderId) return false;
        if (!parentFolderMatch(folder.id, rootId) && folder.id !== rootId) return false;
        return state.activeWorkspace === "files" ? isPersonalManagedFolder(folder) : true;
      });
    }

    function currentFolderChildFolders() {
      if (state.activeWorkspace !== "files" || state.selectedFile) return [];
      const query = state.query.trim().toLowerCase();
      return directChildFolders(state.selectedFolder || workspaceRootId()).filter(folder => {
        return !query || folder.name.toLowerCase().includes(query);
      });
    }

    function directFileCount(folderId) {
      return files.filter(file => !state.deletedFiles.has(file.id) && file.folder === folderId).length;
    }

    function folderPathLabel(folderId) {
      const names = [];
      let current = folders.find(folder => folder.id === folderId);
      while (current) {
        names.unshift(current.name);
        current = current.parent ? folders.find(folder => folder.id === current.parent) : null;
      }
      return names.join(" / ");
    }

    function visibleFiles() {
      const folderIds = state.selectedFolder ? [state.selectedFolder] : [];
      return files.filter(file => {
        if (state.deletedFiles.has(file.id)) return false;
        const folderMatch = state.activeWorkspace === "files"
          ? (folderIds.length === 0 || file.folder === state.selectedFolder)
          : (folderIds.length === 0 || file.folder === state.selectedFolder || parentFolderMatch(file.folder, state.selectedFolder));
        const rootMatch = file.folder === workspaceRootId() || parentFolderMatch(file.folder, workspaceRootId());
        const categoryMatch = sourceFilterMatch(file, state.activeTagFilter);
        const updatedMatch = dateFilterMatch(file);
        const queryMatch = !state.query || `${file.name} ${file.type} ${file.systemTags.join(" ")} ${file.summary}`.toLowerCase().includes(state.query.toLowerCase());
        return rootMatch && folderMatch && categoryMatch && updatedMatch && queryMatch;
      });
    }

    function parentFolderMatch(fileFolder, selectedFolder) {
      return descendantFolderIds(selectedFolder).includes(fileFolder);
    }

    function descendantFolderIds(folderId) {
      const direct = folders.filter(folder => folder.parent === folderId).map(folder => folder.id);
      return direct.concat(direct.flatMap(descendantFolderIds));
    }

    function folderCount(folderId) {
      return files.filter(file => !state.deletedFiles.has(file.id) && (file.folder === folderId || parentFolderMatch(file.folder, folderId))).length;
    }

    function renderSystemTags(file, limit = 2) {
      return file.systemTags.slice(0, limit).map(tag => `<span class="tag ${tagColors[tag] || "blue"}">${tag}</span>`).join("");
    }

    function selectFolderRoot() {
      selectFolder(workspaceRootId());
    }

    function renderStatus(status) {
      const statusClass = {
        "解析中": "status-parsing",
        "入库中": "status-indexing",
        "已入库": "status-ready"
      }[status] || "status-ready";
      return `<span class="status-pill ${statusClass}"><span class="status-dot" aria-hidden="true"></span>${status}</span>`;
    }

    function isFlashcardFile(file) {
      return file.type === "闪卡" || (file.type === "HTML" && /(闪卡|卡片|复习卡|学习卡)/i.test(file.name || ""));
    }

    function isMindmapFile(file) {
      return file.type === "思维导图" || (file.type === "HTML" && /(思维导图|导图|脑图|mind\s*map)/i.test(file.name || ""));
    }

    function editActionForFile(file) {
      const name = file.name.toLowerCase();
      if (isFlashcardFile(file) || isMindmapFile(file)) return null;
      if (name.endsWith(".md")) return { label: "AI编辑", kind: "ai-edit" };
      if (name.endsWith(".pptx") || file.type === "PPT") return { label: "AI PPT", kind: "ppt" };
      if (name.endsWith(".txt") || file.type === "文本片段") return { label: "编辑", kind: "edit" };
      return null;
    }

    function renderFileActions(file) {
      const edit = editActionForFile(file);
      const safeName = escapeHtml(file.name);
      return `
        <div class="file-actions">
          ${isFlashcardFile(file) ? `<button class="file-action" data-file-preview-cards="${file.id}" type="button" aria-label="预览闪卡 ${safeName}" title="预览闪卡">预览</button>` : ""}
          ${isMindmapFile(file) ? `<button class="file-action" data-file-preview-mind="${file.id}" type="button" aria-label="预览思维导图 ${safeName}" title="预览思维导图">预览</button>` : ""}
          ${file.type === "Excel" ? `<button class="file-action" data-file-preview-table="${file.id}" type="button" aria-label="预览表格 ${safeName}" title="预览表格">预览</button>` : ""}
          ${edit ? `<button class="file-action" data-file-edit="${file.id}" data-edit-kind="${edit.kind}" type="button">${edit.label}</button>` : ""}
          <button class="file-action danger icon-only" data-file-delete="${file.id}" type="button" aria-label="删除 ${safeName}" title="删除">
            <svg class="icon icon-sm" aria-hidden="true"><use href="#i-trash"/></svg>
          </button>
        </div>
      `;
    }

    function currentTask() {
      return taskTypes.find(task => task.id === state.activeTaskType) || null;
    }

    function currentTaskRecord() {
      return state.tasks.find(task => task.id === state.activeTaskId) || null;
    }

    function taskMeta(type) {
      return taskTypes.find(task => task.id === type) || taskTypes[0];
    }

    function taskStatusText(status) {
      return {
        configuring: "配置中",
        running: "生成中",
        reviewing: "待确认",
        done: "已完成",
        failed: "失败"
      }[status] || "配置中";
    }

    function taskStatusToGeneration(status) {
      if (status === "running") return "generating";
      if (status === "done" || status === "reviewing") return "done";
      return "idle";
    }

    function unfinishedTaskOfType(type) {
      return state.tasks.find(task => task.type === type && ["configuring", "running", "reviewing"].includes(task.status));
    }

    function taskInstanceTitle(type) {
      const meta = taskMeta(type);
      const firstFile = taskReferenceFiles(null)[0]?.name?.replace(/\.[^.]+$/, "") || "所选知识";
      const shortName = firstFile.length > 12 ? `${firstFile.slice(0, 12)}...` : firstFile;
      return `${meta.name} · ${shortName}`;
    }

    function recommendedSaveFolder(task = currentTaskRecord()) {
      if (!task || !task.references || task.references.length === 0) return null;
      const refFiles = task.references.map(refId => files.find(f => f.id === refId)).filter(Boolean);
      const folderCounts = {};
      refFiles.forEach(f => {
        folderCounts[f.folder] = (folderCounts[f.folder] || 0) + 1;
      });
      let bestFolder = null, bestCount = 0;
      for (const [folderId, count] of Object.entries(folderCounts)) {
        const folder = folders.find(f => f.id === folderId);
        if (folder && ["personal", "custom"].includes(folder.kind) && count > bestCount) {
          bestFolder = folderId;
          bestCount = count;
        }
      }
      return bestFolder;
    }

    function saveFolderOptions(task = currentTaskRecord()) {
      const recommended = recommendedSaveFolder(task);
      return folders
        .filter(folder => ["personal", "custom"].includes(folder.kind))
        .map(folder => {
          const isRec = folder.id === recommended;
          const selected = state.savePath === folder.id;
          return `<option value="${folder.id}" ${selected ? "selected" : ""}>${"　".repeat(folder.depth)}${folder.name}${isRec ? " (推荐)" : ""}</option>`;
        })
        .join("");
    }

    function cloneTaskConfig(type) {
      if (type === "ppt") {
        return {
          pageRange: state.pptPageRange,
          template: state.selectedPptTemplate,
          prompt: ""
        };
      }
      return { ...(state.taskConfigs[type] || {}) };
    }

    function selectedReferenceIds() {
      return [...state.referencedFiles].filter(id => !state.deletedFiles.has(id));
    }

    function updatePromptPlaceholder() {
      const task = currentTask();
      els.promptInput.placeholder = state.assistantView === "task" && task
        ? task.placeholder
        : "输入问题，按Enter发送...";
    }

    function selectedReferenceText() {
      return `引用 ${selectedReferenceIds().length} 个文件`;
    }

    function removeReference(fileId, taskId = state.assistantView === "task" ? state.activeTaskId : null) {
      if (!fileId) return;
      state.referencedFiles.delete(fileId);
      const task = taskId ? state.tasks.find(item => item.id === taskId) : null;
      if (task && Array.isArray(task.references)) {
        task.references = task.references.filter(id => id !== fileId);
      }
      renderAssistantContext();
      if (state.assistantView === "task") renderTaskView();
      showToast("已取消引用");
    }

    function taskReferenceFiles(task = currentTaskRecord()) {
      if (!task) return files.filter(file => state.referencedFiles.has(file.id) && !state.deletedFiles.has(file.id));
      return files.filter(file => task.references.includes(file.id) && !state.deletedFiles.has(file.id));
    }

    function renderTaskReferences() {
      const selected = taskReferenceFiles();
      if (selected.length === 0) return "";
      const visible = state.referenceExpanded ? selected : selected.slice(0, 2);
      const firstName = selected[0]?.name || "";
      return `
        <div class="task-reference-box ${state.referenceExpanded && selected.length > 0 ? "expanded" : ""}">
          <div class="task-reference-head">
            <div class="task-reference-title">
              <span class="task-reference-count">引用 ${selected.length}</span>
              <span class="task-reference-name">${firstName}</span>
            </div>
            <button class="task-reference-toggle" id="taskReferenceToggle" type="button">${state.referenceExpanded ? "收起" : "展开"}</button>
          </div>
          ${selected.length > 0 ? `
            <div class="task-reference-list">
              ${visible.map(file => `
                <div class="context-file">
                  <span class="file-icon">${fileIcon(file)}</span>
                  <span>${file.name}</span>
                  <button class="context-remove" data-task-reference-remove="${file.id}" type="button" aria-label="取消引用 ${escapeHtml(file.name)}">
                    <svg class="icon icon-xs"><use href="#i-x"/></svg>
                  </button>
                </div>
              `).join("")}
              ${selected.length > visible.length ? `<div class="context-more">还有 ${selected.length - visible.length} 个引用文件</div>` : ""}
            </div>
          ` : `<div class="task-reference-empty">选择文件后，当前任务会基于这些知识生成内容。</div>`}
        </div>
      `;
    }

    function renderUpdated(value) {
      const [date, time = ""] = value.split(" ");
      return `<div class="stack-cell"><strong>${date.slice(5)}</strong><span>${time}</span></div>`;
    }

    function folderIcon(folder) {
      const map = {
        personal: "i-folder-open",
        custom: "i-folder",
        system: "i-layers",
        "agent-folder": "i-folder",
        "system-child": "i-folder",
        flash: "i-lightbulb",
        "flash-child": "i-folder",
        "recording-root": "i-mic",
        "recording-month": "i-folder",
        recording: "i-mic"
      };
      const id = map[folder.kind] || "i-folder";
      return `<svg class="tree-icon icon icon-sm"><use href="#${id}"/></svg>`;
    }

    function updateFilterSummary() {
      state.filterExpanded = true;
    }

    function selectedFiles() {
      return files.filter(file => state.selectedFiles.has(file.id) && !state.deletedFiles.has(file.id));
    }

    function isPersonalFolderId(folderId) {
      return folderId === "personal" || parentFolderMatch(folderId, "personal");
    }

    function isMovablePersonalFile(file) {
      return !!file && isPersonalFolderId(file.folder);
    }

    function validateMoveSelection(showMessage = true) {
      const selected = selectedFiles();
      if (selected.length === 0) {
        if (showMessage) showToast("请先勾选需要移动的文件");
        return false;
      }
      if (state.activeWorkspace !== "files") {
        if (showMessage) showToast("只有文件夹-我的文件下的文件支持移动");
        return false;
      }
      const blocked = selected.filter(file => !isMovablePersonalFile(file));
      if (blocked.length > 0) {
        if (showMessage) showToast(`只有文件夹-我的文件下的文件支持移动，已选 ${blocked.length} 个不可移动文件`);
        return false;
      }
      return true;
    }

    function personalMoveFolders() {
      const root = folders.find(folder => folder.id === "personal");
      if (!root) return [];
      const collect = (parentId, depth) => folders
        .filter(folder => folder.parent === parentId && isPersonalManagedFolder(folder))
        .flatMap(folder => [
          { ...folder, pickerDepth: depth },
          ...(state.moveFolderExpanded.has(folder.id) ? collect(folder.id, depth + 1) : [])
        ]);
      return [{ ...root, pickerDepth: 0 }, ...collect("personal", 1)];
    }

    function moveFolderChildren(folderId) {
      return folders.filter(folder => folder.parent === folderId && isPersonalManagedFolder(folder));
    }

    function hasMoveFolderChildren(folderId) {
      return moveFolderChildren(folderId).length > 0;
    }

    function expandMoveFolderAncestors(folderId) {
      state.moveFolderExpanded.add("personal");
      let current = folders.find(folder => folder.id === folderId);
      while (current?.parent) {
        state.moveFolderExpanded.add(current.parent);
        current = folders.find(folder => folder.id === current.parent);
      }
    }

    function expandFolderAncestors(folderId) {
      let current = folders.find(folder => folder.id === folderId);
      while (current) {
        current.expanded = true;
        if (!current.parent) break;
        current = folders.find(folder => folder.id === current.parent);
      }
    }

    function isFolderVisible(folder) {
      if (folder.depth === 0) return true;
      const parent = folders.find(f => f.id === folder.parent);
      if (!parent) return true;
      if (!parent.expanded) return false;
      return isFolderVisible(parent);
    }

    function isPersonalManagedFolder(folder) {
      if (!folder) return false;
      if (folder.id === "personal") return true;
      const parent = folders.find(item => item.id === folder.parent);
      return parent ? isPersonalManagedFolder(parent) : false;
    }

    function normalizeFolderName(value) {
      return String(value || "").trim().replace(/\s+/g, " ").slice(0, 24);
    }

    function uniquePersonalFolderId(parentId, name) {
      const base = name
        .toLowerCase()
        .replace(/[^a-z0-9\u4e00-\u9fa5]+/g, "-")
        .replace(/^-+|-+$/g, "")
        .slice(0, 18) || "folder";
      let id = `${parentId}-${base}`;
      let i = 1;
      while (folders.some(folder => folder.id === id)) {
        i += 1;
        id = `${parentId}-${base}-${i}`;
      }
      return id;
    }

    function addPersonalChildFolder(parentId) {
      const parent = folders.find(folder => folder.id === parentId);
      if (!isPersonalManagedFolder(parent)) return;
      if ((parent.depth || 0) >= 3) {
        showToast("目录层级最多支持 3 级");
        return;
      }
      const name = normalizeFolderName(window.prompt("新建目录名称", "新建目录"));
      if (!name) return;
      parent.expanded = true;
      folders.push({
        id: uniquePersonalFolderId(parent.id, name),
        name,
        depth: (parent.depth || 0) + 1,
        parent: parent.id,
        expanded: true,
        kind: "custom",
        note: ""
      });
      state.folderMenuOpen = null;
      render();
      showToast(`已新建目录：${name}`);
    }

    function addPersonalSiblingFolder(folderId) {
      const folder = folders.find(item => item.id === folderId);
      if (!folder || folder.id === "personal" || !isPersonalManagedFolder(folder)) return;
      const parent = folders.find(item => item.id === folder.parent);
      if (!isPersonalManagedFolder(parent)) return;
      const name = normalizeFolderName(window.prompt("新建同级目录名称", "新建目录"));
      if (!name) return;
      parent.expanded = true;
      folders.push({
        id: uniquePersonalFolderId(parent.id, name),
        name,
        depth: folder.depth,
        parent: parent.id,
        expanded: true,
        kind: "custom",
        note: ""
      });
      state.folderMenuOpen = null;
      render();
      showToast(`已新建同级目录：${name}`);
    }

    function renamePersonalFolder(folderId) {
      const folder = folders.find(item => item.id === folderId);
      if (!folder || folder.id === "personal" || !isPersonalManagedFolder(folder)) return;
      const name = normalizeFolderName(window.prompt("修改目录名称", folder.name));
      if (!name || name === folder.name) return;
      folder.name = name;
      state.folderMenuOpen = null;
      render();
      showToast(`已重命名为：${name}`);
    }

    let folderDeleteConfirmEl = null;

    function showFolderDeleteConfirm(folderId) {
      const folder = folders.find(item => item.id === folderId);
      if (!folder || folder.id === "personal" || !isPersonalManagedFolder(folder)) return;
      const folderIds = [folder.id, ...descendantFolderIds(folder.id)];
      const affectedFiles = files.filter(file => folderIds.includes(file.folder) && !state.deletedFiles.has(file.id));
      if (folderDeleteConfirmEl) folderDeleteConfirmEl.remove();
      const rect = document.querySelector(`[data-folder-delete="${folderId}"]`)?.getBoundingClientRect();
      const el = document.createElement("div");
      el.className = "delete-confirm";
      el.innerHTML = `
        <strong>删除目录及全部文件？</strong>
        <span>${escapeHtml(folder.name)} 下的 ${affectedFiles.length} 个文件和 ${folderIds.length - 1} 个子目录会一起删除。</span>
        <div class="delete-confirm-actions">
          <button class="delete-confirm-cancel" type="button">取消</button>
          <button class="delete-confirm-danger" type="button">确认删除</button>
        </div>
      `;
      if (rect) {
        el.style.position = "fixed";
        el.style.left = Math.max(12, Math.min(rect.left - 160, window.innerWidth - 330)) + "px";
        el.style.top = Math.max(12, rect.bottom + 6) + "px";
      } else {
        el.style.position = "fixed";
        el.style.left = "50%";
        el.style.top = "50%";
        el.style.transform = "translate(-50%, -50%)";
      }
      document.body.appendChild(el);
      folderDeleteConfirmEl = el;
      const close = () => { el.remove(); folderDeleteConfirmEl = null; };
      el.querySelector(".delete-confirm-cancel").addEventListener("click", close);
      el.querySelector(".delete-confirm-danger").addEventListener("click", () => {
        close();
        deletePersonalFolder(folder.id);
      });
      const outsideClick = (e) => {
        if (!el.contains(e.target)) {
          close();
          document.removeEventListener("click", outsideClick);
        }
      };
      setTimeout(() => document.addEventListener("click", outsideClick), 10);
    }

    function deletePersonalFolder(folderId) {
      const folder = folders.find(item => item.id === folderId);
      if (!folder || folder.id === "personal" || !isPersonalManagedFolder(folder)) return;
      const folderIds = [folder.id, ...descendantFolderIds(folder.id)];
      const removedFileIds = new Set(files.filter(file => folderIds.includes(file.folder)).map(file => file.id));
      files = files.filter(file => !folderIds.includes(file.folder));
      for (let i = folders.length - 1; i >= 0; i -= 1) {
        if (folderIds.includes(folders[i].id)) folders.splice(i, 1);
      }
      [...state.selectedFiles].forEach(id => {
        if (removedFileIds.has(id)) state.selectedFiles.delete(id);
      });
      [...state.referencedFiles].forEach(id => {
        if (removedFileIds.has(id)) state.referencedFiles.delete(id);
      });
      if (state.selectedFile && removedFileIds.has(state.selectedFile)) {
        state.selectedFile = null;
      }
      if (folderIds.includes(state.selectedFolder)) {
        state.selectedFolder = "personal";
      }
      if (folderIds.includes(state.savePath)) {
        state.savePath = "personal-project";
      }
      state.folderMenuOpen = null;
      render();
      showToast(`已删除目录：${folder.name}`);
    }

    function renderFolders() {
      const rootId = workspaceRootId();
      const rootFolder = folders.find(folder => folder.id === rootId);
      if (els.folderRoot) {
        els.folderRoot.classList.toggle("active", state.selectedFolder === rootId && !state.selectedFile);
      }
      if (els.rootFileCount) {
        els.rootFileCount.textContent = String(folderCount(rootId));
      }
      if (els.folderRootName) {
        els.folderRootName.textContent = rootFolder?.name || "我的文件";
      }
      const filesInTree = files.filter(file => !state.deletedFiles.has(file.id) && (file.folder === rootId || parentFolderMatch(file.folder, rootId)));
      const renderFileTreeNode = (file, viewDepth) => `
        <div class="tree-item file-node depth-${viewDepth} ${state.selectedFile === file.id ? "active" : ""}" data-tree-file="${file.id}" role="button" tabindex="0" title="${escapeHtml(file.name)}">
          <span class="tree-expand-arrow" style="visibility:hidden">▸</span>
          <span class="space-name">
            ${fileIcon(file)}
            <span class="tree-file-title">${escapeHtml(file.name)}</span>
          </span>
          <span class="tree-file-type">${escapeHtml(file.type)}</span>
        </div>
      `;
      const renderFolderTreeNode = (folder) => {
        const childFolders = directChildFolders(folder.id);
        const childFiles = filesInTree.filter(file => file.folder === folder.id);
        const hasChildren = childFolders.length > 0 || childFiles.length > 0;
        const isActive = folder.id === state.selectedFolder && !state.selectedFile;
        const isExpanded = !!folder.expanded;
        const isPersonalManaged = state.activeWorkspace === "files" && isPersonalManagedFolder(folder);
        const canEdit = isPersonalManaged && folder.id !== "personal";
        const menuOpen = state.folderMenuOpen === folder.id;
        const viewDepth = Math.max(0, folder.depth - (rootFolder?.depth || 0) - 1);
        const expandArrow = hasChildren
          ? `<button class="tree-expand-arrow ${isExpanded ? "expanded" : ""}" data-expand-folder="${folder.id}" type="button" aria-label="${isExpanded ? "折叠" : "展开"}">▸</button>`

          <div class="tree-item depth-${viewDepth} ${isActive ? "active" : ""}" data-folder="${folder.id}" data-kind="${folder.kind || "custom"}" role="button" tabindex="0">

              <span class="tree-actions" aria-label="目录操作">

        const visibleTree = folders
          .filter(folder => folder.id !== rootId && parentFolderMatch(folder.id, rootId))

          const isActive = folder.id === state.selectedFolder && !state.selectedFile;
          const hasChildren = folders.some(item => item.parent === folder.id);
          const isExpanded = !!folder.expanded;
          const isPersonalManaged = state.activeWorkspace === "files" && isPersonalManagedFolder(folder);
          const canEdit = isPersonalManaged && folder.id !== "personal";
          const menuOpen = state.folderMenuOpen === folder.id;
          const viewDepth = Math.max(0, folder.depth - (rootFolder?.depth || 0) - 1);
          const expandArrow = hasChildren
            ? `<button class="tree-expand-arrow ${isExpanded ? "expanded" : ""}" data-expand-folder="${folder.id}" type="button" aria-label="${isExpanded ? "折叠" : "展开"}">▸</button>`
            : `<span class="tree-expand-arrow" style="visibility:hidden">▸</span>`;
          return `
            <div class="tree-item depth-${viewDepth} ${isActive ? "active" : ""}" data-folder="${folder.id}" data-kind="${folder.kind || "custom"}" role="button" tabindex="0">
              ${expandArrow}
              <span class="space-name">
                ${folderIcon(folder)}
                ${escapeHtml(folder.name)}
              </span>
              ${isPersonalManaged ? `
                <span class="tree-actions" aria-label="目录操作">
                  <button class="tree-action ${menuOpen ? "active" : ""}" data-folder-menu="${folder.id}" type="button" title="更多操作" aria-label="更多操作" aria-expanded="${menuOpen}">
                    <svg class="icon icon-xs"><use href="#i-more"/></svg>
                  </button>
                  ${menuOpen ? `
                    <span class="tree-menu" role="menu">
                      <button data-folder-add-child="${folder.id}" type="button" role="menuitem">新建下级目录</button>
                      ${canEdit ? `
                        <button data-folder-add-sibling="${folder.id}" type="button" role="menuitem">新建同级目录</button>
                        <button data-folder-rename="${folder.id}" type="button" role="menuitem">重命名</button>
                        <button class="danger" data-folder-delete="${folder.id}" type="button" role="menuitem">删除</button>
                      ` : ""}
                    </span>
                  ` : ""}
                </span>
              ` : ""}
              <span class="tree-count">${folderCount(folder.id)}</span>
            </div>
          `;
        }).join("");
      }

      els.folderTree.querySelectorAll("[data-expand-folder]").forEach(arrow => {
        arrow.addEventListener("click", event => {
          event.stopPropagation();
          const folderId = arrow.dataset.expandFolder;
          const folder = folders.find(f => f.id === folderId);
          if (folder) {
            folder.expanded = !folder.expanded;
            renderFolders();
          }
        });
      });

      els.folderTree.querySelectorAll("[data-folder]").forEach(button => {
        button.addEventListener("click", event => {
          if (event.target.closest("[data-expand-folder], [data-folder-menu], [data-folder-add-child], [data-folder-add-sibling], [data-folder-rename], [data-folder-delete], .tree-menu")) return;
          selectFolder(button.dataset.folder);
        });
      });

      els.folderTree.querySelectorAll("[data-tree-file]").forEach(button => {
        button.addEventListener("click", event => {
          event.preventDefault();
          event.stopPropagation();
          selectFilePreview(button.dataset.treeFile);
        });
      });

      els.folderTree.querySelectorAll("[data-folder-menu]").forEach(button => {
        button.addEventListener("click", event => {
          event.preventDefault();
          event.stopPropagation();
          state.folderMenuOpen = state.folderMenuOpen === button.dataset.folderMenu ? null : button.dataset.folderMenu;
          renderFolders();
        });
      });

      els.folderTree.querySelectorAll("[data-folder-add-child]").forEach(button => {
        button.addEventListener("click", event => {
          event.preventDefault();
          event.stopPropagation();
          addPersonalChildFolder(button.dataset.folderAddChild);
        });
      });

      els.folderTree.querySelectorAll("[data-folder-add-sibling]").forEach(button => {
        button.addEventListener("click", event => {
          event.preventDefault();
          event.stopPropagation();
          addPersonalSiblingFolder(button.dataset.folderAddSibling);
        });
      });

      els.folderTree.querySelectorAll("[data-folder-rename]").forEach(button => {
        button.addEventListener("click", event => {
          event.preventDefault();
          event.stopPropagation();
          renamePersonalFolder(button.dataset.folderRename);
        });
      });

      els.folderTree.querySelectorAll("[data-folder-delete]").forEach(button => {
        button.addEventListener("click", event => {
          event.preventDefault();
          event.stopPropagation();

          renderFolders();

    function renderFilters() {
      const sourceFilters = workspaceConfig().sourceFilters || ["全部"];
      if (!sourceFilters.includes(state.activeTagFilter)) state.activeTagFilter = "全部";
      els.filterPanel.innerHTML = `
        <div class="file-filter-row">
          <label class="file-filter-label" for="sourceFilterSelect">文件来源</label>
          <select class="file-filter-control" id="sourceFilterSelect">
            ${sourceFilters.map(option => `<option value="${option}" ${state.activeTagFilter === option ? "selected" : ""}>${option}</option>`).join("")}
          </select>
        </div>
        <div class="file-filter-row">
          <label class="file-filter-label" for="dateFilterInput">更新时间</label>
          <input class="file-filter-control" id="dateFilterInput" type="date" value="${state.activeDateFilter}">
        </div>
      `;
      document.getElementById("sourceFilterSelect").addEventListener("change", event => {
        state.activeTagFilter = event.target.value;
        renderList();
      });
      document.getElementById("dateFilterInput").addEventListener("change", event => {
        state.activeDateFilter = event.target.value;
        renderList();
      });
      document.getElementById("dateFilterInput").addEventListener("keydown", event => {
        if (event.key === "Escape") {
          event.preventDefault();
          state.activeDateFilter = "";
          event.currentTarget.value = "";
          renderList();
        }
      });
      updateFilterSummary();
    }

    function knowledgePickerSourceOptions() {
      const merged = new Set(["全部"]);
      Object.values(workspaceConfigs).forEach(config => {
        (config.sourceFilters || []).forEach(option => merged.add(option));
      });
      return [...merged];
    }

    function knowledgePickerFolders() {
      const buildBranch = (rootId, rootName) => {
        const root = folders.find(folder => folder.id === rootId);
        if (!root) return [];
        const collect = (parentId, depth) => folders
          .filter(folder => folder.parent === parentId)
          .flatMap(folder => [{ ...folder, pickerDepth: depth }, ...collect(folder.id, depth + 1)]);
        return [
          { ...root, name: rootName, pickerDepth: 0 },
          ...collect(rootId, 1)
        ];
      };
      return [
        ...buildBranch("personal", "文件夹"),
        ...buildBranch("voice-root", "语音笔记")
      ];
    }

    function recordingDerivedFiles(file) {
      if (file.type !== "Recording") return [];
      const baseName = file.name || "录音文件";
      const children = [
        {
          id: `${file.id}:transcript`,
          name: `${baseName}-转译文本.txt`,
          type: "TXT"
        }
      ];
      if (["f4", "v2"].includes(file.id)) {
        children.push({
          id: `${file.id}:summary`,
          name: `${baseName}-总结.md`,
          type: "Markdown"
        });
      }
      return children;
    }

    function knowledgePickerVisibleFiles() {
      const folderId = state.knowledgePickerFolder || "personal";
      const query = state.knowledgePickerQuery.trim().toLowerCase();
      return files.filter(file => {
        if (state.deletedFiles.has(file.id)) return false;
        const folderMatch = file.folder === folderId || parentFolderMatch(file.folder, folderId);
        const sourceMatch = sourceFilterMatch(file, state.knowledgePickerSource);
        const updatedMatch = dateFilterMatch(file, state.knowledgePickerDate);
        const derivedText = recordingDerivedFiles(file).map(item => item.name).join(" ");
        const queryMatch = !query || `${file.name} ${file.type} ${file.systemTags.join(" ")} ${file.summary} ${derivedText}`.toLowerCase().includes(query);
        return folderMatch && sourceMatch && updatedMatch && queryMatch;
      });
    }

    function openKnowledgePicker() {
      const sourceOptions = knowledgePickerSourceOptions();
      state.knowledgePickerOpen = true;
      state.knowledgePickerFolder = state.selectedFolder && folders.some(folder => folder.id === state.selectedFolder)
        ? state.selectedFolder
        : "personal";
      state.knowledgePickerQuery = "";
      state.knowledgePickerSource = sourceOptions.includes(state.activeTagFilter) ? state.activeTagFilter : "全部";
      state.knowledgePickerDate = state.activeDateFilter;
      state.knowledgePickerSelected = new Set(selectedReferenceIds());
      document.getElementById("knowledgeTool")?.classList.add("active");
      renderKnowledgePicker();
    }

    function closeKnowledgePicker() {
      state.knowledgePickerOpen = false;
      document.getElementById("knowledgeTool")?.classList.remove("active");
      renderKnowledgePicker();
    }

    function addKnowledgePickerReferences() {
      const ids = [...new Set([...state.knowledgePickerSelected].map(id => id.split(":")[0]))]
        .filter(id => !state.deletedFiles.has(id));
      ids.forEach(id => state.referencedFiles.add(id));
      closeKnowledgePicker();
      renderAssistantContext();
      showToast(ids.length > 0 ? `已引用 ${ids.length} 个知识库文件` : "未选择新的引用文件");
    }

    function renderKnowledgePickerFile(file) {
      const derivedFiles = recordingDerivedFiles(file);
      return `
        <article class="knowledge-picker-file ${state.knowledgePickerSelected.has(file.id) ? "selected" : ""}">
          <input class="row-check" data-picker-file="${file.id}" type="checkbox" ${state.knowledgePickerSelected.has(file.id) ? "checked" : ""} aria-label="选择 ${escapeHtml(file.name)}">
          ${fileIcon(file)}
          <div class="knowledge-picker-file-main">
            <strong>${escapeHtml(file.name)}</strong>
            <span>文件大小：${escapeHtml(file.size || "-")} · 更新时间：${escapeHtml(file.updated || "-")}</span>
          </div>
          <div class="knowledge-picker-tags">${renderSystemTags(file, 1)}</div>
          ${derivedFiles.length > 0 ? `
            <div class="knowledge-picker-children">
              ${derivedFiles.map(child => `
                <label class="knowledge-picker-child">
                  <input class="row-check" data-picker-file="${child.id}" type="checkbox" ${state.knowledgePickerSelected.has(child.id) ? "checked" : ""} aria-label="选择 ${escapeHtml(child.name)}">
                  ${fileIcon(child)}
                  <span>${escapeHtml(child.name)}</span>
                </label>
              `).join("")}
            </div>
          ` : ""}
        </article>
      `;
    }

      if (!els.knowledgePickerModal) return;
      if (!state.knowledgePickerOpen) {
        els.knowledgePickerModal.hidden = true;
        els.knowledgePickerModal.innerHTML = "";
        return;
      }

      const sourceOptions = knowledgePickerSourceOptions();
      if (!sourceOptions.includes(state.knowledgePickerSource)) state.knowledgePickerSource = "全部";
      const pickerFolders = knowledgePickerFolders();
      if (!pickerFolders.some(folder => folder.id === state.knowledgePickerFolder)) state.knowledgePickerFolder = "personal";
      const pickerFiles = knowledgePickerVisibleFiles();
      const selectedCount = state.knowledgePickerSelected.size;

      els.knowledgePickerModal.hidden = false;
      els.knowledgePickerModal.innerHTML = `
        <div class="knowledge-picker-shell" data-picker-shell>
          <div class="knowledge-picker-head">
            <div>
              <strong>选择知识库文件</strong>
              <span>最多选择 100 个文件</span>
            </div>
            <button class="icon-button" data-picker-close type="button" aria-label="关闭选择知识库文件">
              <svg class="icon icon-sm"><use href="#i-x"/></svg>
            </button>
          </div>
          <div class="knowledge-picker-tools">
            <label class="search-box file-search-box">
              <svg class="icon icon-sm"><use href="#i-search"/></svg>
              <input data-picker-query type="search" value="${escapeHtml(state.knowledgePickerQuery)}" placeholder="选择文件夹，搜索文件">

              <select class="file-filter-control" id="knowledgePickerSource" data-picker-source>
                ${sourceOptions.map(option => `<option value="${escapeHtml(option)}" ${state.knowledgePickerSource === option ? "selected" : ""}>${escapeHtml(option)}</option>`).join("")}
              </select>
            </div>
            <div class="file-filter-row">
              <label class="file-filter-label" for="knowledgePickerDate">更新时间</label>
              <input class="file-filter-control" id="knowledgePickerDate" data-picker-date type="date" value="${escapeHtml(state.knowledgePickerDate)}">
            </div>
          </div>
          <div class="knowledge-picker-body">
            <aside class="knowledge-picker-tree" aria-label="知识库目录">
              ${pickerFolders.map(folder => `
                <button class="knowledge-picker-folder ${state.knowledgePickerFolder === folder.id ? "active" : ""}" data-picker-folder="${folder.id}" style="--picker-depth:${folder.pickerDepth || 0}" type="button">
                  ${folderIcon(folder)}
                  <span>${escapeHtml(folder.name)}</span>
                  <em>${folderCount(folder.id)}</em>
                </button>
              `).join("")}
            </aside>
            <section class="knowledge-picker-list">
              <div class="knowledge-picker-list-head">
                <strong>文件列表</strong>
                <span>合计 ${selectedCount}/100</span>
              </div>
              <div class="knowledge-picker-files">
                ${pickerFiles.length > 0 ? pickerFiles.map(renderKnowledgePickerFile).join("") : `
                  <div class="empty-state">
                    <div>
                      <strong>没有找到匹配文件</strong>
                      <span>换一个目录、来源或日期试试。</span>
                    </div>
                  </div>
                `}
              </div>
            </section>
          </div>
          <div class="knowledge-picker-foot">
            <button class="small-button" data-picker-close type="button">取消</button>
            <button class="small-button primary" data-picker-add type="button">添加</button>
          </div>
        </div>
      `;

      els.knowledgePickerModal.querySelectorAll("[data-picker-close]").forEach(button => {
        button.addEventListener("click", closeKnowledgePicker);
      });
      els.knowledgePickerModal.onclick = event => {
        if (event.target === els.knowledgePickerModal) closeKnowledgePicker();
      };
      els.knowledgePickerModal.querySelector("[data-picker-query]").addEventListener("input", event => {
        state.knowledgePickerQuery = event.target.value;
        renderKnowledgePicker();
      });
      els.knowledgePickerModal.querySelector("[data-picker-source]").addEventListener("change", event => {
        state.knowledgePickerSource = event.target.value;
        renderKnowledgePicker();
      });
      els.knowledgePickerModal.querySelector("[data-picker-date]").addEventListener("change", event => {
        state.knowledgePickerDate = event.target.value;
        renderKnowledgePicker();
      });
      els.knowledgePickerModal.querySelectorAll("[data-picker-folder]").forEach(button => {
        button.addEventListener("click", () => {
          state.knowledgePickerFolder = button.dataset.pickerFolder;
          renderKnowledgePicker();
        });
      });
      els.knowledgePickerModal.querySelectorAll("[data-picker-file]").forEach(input => {
        input.addEventListener("change", event => {
          const id = event.target.dataset.pickerFile;
          if (event.target.checked) {
            if (state.knowledgePickerSelected.size >= 100) {
              event.target.checked = false;
              showToast("最多选择 100 个文件");
              return;
            }
            state.knowledgePickerSelected.add(id);
          } else {
            state.knowledgePickerSelected.delete(id);
          }

        });

      els.knowledgePickerModal.querySelector("[data-picker-add]").addEventListener("click", addKnowledgePickerReferences);
    }

    function openMoveFolderModal() {
      if (!validateMoveSelection(true)) return;
      const selected = selectedFiles();
      const commonFolder = selected.length > 0 && selected.every(file => file.folder === selected[0].folder)
        ? selected[0].folder
        : state.selectedFolder;
      state.moveTargetFolder = isPersonalFolderId(commonFolder) ? commonFolder : "personal";
      expandMoveFolderAncestors(state.moveTargetFolder);
      state.moveFolderOpen = true;
      renderMoveFolderModal();
    }

    function closeMoveFolderModal() {
      state.moveFolderOpen = false;
      renderMoveFolderModal();
    }

    function applyMoveSelectedFiles() {
      if (!validateMoveSelection(true)) {
        closeMoveFolderModal();
        return;
      }
      const target = folders.find(folder => folder.id === state.moveTargetFolder && isPersonalManagedFolder(folder));
      if (!target) {
        showToast("请选择可移动的个人文件目录");
        return;
      }
      const selected = selectedFiles();
      if (selected.every(file => file.folder === target.id)) {
        showToast("所选文件已在该目录");
        closeMoveFolderModal();
        return;
      }
      selected.forEach(file => {
        file.folder = target.id;
      });
      expandFolderAncestors(target.id);
      state.selectedFolder = target.id;
      state.selectedFile = null;
      state.moveFolderOpen = false;
      renderFolders();
      renderSelection();
      renderList();
      renderAssistantContext();
      if (state.assistantView === "task") renderTaskView();
      renderMoveFolderModal();
      showToast(`已移动 ${selected.length} 个文件到 ${target.name}`);
    }

    function renderMoveFolderModal() {

      if (!state.moveFolderOpen) {
        els.moveFolderModal.hidden = true;
        els.moveFolderModal.innerHTML = "";
        return;
      }

      if (!validateMoveSelection(false)) {
        closeMoveFolderModal();
        return;
      }

      const selected = selectedFiles();
      const moveFolders = personalMoveFolders();
      if (!moveFolders.some(folder => folder.id === state.moveTargetFolder)) {
        state.moveTargetFolder = "personal";
      }
      const target = moveFolders.find(folder => folder.id === state.moveTargetFolder);

      els.moveFolderModal.hidden = false;
      els.moveFolderModal.innerHTML = `

          <div class="knowledge-picker-head">
            <div>
              <strong>选择移动位置</strong>
              <span>仅支持移动到“文件夹 - 我的文件”下的目录</span>

              <svg class="icon icon-sm"><use href="#i-x"/></svg>
            </button>
          </div>
          <div class="move-folder-summary">
            已选 ${selected.length} 个文件，当前目标：${escapeHtml(target?.name || "我的文件")}
          </div>
