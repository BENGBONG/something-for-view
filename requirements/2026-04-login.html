<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>单文件原型 PRD 模板 App 示例</title>
  <style>
    :root {
      --bg-canvas: #f4f1ea;
      --bg-panel: rgba(255, 255, 255, 0.9);
      --bg-card: #ffffff;
      --bg-soft: #f7f4ee;
      --bg-emphasis: #14304a;
      --bg-accent: #d8ebff;
      --text-strong: #18212b;
      --text-main: #43505d;
      --text-muted: #778390;
      --text-inverse: #f5f7fa;
      --line-soft: rgba(24, 33, 43, 0.12);
      --line-strong: rgba(20, 48, 74, 0.18);
      --brand: #1f6cb2;
      --brand-strong: #154d80;
      --success: #0f8c62;
      --warning-bg: #fff1dc;
      --warning-text: #7a4e12;
      --danger-bg: #fdebe7;
      --danger-text: #6a2416;
      --shadow-soft: 0 24px 60px rgba(37, 47, 60, 0.08);
      --radius-xl: 24px;
      --radius-lg: 18px;
      --radius-md: 12px;
      --radius-sm: 8px;
      --font-sans: "PingFang SC", "Hiragino Sans GB", "Noto Sans SC", "Microsoft YaHei", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-family: var(--font-sans);
      color: var(--text-strong);
      background:
        radial-gradient(circle at top left, rgba(31, 108, 178, 0.14), transparent 32%),
        radial-gradient(circle at bottom right, rgba(20, 48, 74, 0.12), transparent 28%),
        var(--bg-canvas);
    }

    body {
      padding: 24px;
    }

    button {
      font: inherit;
    }

    .app {
      max-width: 1380px;
      margin: 0 auto;
      padding: 28px;
      border: 1px solid rgba(255, 255, 255, 0.5);
      border-radius: 32px;
      background: rgba(255, 255, 255, 0.55);
      backdrop-filter: blur(14px);
      box-shadow: var(--shadow-soft);
    }

    .toolbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 20px;
    }

    .toolbar-copy h1 {
      margin: 0 0 8px;
      font-size: 28px;
      line-height: 1.2;
      letter-spacing: -0.02em;
    }

    .toolbar-copy p {
      margin: 0;
      max-width: 760px;
      font-size: 14px;
      line-height: 1.7;
      color: var(--text-main);
    }

    .toolbar-actions {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .mode-toggle {
      display: inline-flex;
      padding: 4px;
      border: 1px solid var(--line-soft);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.78);
    }

    .mode-toggle button,
    .ghost-button {
      border: none;
      cursor: pointer;
      transition: 0.18s ease;
    }

    .mode-toggle button {
      min-width: 112px;
      padding: 10px 18px;
      border-radius: 999px;
      color: var(--text-main);
      background: transparent;
    }

    .mode-toggle button.active {
      color: var(--text-inverse);
      background: var(--bg-emphasis);
      box-shadow: 0 8px 18px rgba(20, 48, 74, 0.18);
    }

    .ghost-button {
      padding: 11px 16px;
      border-radius: 999px;
      color: var(--text-strong);
      background: rgba(255, 255, 255, 0.84);
      border: 1px solid var(--line-soft);
    }

    .ghost-button:hover {
      border-color: var(--line-strong);
      transform: translateY(-1px);
    }

    .mode-hint {
      margin-bottom: 20px;
      font-size: 13px;
      color: var(--text-muted);
    }

    .validation-banner {
      display: none;
      margin-bottom: 20px;
      padding: 14px 16px;
      border-radius: var(--radius-md);
      background: var(--warning-bg);
      color: var(--warning-text);
      border: 1px solid rgba(122, 78, 18, 0.12);
    }

    .validation-banner.show {
      display: block;
    }

    .validation-banner strong {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
    }

    .validation-banner ul {
      margin: 0;
      padding-left: 18px;
      font-size: 13px;
      line-height: 1.6;
    }

    .proto-layout {
      display: flex;
      gap: 22px;
    }

    .proto-layout.layout-app {
      flex-direction: row;
      align-items: flex-start;
    }

    .proto-layout.layout-web {
      flex-direction: column;
      align-items: stretch;
    }

    .app-stage-fit {
      position: relative;
      width: 100%;
      overflow: hidden;
    }

    .app-stage-fit > .proto-layout.layout-app {
      position: absolute;
      top: 0;
      left: 50%;
      width: 980px;
      transform-origin: top center;
      will-change: transform;
    }

    .proto-canvas {
      flex: 1;
      min-width: 0;
      padding: 32px;
      border-radius: 28px;
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.65), rgba(255, 255, 255, 0.28)),
        rgba(255, 255, 255, 0.35);
      border: 1px solid rgba(255, 255, 255, 0.52);
    }

    .proto-layout.layout-web .proto-canvas {
      width: 100%;
    }

    .canvas-header {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 24px;
      padding-bottom: 18px;
      border-bottom: 1px solid var(--line-soft);
    }

    .canvas-header h2,
    .canvas-header p {
      margin: 0;
    }

    .canvas-header h2 {
      font-size: 20px;
      margin-bottom: 6px;
    }

    .canvas-header p {
      font-size: 13px;
      color: var(--text-main);
      line-height: 1.7;
    }

    .canvas-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-content: flex-start;
      justify-content: flex-end;
    }

    .meta-chip {
      padding: 7px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.8);
      border: 1px solid var(--line-soft);
      font-size: 12px;
      color: var(--text-main);
    }

    .login-shell {
      display: grid;
      place-items: center;
      min-height: 760px;
      padding: 36px;
      border-radius: 24px;
      background:
        radial-gradient(circle at top left, rgba(31, 108, 178, 0.12), transparent 22%),
        radial-gradient(circle at bottom right, rgba(15, 140, 98, 0.12), transparent 22%),
        #f7f3ec;
    }

    .login-card {
      width: min(100%, 392px);
      padding: 28px;
      border-radius: 28px;
      border: 1px solid rgba(20, 48, 74, 0.08);
      background: rgba(255, 255, 255, 0.92);
      box-shadow: 0 28px 60px rgba(38, 48, 59, 0.12);
    }

    .section-space {
      margin-bottom: 22px;
    }

    [data-prd-id] {
      transition: outline 0.12s ease, transform 0.12s ease;
    }

    [data-prd-id]:not(.selected):hover {
      outline: 2px dashed rgba(31, 108, 178, 0.8);
      outline-offset: 5px;
      border-radius: 16px;
      cursor: pointer;
      transform: translateY(-1px);
    }

    [data-prd-id].selected {
      outline: 2px solid rgba(20, 77, 128, 0.92);
      outline-offset: 5px;
      border-radius: 16px;
    }

    .brand-lockup {
      text-align: center;
    }

    .brand-mark {
      width: 52px;
      height: 52px;
      margin: 0 auto 12px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      color: var(--text-inverse);
      background: linear-gradient(135deg, #1f6cb2, #14304a);
      font-size: 20px;
      font-weight: 700;
      box-shadow: 0 12px 22px rgba(20, 48, 74, 0.2);
    }

    .brand-title {
      margin: 0;
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .brand-subtitle {
      margin: 6px 0 0;
      font-size: 14px;
      color: var(--text-main);
    }

    .field-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 13px;
      color: var(--text-main);
    }

    .field-box {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 48px;
      padding: 0 14px;
      border-radius: 14px;
      background: var(--bg-card);
      border: 1px solid var(--line-soft);
      color: var(--text-muted);
      font-size: 14px;
    }

    .field-prefix {
      padding-right: 10px;
      border-right: 1px solid var(--line-soft);
      color: var(--text-main);
      white-space: nowrap;
    }

    .link-row {
      display: flex;
      justify-content: flex-end;
    }

    .text-link {
      color: var(--brand);
      font-size: 13px;
      cursor: pointer;
    }

    .primary-button {
      width: 100%;
      min-height: 46px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      font-size: 15px;
      font-weight: 600;
      color: var(--text-inverse);
      background: linear-gradient(135deg, #1f6cb2, #14304a);
      box-shadow: 0 18px 30px rgba(20, 48, 74, 0.18);
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 22px 0;
      color: var(--text-muted);
      font-size: 12px;
    }

    .divider::before,
    .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--line-soft);
    }

    .oauth-row {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .oauth-button {
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border-radius: 14px;
      border: 1px solid var(--line-soft);
      background: var(--bg-card);
      color: var(--text-main);
      font-size: 13px;
    }

    .oauth-badge {
      display: inline-grid;
      place-items: center;
      min-width: 18px;
      height: 18px;
      padding: 0 6px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 700;
      color: #fff;
    }

    .oauth-badge.wx {
      background: #07c160;
    }

    .oauth-badge.dd {
      background: #1677ff;
    }

    .register-row,
    .legal-row {
      text-align: center;
      font-size: 13px;
      color: var(--text-main);
    }

    .register-row span + span,
    .legal-row span + span {
      margin-left: 6px;
    }

    .anno-panel {
      width: 360px;
      flex-shrink: 0;
      position: sticky;
      top: 24px;
      padding: 22px;
      border-radius: 24px;
      background: var(--bg-panel);
      border: 1px solid rgba(255, 255, 255, 0.62);
      backdrop-filter: blur(14px);
      box-shadow: var(--shadow-soft);
    }

    .proto-layout.layout-app .anno-panel {
      position: static;
    }

    .proto-layout.layout-web .anno-panel {
      width: 100%;
      position: static;
    }

    .panel-section + .panel-section {
      margin-top: 18px;
      padding-top: 18px;
      border-top: 1px solid var(--line-soft);
    }

    .panel-kicker {
      margin: 0 0 8px;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .panel-title {
      margin: 0 0 8px;
      font-size: 20px;
      line-height: 1.35;
    }

    .panel-copy {
      margin: 0;
      font-size: 14px;
      line-height: 1.75;
      color: var(--text-main);
    }

    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .tag,
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      background: var(--bg-soft);
      color: var(--text-main);
      font-size: 12px;
      border: 1px solid rgba(20, 48, 74, 0.06);
    }

    .panel-list,
    .doc-list {
      margin: 0;
      padding-left: 18px;
      color: var(--text-main);
      font-size: 14px;
      line-height: 1.7;
    }

    .state-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .state-chip {
      padding: 6px 10px;
      border-radius: 999px;
      background: var(--bg-accent);
      color: var(--brand-strong);
      font-size: 12px;
      font-weight: 600;
    }

    .warning-card {
      display: flex;
      gap: 10px;
      padding: 10px 12px;
      margin-top: 8px;
      border-radius: var(--radius-sm);
      background: var(--danger-bg);
      color: var(--danger-text);
      font-size: 13px;
      line-height: 1.6;
    }

    .doc-view {
      display: none;
      max-width: 980px;
      margin: 0 auto;
      padding: 12px 0 8px;
    }

    .doc-top {
      display: grid;
      gap: 20px;
      margin-bottom: 28px;
    }

    .doc-hero {
      padding: 26px 28px;
      border-radius: 28px;
      color: var(--text-inverse);
      background: linear-gradient(140deg, #14304a, #1f6cb2 62%, #2a93d5);
      box-shadow: 0 24px 50px rgba(20, 48, 74, 0.2);
    }

    .doc-hero h2,
    .doc-hero p {
      margin: 0;
    }

    .doc-hero h2 {
      font-size: 30px;
      margin-bottom: 10px;
      letter-spacing: -0.02em;
    }

    .doc-hero p {
      max-width: 720px;
      font-size: 15px;
      line-height: 1.8;
      color: rgba(245, 247, 250, 0.85);
    }

    .doc-meta-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }

    .doc-meta-card,
    .doc-section,
    .component-card {
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.78);
      border: 1px solid rgba(255, 255, 255, 0.5);
      box-shadow: var(--shadow-soft);
    }

    .doc-meta-card {
      padding: 18px 18px 16px;
    }

    .doc-meta-card .label {
      display: block;
      margin-bottom: 8px;
      font-size: 12px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .doc-meta-card .value {
      font-size: 16px;
      font-weight: 700;
      color: var(--text-strong);
    }

    .doc-grid {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 18px;
      margin-bottom: 28px;
    }

    .doc-section {
      padding: 22px;
    }

    .doc-section h3 {
      margin: 0 0 14px;
      font-size: 18px;
    }

    .doc-section p {
      margin: 0;
      font-size: 14px;
      line-height: 1.8;
      color: var(--text-main);
    }

    .component-list {
      display: grid;
      gap: 16px;
    }

    .component-card {
      padding: 22px;
    }

    .component-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .component-name {
      margin: 0;
      font-size: 20px;
      line-height: 1.35;
    }

    .component-badge {
      padding: 6px 10px;
      border-radius: 999px;
      background: var(--bg-accent);
      color: var(--brand-strong);
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
    }

    .component-card p {
      margin: 0 0 14px;
      font-size: 14px;
      line-height: 1.8;
      color: var(--text-main);
    }

    .spec-block + .spec-block {
      margin-top: 14px;
    }

    .spec-block h4 {
      margin: 0 0 8px;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
    }

    .field-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      overflow: hidden;
      border-radius: 14px;
      background: var(--bg-soft);
    }

    .field-table th,
    .field-table td {
      padding: 10px 12px;
      text-align: left;
      border-bottom: 1px solid rgba(24, 33, 43, 0.08);
    }

    .field-table th {
      font-weight: 600;
      color: var(--text-main);
    }

    .field-table tr:last-child td {
      border-bottom: none;
    }

    @media (max-width: 1120px) {
      .doc-meta-grid,
      .doc-grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 760px) {
      body {
        padding: 14px;
      }

      .app {
        padding: 18px;
        border-radius: 24px;
      }

      .toolbar {
        flex-direction: column;
      }

      .toolbar-actions {
        width: 100%;
        flex-wrap: wrap;
      }

      .mode-toggle,
      .mode-toggle button,
      .ghost-button {
        width: 100%;
      }

      .doc-meta-grid,
      .doc-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="toolbar">
      <div class="toolbar-copy">
        <h1>单文件原型 PRD 模板 App 示例</h1>
        <p>
          这个文件演示 App 设计模式下的单文件需求包。页面左侧是移动端原型，右侧是元素说明；
          在文档嵌入场景中，原型区会按固定设计宽度等比缩放，避免窄容器触发布局重排。
        </p>
      </div>
      <div class="toolbar-actions">
        <div class="mode-toggle" aria-label="视图模式切换">
          <button id="btnProto" class="active" type="button">原型模式</button>
          <button id="btnDoc" type="button">PRD 文档</button>
        </div>
        <button class="ghost-button" id="exportButton" type="button">导出 Markdown</button>
      </div>
    </header>

    <div class="mode-hint" id="modeHint">当前为 App 设计模式。原型区保持左右布局，并在窄容器中按固定稿等比缩放。</div>

    <div class="validation-banner" id="validationBanner"></div>

    <div class="app-stage-fit" id="appStage">
      <section class="proto-layout layout-app" id="protoView">
        <div class="proto-canvas">
          <div class="canvas-header">
            <div>
              <h2 id="canvasTitle"></h2>
              <p id="canvasIntro"></p>
            </div>
            <div class="canvas-meta" id="canvasMeta"></div>
          </div>

          <div class="login-shell">
            <div class="login-card">
              <section class="section-space brand-lockup" data-prd-id="logo">
                <div class="brand-mark">T</div>
                <p class="brand-title">TeamFlow</p>
                <p class="brand-subtitle">登录你的工作台，继续今天的协作任务</p>
              </section>

              <section class="section-space field-group" data-prd-id="phone">
                <label>手机号</label>
                <div class="field-box">
                  <span class="field-prefix">+86</span>
                  <span>请输入手机号</span>
                </div>
              </section>

              <section class="section-space field-group" data-prd-id="password">
                <label>密码</label>
                <div class="field-box">
                  <span>请输入密码</span>
                  <span>显示</span>
                </div>
              </section>

              <section class="section-space link-row" data-prd-id="forgot">
                <span class="text-link">忘记密码？</span>
              </section>

              <section class="section-space" data-prd-id="login-btn">
                <div class="primary-button">登录</div>
              </section>

              <div class="divider">或</div>

              <section class="section-space oauth-row" data-prd-id="sso">
                <div class="oauth-button">
                  <span class="oauth-badge wx">W</span>
                  <span>企业微信</span>
                </div>
                <div class="oauth-button">
                  <span class="oauth-badge dd">D</span>
                  <span>钉钉</span>
                </div>
              </section>

              <section class="section-space register-row" data-prd-id="register">
                <span>还没有账号？</span>
                <span class="text-link">立即注册</span>
              </section>

              <section class="legal-row" data-prd-id="agreement">
                <span>登录即表示你同意</span>
                <span class="text-link">服务协议</span>
                <span>和</span>
                <span class="text-link">隐私政策</span>
              </section>
            </div>
          </div>
        </div>

        <aside class="anno-panel">
          <div id="annoIdle"></div>
          <div id="annoContent" style="display: none;"></div>
        </aside>
      </section>
    </div>

    <section class="doc-view" id="docView"></section>
  </div>

  <script id="page-spec" type="application/json">
    {
      "pageId": "login",
      "product": "TeamFlow",
      "platform": "app",
      "prototypeWidth": 980,
      "title": "用户登录页面",
      "status": "草稿",
      "version": "v2.0",
      "owner": "产品设计",
      "updatedAt": "2026-04-06",
      "goal": "让已注册用户快速、安全地进入工作台，并降低登录环节的理解和跳失成本。",
      "roles": ["访客", "已注册用户"],
      "entryPoints": ["官网登录入口", "邀请链接落地页", "分享链接鉴权页"],
      "preconditions": ["用户已注册账号", "账号未被禁用", "网络连接可用"],
      "mainFlow": [
        "用户输入手机号",
        "用户输入密码",
        "点击登录按钮",
        "系统校验账号信息",
        "校验成功后跳转 dashboard"
      ],

  <script>
    const typeLabel = {
      page: "页面",
      section: "区块",
      field: "字段",
      action: "操作",
      component: "组件"
    };

    let mode = "proto";

    function parseJSONScript(id) {
      const node = document.getElementById(id);
      if (!node) {
        return null;
      }

      try {
        return JSON.parse(node.textContent);
      } catch (error) {
        console.error("JSON 解析失败:", id, error);
        return null;
      }
    }

    const pageSpec = parseJSONScript("page-spec") || {};
    const componentSpecs = parseJSONScript("component-specs") || {};

    function getPlatformType() {
      const platform = String(pageSpec.platform || "").trim().toLowerCase();
      return platform === "web" ? "web" : "app";
    }

    function getPlatformLabel() {
      return getPlatformType() === "web" ? "Web" : "App";
    }

    function getLayoutLabel() {
      return getPlatformType() === "web" ? "上下布局" : "左右布局";
    }

    function getPrototypeWidth() {
      const width = Number(pageSpec.prototypeWidth);
      return Number.isFinite(width) && width >= 720 ? width : 980;
    }

    function getComponentOrder() {
      return Array.from(document.querySelectorAll("[data-prd-id]")).map((element) => element.dataset.prdId);
    }

    function getComponentsInViewOrder() {
      const orderedIds = getComponentOrder();
      const used = new Set();
      const ordered = [];

      orderedIds.forEach((id) => {
        if (componentSpecs[id]) {
          ordered.push({ id, ...componentSpecs[id] });
          used.add(id);
        }
      });

      Object.entries(componentSpecs).forEach(([id, spec]) => {
        if (!used.has(id)) {
          ordered.push({ id, ...spec });
        }
      });

      return ordered;
    }

    function validateSpecs() {
      const warnings = [];
      const domIds = getComponentOrder();
      const domIdSet = new Set();

      domIds.forEach((id) => {
        if (domIdSet.has(id)) {
          warnings.push("页面中存在重复的 data-prd-id: " + id);
        }
        domIdSet.add(id);

        if (!componentSpecs[id]) {
          warnings.push("DOM 中的组件未找到规格定义: " + id);
        }
      });

      Object.keys(componentSpecs).forEach((id) => {
        if (!domIdSet.has(id)) {
          warnings.push("规格中存在未绑定到页面的组件: " + id);
        }

        const spec = componentSpecs[id];
        ["title", "type", "desc"].forEach((key) => {
          if (!spec[key]) {
            warnings.push("组件缺少必填字段 " + key + ": " + id);
          }
        });

        if ((spec.type === "field") && !spec.fields?.length) {
          warnings.push("字段组件缺少 fields 定义: " + id);
        }

        if (spec.rules?.length && !spec.states?.length) {
          warnings.push("存在业务规则但缺少状态定义: " + id);
        }
      });

      ["title", "goal", "mainFlow", "acceptanceCriteria"].forEach((key) => {
        const value = pageSpec[key];
        const missing = Array.isArray(value) ? value.length === 0 : !value;
        if (missing) {
          warnings.push("页面级规格缺少字段: " + key);
        }
      });

      const rawPlatform = String(pageSpec.platform || "").trim().toLowerCase();
      if (!rawPlatform) {
        warnings.push("建议在 page-spec 中声明 platform: app 或 web");
      } else if (!["app", "web"].includes(rawPlatform)) {
        warnings.push("page-spec.platform 仅支持 app 或 web，当前值为: " + pageSpec.platform);
      }

      if (getPlatformType() === "app" && !Number.isFinite(Number(pageSpec.prototypeWidth))) {
        warnings.push("建议在 page-spec 中声明 prototypeWidth，用于文档嵌入场景下的等比缩放");
      }

      return warnings;
    }

    function updatePrototypeScale() {
      const stage = document.getElementById("appStage");
      const inner = document.getElementById("protoView");

      if (!stage || !inner || getPlatformType() !== "app") {
        return;
      }

      const designWidth = getPrototypeWidth();
      inner.style.width = designWidth + "px";

      requestAnimationFrame(() => {
        const availableWidth = stage.clientWidth;
        if (!availableWidth) {
          return;
        }

        const scale = Math.min(1, availableWidth / designWidth);
        inner.style.transform = `translateX(-50%) scale(${scale})`;
        stage.style.height = `${inner.offsetHeight * scale}px`;
      });
    }

    function bindPrototypeScale() {
      const stage = document.getElementById("appStage");
      const container = stage?.parentElement;

      if (!stage || !container || getPlatformType() !== "app") {
        return;
      }

      updatePrototypeScale();

      if (typeof ResizeObserver !== "undefined") {
        const observer = new ResizeObserver(() => updatePrototypeScale());
        observer.observe(container);
      }

      window.addEventListener("resize", updatePrototypeScale);

      if (document.fonts?.ready) {
        document.fonts.ready.then(() => updatePrototypeScale());
      }
    }

    function applyPrototypeLayout() {
      const protoView = document.getElementById("protoView");
      protoView.classList.remove("layout-app", "layout-web");
      protoView.classList.add("layout-" + getPlatformType());
    }

    function renderModeHint() {
      const modeHint = document.getElementById("modeHint");

      if (getPlatformType() === "web") {
        modeHint.textContent = "当前为 Web 设计模式。原型区采用上下布局，上方展示页面，下方展示页面摘要和元素说明。";
      } else {
        modeHint.textContent = "当前为 App 设计模式。原型区采用左右布局，并在窄容器中按固定设计宽度等比缩放。";
      }
    }

    function renderValidationBanner() {
      const warnings = validateSpecs();
      const banner = document.getElementById("validationBanner");

      if (!warnings.length) {
        banner.classList.remove("show");
        banner.innerHTML = "";
        return;
      }

      banner.classList.add("show");
      banner.innerHTML = `
        <strong>规格校验发现 ${warnings.length} 个提示</strong>
        <ul>${warnings.map((item) => `<li>${item}</li>`).join("")}</ul>
      `;
    }

    function renderCanvasMeta() {
      const meta = [
        "平台: " + getPlatformLabel(),
        "布局: " + getLayoutLabel(),
        "设计宽度: " + getPrototypeWidth() + "px",
        "产品: " + (pageSpec.product || "-"),
        "页面: " + (pageSpec.title || "-"),
        "状态: " + (pageSpec.status || "-"),
        "版本: " + (pageSpec.version || "-")
      ];

      document.getElementById("canvasMeta").innerHTML = meta
        .map((item) => `<span class="meta-chip">${item}</span>`)
        .join("");
    }

    function renderCanvasHeader() {
      const canvasTitle = document.getElementById("canvasTitle");
      const canvasIntro = document.getElementById("canvasIntro");

      canvasTitle.textContent = "示例页面: " + (pageSpec.title || "未命名页面");

      if (getPlatformType() === "web") {
        canvasIntro.textContent = "当前页面按 Web 设计模式展示。模板会将原型区域放在上方，元素说明区放在下方，便于承载宽页面和长页面的查阅。";
      } else {
        canvasIntro.textContent = "当前页面按 App 设计模式展示。模板会保持左侧原型、右侧说明的结构，并在文档嵌入场景中按固定稿等比缩放。";
      }
    }

    function renderIdlePanel() {
      const roles = (pageSpec.roles || []).map((item) => `<span class="tag">${item}</span>`).join("");
      const entryPoints = (pageSpec.entryPoints || []).map((item) => `<span class="pill">${item}</span>`).join("");
      const dependencies = (pageSpec.dependencies || []).map((item) => `<li>${item}</li>`).join("");

      document.getElementById("annoIdle").innerHTML = `
        <div class="panel-section">
          <p class="panel-kicker">Page Overview</p>
          <h2 class="panel-title">${pageSpec.title || "未命名页面"}</h2>
          <p class="panel-copy">${pageSpec.goal || "请在 page-spec 中补充页面目标。"}</p>
          <div class="tag-row">
            <span class="tag">平台: ${getPlatformLabel()}</span>
            <span class="tag">布局: ${getLayoutLabel()}</span>
            ${roles || '<span class="tag">待补充角色</span>'}
          </div>
        </div>
        <div class="panel-section">
          <p class="panel-kicker">Main Flow</p>
          <ol class="panel-list">${(pageSpec.mainFlow || []).map((item) => `<li>${item}</li>`).join("")}</ol>
        </div>
        <div class="panel-section">
          <p class="panel-kicker">Entry Points</p>
          <div class="tag-row">${entryPoints || '<span class="tag">待补充入口</span>'}</div>
        </div>
        <div class="panel-section">
          <p class="panel-kicker">Dependencies</p>
          <ul class="panel-list">${dependencies || "<li>待补充依赖</li>"}</ul>
        </div>
      `;
    }

    function renderFields(fields) {
      if (!fields?.length) {
        return "";
      }

      return `
        <div class="panel-section">
          <p class="panel-kicker">Fields</p>
          ${fields
            .map((field) => `
              <div class="warning-card" style="background: var(--bg-soft); color: var(--text-main);">
                <div>
                  <strong>${field.name}</strong><br />
                  ${field.type}${field.required ? " · 必填" : ""}${field.validation ? " · " + field.validation : ""}
                </div>
              </div>
            `)
            .join("")}
        </div>
      `;
    }

    function renderSelectedPanel(id) {
      const spec = componentSpecs[id];
      if (!spec) {
        return `
          <div class="panel-section">
            <p class="panel-kicker">Spec Missing</p>
            <h2 class="panel-title">${id}</h2>
            <p class="panel-copy">当前组件没有找到规格定义，请检查 component-specs 中是否存在同名键。</p>
          </div>
        `;
      }

      const rules = spec.rules?.length
        ? `<div class="panel-section"><p class="panel-kicker">Rules</p><ul class="panel-list">${spec.rules.map((item) => `<li>${item}</li>`).join("")}</ul></div>`
        : "";
      const states = spec.states?.length
        ? `<div class="panel-section"><p class="panel-kicker">States</p><div class="state-row">${spec.states.map((item) => `<span class="state-chip">${item}</span>`).join("")}</div></div>`
        : "";
      const exceptions = spec.exceptions?.length
        ? `<div class="panel-section"><p class="panel-kicker">Exceptions</p>${spec.exceptions.map((item) => `<div class="warning-card"><span>!</span><span>${item}</span></div>`).join("")}</div>`
        : "";
      const testCases = spec.testCases?.length
        ? `<div class="panel-section"><p class="panel-kicker">Test Cases</p><ul class="panel-list">${spec.testCases.map((item) => `<li>${item}</li>`).join("")}</ul></div>`
        : "";

      return `
        <div class="panel-section">
          <p class="panel-kicker">${typeLabel[spec.type] || spec.type}</p>
          <h2 class="panel-title">${spec.title}</h2>
          <p class="panel-copy">${spec.desc || ""}</p>
          <div class="tag-row">
            <span class="tag">ID: ${id}</span>
            <span class="tag">类型: ${typeLabel[spec.type] || spec.type}</span>
          </div>
        </div>
        ${rules}
        ${renderFields(spec.fields)}
        ${states}
        ${exceptions}
        ${testCases}
      `;
    }

    function selectComponent(id) {
      document.querySelectorAll("[data-prd-id].selected").forEach((node) => node.classList.remove("selected"));
      const target = document.querySelector(`[data-prd-id="${id}"]`);

      if (target) {
        target.classList.add("selected");
      }

      document.getElementById("annoIdle").style.display = "none";
      document.getElementById("annoContent").style.display = "block";
      document.getElementById("annoContent").innerHTML = renderSelectedPanel(id);
    }

    function resetPanel() {
      document.querySelectorAll("[data-prd-id].selected").forEach((node) => node.classList.remove("selected"));
      document.getElementById("annoIdle").style.display = "block";
      document.getElementById("annoContent").style.display = "none";
      document.getElementById("annoContent").innerHTML = "";
    }

    function renderDocView() {
      const components = getComponentsInViewOrder();

      document.getElementById("docView").innerHTML = `
        <div class="doc-top">
          <section class="doc-hero">
            <h2>${pageSpec.title || "未命名页面"}</h2>
            <p>${pageSpec.goal || "请在 page-spec 中补充页面目标。"}</p>
          </section>

          <div class="doc-meta-grid">
            <div class="doc-meta-card"><span class="label">产品</span><span class="value">${pageSpec.product || "-"}</span></div>
            <div class="doc-meta-card"><span class="label">版本</span><span class="value">${pageSpec.version || "-"}</span></div>
            <div class="doc-meta-card"><span class="label">状态</span><span class="value">${pageSpec.status || "-"}</span></div>
            <div class="doc-meta-card"><span class="label">更新日期</span><span class="value">${pageSpec.updatedAt || "-"}</span></div>
          </div>
        </div>

        <div class="doc-grid">
          <section class="doc-section">
            <h3>页面信息</h3>
            <p><strong>平台:</strong> ${getPlatformLabel()} · ${getLayoutLabel()} · ${getPrototypeWidth()}px</p>
            <p><strong>角色:</strong> ${(pageSpec.roles || []).join(" / ") || "-"}</p>
            <p><strong>入口:</strong> ${(pageSpec.entryPoints || []).join(" / ") || "-"}</p>
            <p><strong>前置条件:</strong> ${(pageSpec.preconditions || []).join(" / ") || "-"}</p>
          </section>

          <section class="doc-section">
            <h3>成功指标与依赖</h3>
            <ul class="doc-list">${(pageSpec.successMetrics || []).map((item) => `<li>${item}</li>`).join("")}</ul>
            <div style="height: 12px;"></div>
            <ul class="doc-list">${(pageSpec.dependencies || []).map((item) => `<li>${item}</li>`).join("")}</ul>
          </section>
        </div>

        <div class="doc-grid">
          <section class="doc-section">
            <h3>主流程</h3>
            <ol class="doc-list">${(pageSpec.mainFlow || []).map((item) => `<li>${item}</li>`).join("")}</ol>
          </section>

          <section class="doc-section">
            <h3>验收标准</h3>
            <ul class="doc-list">${(pageSpec.acceptanceCriteria || []).map((item) => `<li>${item}</li>`).join("")}</ul>
          </section>
        </div>

        <section class="component-list">
          ${components.map((component) => renderComponentCard(component)).join("")}
        </section>
      `;
    }

    function renderComponentCard(component) {
      return `
        <article class="component-card">
          <div class="component-top">
            <div>
              <h3 class="component-name">${component.title || component.id}</h3>
            </div>
            <span class="component-badge">${typeLabel[component.type] || component.type}</span>
          </div>
          <p>${component.desc || ""}</p>

          ${component.rules?.length ? `
            <section class="spec-block">
              <h4>业务规则</h4>
              <ul class="doc-list">${component.rules.map((item) => `<li>${item}</li>`).join("")}</ul>
            </section>
          ` : ""}

          ${component.fields?.length ? `
            <section class="spec-block">
              <h4>字段规格</h4>
              <table class="field-table">
                <thead>
                  <tr>
                    <th>字段名</th>
                    <th>类型</th>
                    <th>必填</th>
                    <th>校验规则</th>
                  </tr>
                </thead>
                <tbody>
                  ${component.fields.map((field) => `
                    <tr>
                      <td>${field.name || "-"}</td>
                      <td>${field.type || "-"}</td>
                      <td>${field.required ? "是" : "否"}</td>
                      <td>${field.validation || "-"}</td>
                    </tr>
                  `).join("")}
                </tbody>
              </table>
            </section>
          ` : ""}

          ${component.states?.length ? `
            <section class="spec-block">
              <h4>状态</h4>
              <div class="state-row">${component.states.map((item) => `<span class="state-chip">${item}</span>`).join("")}</div>
            </section>
          ` : ""}

          ${component.exceptions?.length ? `
            <section class="spec-block">
              <h4>异常处理</h4>
              ${component.exceptions.map((item) => `<div class="warning-card"><span>!</span><span>${item}</span></div>`).join("")}
            </section>
          ` : ""}

          ${component.api?.length ? `
            <section class="spec-block">
              <h4>接口依赖</h4>
              <ul class="doc-list">${component.api.map((item) => `<li>${item}</li>`).join("")}</ul>
            </section>
          ` : ""}

          ${component.testCases?.length ? `
            <section class="spec-block">
              <h4>测试点</h4>
              <ul class="doc-list">${component.testCases.map((item) => `<li>${item}</li>`).join("")}</ul>
            </section>
          ` : ""}
        </article>
      `;
    }

    function setMode(nextMode) {
      mode = nextMode;
      const protoStage = document.getElementById("appStage");
      const protoView = document.getElementById("protoView");
      const docView = document.getElementById("docView");
      const btnProto = document.getElementById("btnProto");
      const btnDoc = document.getElementById("btnDoc");
      const modeHint = document.getElementById("modeHint");

      if (mode === "proto") {
        protoStage.style.display = "block";
        protoView.style.display = "flex";
        docView.style.display = "none";
        modeHint.style.display = "block";
        btnProto.classList.add("active");
        btnDoc.classList.remove("active");
        resetPanel();
        updatePrototypeScale();
      } else {
        protoStage.style.display = "none";
        protoView.style.display = "none";
        docView.style.display = "block";
        modeHint.style.display = "none";
        btnProto.classList.remove("active");
        btnDoc.classList.add("active");
        renderDocView();
      }
    }

    function exportMarkdown() {
      const components = getComponentsInViewOrder();
      let markdown = `# ${pageSpec.title || "未命名页面"}\n\n`;
      markdown += `> 平台: ${getPlatformLabel()} · 布局: ${getLayoutLabel()} · 设计宽度: ${getPrototypeWidth()}px · 产品: ${pageSpec.product || "-"} · 状态: ${pageSpec.status || "-"} · 版本: ${pageSpec.version || "-"} · 更新日期: ${pageSpec.updatedAt || "-"}\n\n`;
      markdown += `## 页面目标\n\n${pageSpec.goal || "-"}\n\n`;

      const pageSections = [
        ["角色", pageSpec.roles],
        ["入口", pageSpec.entryPoints],
        ["前置条件", pageSpec.preconditions],
        ["主流程", pageSpec.mainFlow],
        ["成功指标", pageSpec.successMetrics],
        ["依赖项", pageSpec.dependencies],
        ["验收标准", pageSpec.acceptanceCriteria],
        ["备注", pageSpec.notes]
      ];

      pageSections.forEach(([title, value]) => {
        if (!value || !value.length) {
          return;
        }

        markdown += `## ${title}\n\n`;
        value.forEach((item) => {
          markdown += `- ${item}\n`;
        });
        markdown += `\n`;
      });

      components.forEach((component, index) => {
        markdown += `## ${index + 1}. ${component.title || component.id} \`${typeLabel[component.type] || component.type}\`\n\n`;
        markdown += `${component.desc || "-"}\n\n`;

        if (component.rules?.length) {
          markdown += `### 业务规则\n\n`;
          component.rules.forEach((item, ruleIndex) => {
            markdown += `- R${ruleIndex + 1}. ${item}\n`;
          });
          markdown += `\n`;
        }

        if (component.fields?.length) {
          markdown += `### 字段规格\n\n| 字段 | 类型 | 必填 | 校验 |\n| --- | --- | --- | --- |\n`;
          component.fields.forEach((field) => {
            markdown += `| ${field.name || "-"} | ${field.type || "-"} | ${field.required ? "是" : "否"} | ${field.validation || "-"} |\n`;
          });
          markdown += `\n`;
        }

        if (component.states?.length) {
          markdown += `### 状态\n\n${component.states.map((item) => `\`${item}\``).join(" / ")}\n\n`;
        }

        if (component.exceptions?.length) {
          markdown += `### 异常处理\n\n`;
          component.exceptions.forEach((item) => {
            markdown += `> ${item}\n\n`;
          });
        }

        if (component.api?.length) {
          markdown += `### 接口依赖\n\n`;
          component.api.forEach((item) => {
            markdown += `- ${item}\n`;
          });
          markdown += `\n`;
        }

        if (component.testCases?.length) {
          markdown += `### 测试点\n\n`;
          component.testCases.forEach((item) => {
            markdown += `- ${item}\n`;
          });
          markdown += `\n`;
        }
      });

      const blob = new Blob([markdown], { type: "text/markdown;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = `${pageSpec.pageId || "prd"}-spec.md`;
      link.click();
      URL.revokeObjectURL(url);
    }

    function bindEvents() {
      document.getElementById("btnProto").addEventListener("click", () => setMode("proto"));
      document.getElementById("btnDoc").addEventListener("click", () => setMode("doc"));
      document.getElementById("exportButton").addEventListener("click", exportMarkdown);

      document.addEventListener("click", (event) => {
        if (mode !== "proto") {
          return;
        }

        const target = event.target.closest("[data-prd-id]");
        if (!target) {
          return;
        }

        selectComponent(target.dataset.prdId);
      });
    }

    function init() {
      applyPrototypeLayout();
      renderModeHint();
      renderCanvasHeader();
      renderCanvasMeta();
      renderIdlePanel();
      renderValidationBanner();
      bindPrototypeScale();
      bindEvents();
      setMode("proto");
    }

    init();
  </script>
</body>
</html>
